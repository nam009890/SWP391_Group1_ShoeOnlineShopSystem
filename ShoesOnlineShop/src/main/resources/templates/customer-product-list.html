<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shoes Online Shop - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #fdfdfd; }
        .customer-topbar {
            background: var(--white); border-bottom: 1px solid var(--border);
            padding: 15px 40px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-brand { font-size: 20px; font-weight: 800; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .header-brand svg { width: 24px; height: 24px; fill: var(--accent); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 15px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }
        .customer-main { padding: 40px; max-width: 1200px; margin: 0 auto; display: flex; gap: 40px; }
        
        .filter-sidebar { width: 250px; flex-shrink: 0; }
        .filter-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: sticky; top: 100px;}
        .filter-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;}
        
        .products-area { flex: 1; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 28px; font-weight: 800; color: var(--text-dark); margin: 0;}
        .results-count { color: var(--text-mid); font-size: 14px; font-weight: 500;}
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px;}
        .prod-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; display: block; transition: transform .2s, box-shadow .2s; }
        .prod-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .prod-img { width: 100%; height: 200px; object-fit: cover; background: #f5f6f8; }
        .prod-info { padding: 16px; }
        .prod-cat { font-size: 12px; color: var(--text-light); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .prod-name { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-price { font-size: 17px; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/products" style="color: var(--accent)">Shop</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
        </nav>
    </header>

    <div class="customer-main">
        <!-- Sidebar Filters -->
        <div class="filter-sidebar">
            <div class="filter-card">
                <div class="filter-title">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    Filters
                </div>
                <form action="/products" method="get">
                    <div class="mb-4">
                        <label class="form-label" style="font-size: 12px; color: var(--text-mid);">Search</label>
                        <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="Product name...">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" style="font-size: 12px; color: var(--text-mid);">Category</label>
                        <select name="category" class="form-select">
                            <option value="">All Categories</option>
                            <option value="Sneakers" th:selected="${category == 'Sneakers'}">Sneakers</option>
                            <option value="Running" th:selected="${category == 'Running'}">Running</option>
                            <option value="Casual" th:selected="${category == 'Casual'}">Casual</option>
                            <option value="Sports" th:selected="${category == 'Sports'}">Sports</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-dark-solid" style="width: 100%;">Apply Filters</button>
                    <a href="/products" class="btn-outline mt-2" style="width: 100%; justify-content: center;">Clear</a>
                </form>
            </div>
        </div>

        <!-- Products List -->
        <div class="products-area">
            <div class="page-header">
                <h1 class="page-title">All Products</h1>
                <div class="results-count">Showing <span th:text="${totalItems}">0</span> results</div>
            </div>

            <div class="product-grid">
                <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="prod-card" th:each="prod : ${products}">
                    <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/300?text=No+Image'}" class="prod-img" alt="Product">
                    <div class="prod-info">
                        <div class="prod-cat" th:text="${prod.categoryName != null ? prod.categoryName : 'Uncategorized'}">Category</div>
                        <div class="prod-name" th:text="${prod.name}">Product Name</div>
                        <div class="prod-price" th:text="${'$' + prod.price}">$99.00</div>
                    </div>
                </a>
            </div>
            
            <div th:if="${#lists.isEmpty(products)}" style="text-align: center; padding: 60px; background: white; border-radius: 14px; border: 1px dashed var(--border);">
                Empty... No products found.
            </div>

            <!-- Pagination (Reuse CSS from style.css) -->
            <div class="pagination-bar" style="background: white; border-radius: 14px; border: 1px solid var(--border);" th:if="${totalPages > 1}">
                <span class="page-info">Page <strong th:text="${currentPage}">1</strong> of <strong th:text="${totalPages}">5</strong></span>
                <div class="page-btns">
                    <a class="page-btn" th:classappend="${currentPage == 1} ? 'disabled'" th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${category})}">
                        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    </a>
                    <a class="page-btn" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'" th:href="@{/products(page=${i}, keyword=${keyword}, category=${category})}" th:text="${i}">1</a>
                    <a class="page-btn" th:classappend="${currentPage == totalPages} ? 'disabled'" th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${category})}">
                        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
