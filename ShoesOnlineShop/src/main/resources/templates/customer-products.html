<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shoes Store - Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #fdfdfd; }
        .customer-topbar {
            background: var(--white); border-bottom: 1px solid var(--border);
            padding: 12px 32px; display: flex; align-items: center; gap: 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-brand { font-size: 18px; font-weight: 800; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-right: 28px;}
        .header-brand svg { width: 22px; height: 22px; fill: var(--accent); }

        .topbar-categories { display: flex; align-items: center; gap: 4px; flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .topbar-categories::-webkit-scrollbar { display: none; }
        .topbar-categories a { color: var(--text-dark); text-decoration: none; font-size: 14px; font-weight: 600; padding: 6px 10px; border-radius: 8px; transition: background 0.15s, color 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .topbar-categories a:hover { background: var(--bg); color: var(--accent); }
        .topbar-categories a.active-cat { color: var(--accent); background: var(--accent-light); }
        
        .nav-links { display: flex; gap: 20px; align-items: center; flex-shrink: 0; margin-left: 20px; }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }

        .customer-main { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .page-title { font-size: 32px; font-weight: 800; color: var(--text-dark); margin: 0;}
        .results-count { color: var(--text-mid); font-size: 15px; font-weight: 500;}

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 32px; margin-bottom: 60px;}
        .prod-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; text-decoration: none; display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; }
        .prod-card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); border-color: var(--accent); }
        .prod-img-wrapper { width: 100%; height: 260px; overflow: hidden; background: #f8f9fa; position: relative; }
        .prod-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .prod-card:hover .prod-img { transform: scale(1.08); }
        
        .prod-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .prod-cat { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 8px; }
        .prod-name { font-size: 17px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; line-height: 1.4; }
        .prod-price { font-size: 20px; font-weight: 800; color: var(--accent); margin-top: auto; }

        .empty-state { text-align: center; padding: 100px 40px; background: white; border-radius: 20px; border: 2px dashed var(--border); color: var(--text-mid); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 20px; color: var(--border); }
        
        .badge-new { position: absolute; top: 16px; left: 16px; background: var(--accent); color: white; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; z-index: 10; }
    </style>
</head>
<body>

    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>

        <nav class="topbar-categories">
            <a href="/products">Shop All</a>
            <a href="/products?category=Xu H%C6%B0%E1%BB%9Bng" th:classappend="${category == 'Xu H\u01b0\u1edbng'} ? 'active-cat' : ''">Xu Hướng</a>
            <a href="/products?category=Nam" th:classappend="${category == 'Nam'} ? 'active-cat' : ''">Nam</a>
            <a href="/products?category=N%E1%BB%AF" th:classappend="${category == 'N\u1eef'} ? 'active-cat' : ''">Nữ</a>
            <a href="/products?category=Tr%E1%BA%BB+Em" th:classappend="${category == 'Tr\u1ebb Em'} ? 'active-cat' : ''">Trẻ Em</a>
        </nav>

        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/orders">Orders</a>
            <a href="/cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
        </nav>
    </header>

    <div class="customer-main">
        <div class="page-header">
            <div>
                <h1 class="page-title" th:text="${brand != null ? 'Brand: ' + brand : (category != null ? category : (sort == 'newest' ? 'New Arrivals' : 'Our Collection'))}">Collection</h1>
                <p class="results-count mt-1" th:text="${brand != null ? 'Exclusive products from ' + brand : (category != null ? 'Discover our ' + category + ' collection.' : 'Discover our range of premium footwear.')}">Discover our range of premium footwear.</p>
            </div>
            <div class="results-count">
                <strong th:text="${totalItems}">0</strong> Products Found
            </div>
        </div>

        <div class="product-grid" th:if="${not #lists.isEmpty(products)}">
            <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="prod-card" th:each="prod : ${products}">
                <div class="prod-img-wrapper">
                    <span class="badge-new" th:if="${sort == 'newest'}">NEW</span>
                    <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/400?text=Premium+Shoes'}" class="prod-img" alt="Product">
                </div>
                <div class="prod-info">
                    <div class="prod-cat" th:text="${prod.categoryName != null ? prod.categoryName : 'Collection'}">Category</div>
                    <div class="prod-name" th:text="${prod.name}">Product Name</div>
                    <div class="prod-price" th:text="${'$' + prod.price}">$99.00</div>
                </div>
            </a>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(products)}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <h3>No products found</h3>
            <p>Try adjusting your filters or browse our other categories.</p>
            <a href="/products" class="btn btn-dark mt-3 px-4">Browse All Products</a>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>
</body>
</html>
