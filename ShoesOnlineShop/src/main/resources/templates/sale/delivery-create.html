<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Delivery</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-label {
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14.5px;
        }
    </style>
</head>

<body>
<div>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <span class="brand-name">Sale Staff</span>
        </div>

        <span class="nav-label">Management</span>

        <a th:href="@{/internal/sales/dashboard}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
        </a>
        <a th:href="@{/internal/orders}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Order Management
        </a>
        <a th:href="@{/internal/deliveries}" class="active">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            Delivery Management
        </a>
        <a th:href="@{/internal/feedbacks}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
            </svg>
            Feedback Management
        </a>
        <a th:href="@{/internal/invoices}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 14l2 2 4-4"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 3h10a2 2 0 012 2v14l-3-2-3 2-3-2-3 2V5a2 2 0 012-2z"/>
            </svg>
            Invoice Management
        </a>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h4>Create Delivery</h4>
                <p>Assign an unused order to a shipper</p>
            </div>
        </div>

        <div class="breadcrumb-bar" style="margin-bottom: 20px;">
            <a th:href="@{/}">Home</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px"><polyline points="9 18 15 12 9 6"/></svg>
            <a th:href="@{/internal/deliveries}">Delivery Management</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px"><polyline points="9 18 15 12 9 6"/></svg>
            <span>Create</span>
        </div>

        <div class="card" style="max-width: 800px;">
            <div style="margin-bottom: 24px;">
                <h4 style="font-weight: 700; color: var(--primary-color);">Create New Delivery</h4>
            </div>

            <div th:if="${errorMessage}" style="background:#fef2f2; border:1px solid #fecaca; color:#991b1b; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13.5px;">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/internal/deliveries/create}" method="post">
                <div class="mb-3">
                    <label class="form-label">Select Unassigned Order <span style="color: red;">*</span></label>
                    <select name="orderId" class="form-select" required>
                        <option value="">-- Choose an order --</option>
                        <th:block th:each="o : ${orders}">
                            <option th:value="${o.orderId}" th:text="|#${o.orderId} - ${o.user.fullName} (${o.shippingAddress})|"></option>
                        </th:block>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Shipper (Optional)</label>
                    <select name="shipperId" class="form-select">
                        <option value="">-- Leave unassigned (Open for Shippers to accept) --</option>
                        <th:block th:each="s : ${shippers}">
                            <option th:value="${s.userId}" th:text="|${s.fullName} (${s.userEmail})|"></option>
                        </th:block>
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Shipping Fee</label>
                        <input type="number" step="0.01" name="shippingFee" class="form-control" value="0" min="0">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Note for Shipper</label>
                    <textarea name="note" class="form-control" rows="3" placeholder="Additional instructions..."></textarea>
                </div>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <a th:href="@{/internal/deliveries}" class="btn-outline" style="text-decoration:none;">Cancel</a>
                    <button type="submit" class="btn-primary" style="background-color:#10b981; border:none; border-radius:8px; padding:10px 20px; font-weight:600; color:#fff;">Create Delivery</button>
                </div>
            </form>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
