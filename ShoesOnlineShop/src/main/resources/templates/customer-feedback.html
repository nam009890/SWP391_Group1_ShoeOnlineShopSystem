<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Write Review - Shoes Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #fdfdfd; }
        .customer-topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 32px;
            display: flex;
            align-items: center;
            gap: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-brand {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-right: 28px;
        }

        .header-brand svg {
            width: 22px;
            height: 22px;
            fill: var(--accent);
        }

        .topbar-categories {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .topbar-categories::-webkit-scrollbar { display: none; }
        .topbar-categories a {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .topbar-categories a:hover { background: var(--bg); color: var(--accent); }
        .cat-arrow { display: inline-block; width: 6px; height: 6px; border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; transform: rotate(45deg); margin-bottom: 2px; }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-shrink: 0;
            margin-left: 20px;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--accent); }

        .customer-main { padding: 40px; max-width: 600px; margin: 0 auto; }
        
        .feedback-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: var(--shadow-sm);}
        .rating-stars { display: flex; gap: 8px; flex-direction: row-reverse; justify-content: flex-end; margin-bottom: 24px;}
        
        .rating-stars input { display: none; }
        .rating-stars label { cursor: pointer; color: #d1d5db; transition: color .2s; }
        .rating-stars label svg { width: 32px; height: 32px; fill: currentColor; }
        
        .rating-stars input:checked ~ label,
        .rating-stars label:hover,
        .rating-stars label:hover ~ label { color: #facc15; }
        
    </style>
</head>
<body>

    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>

        <!-- Category Links (center) -->
        <nav class="topbar-categories">
            <a href="/products?category=Xu H%C6%B0%E1%BB%9Bng">Xu Hướng <span class="cat-arrow"></span></a>
            <a href="/products?category=Nam">Nam <span class="cat-arrow"></span></a>
            <a href="/products?category=N%E1%BB%AF">Nữ <span class="cat-arrow"></span></a>
            <a href="/products?category=Tr%E1%BA%BB+Em">Trẻ Em <span class="cat-arrow"></span></a>
            <a href="/products?category=Ph%E1%BB%A5+Ki%E1%BB%87n">Phụ Kiện <span class="cat-arrow"></span></a>
            <a href="/products?category=Th%C6%B0%C6%A1ng+Hi%E1%BB%87u">Thương Hiệu <span class="cat-arrow"></span></a>
            <a href="/products?category=Th%E1%BB%83+Thao">Thể Thao <span class="cat-arrow"></span></a>
        </nav>

        <!-- Right Nav -->
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/products">Shop</a>
            <a href="/orders" style="color: var(--accent)">My Orders</a>
            <a href="/cart" class="cart-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
        </nav>
    </header>

    <div class="customer-main">

        <div class="breadcrumb-bar" style="margin-bottom: 24px;">
            <a href="/orders">My Orders</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span>Write Review</span>
        </div>

        <h1 style="font-size: 26px; font-weight: 800; margin-bottom: 30px; text-align: center;">Share your experience</h1>

        <div class="feedback-card">
            <form action="/feedback/submit" method="post">
                <input type="hidden" name="orderId" th:value="${orderId}">
                <input type="hidden" name="productId" th:value="${productId}">
                
                <div class="mb-4">
                    <label class="form-label" style="font-size: 15px;">How would you rate this product?</label>
                    <div class="rating-stars">
                        <input type="radio" id="star5" name="rating" value="5" required>
                        <label for="star5" title="5 stars"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></label>
                        
                        <input type="radio" id="star4" name="rating" value="4">
                        <label for="star4" title="4 stars"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></label>
                        
                        <input type="radio" id="star3" name="rating" value="3">
                        <label for="star3" title="3 stars"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></label>
                        
                        <input type="radio" id="star2" name="rating" value="2">
                        <label for="star2" title="2 stars"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></label>
                        
                        <input type="radio" id="star1" name="rating" value="1">
                        <label for="star1" title="1 star"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" style="font-size: 15px;">Tell us more about it</label>
                    <textarea name="comments" class="form-control" rows="5" placeholder="What did you like or dislike? What did you use this product for?" required style="resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn-dark-solid" style="width: 100%; padding: 14px; font-size: 16px;">Submit Review</button>
                <a th:href="@{/orders/detail/{id}(id=${orderId})}" class="btn-outline mt-3" style="width: 100%; justify-content: center; padding: 12px; font-size: 15px;">Cancel</a>
            </form>
        </div>

    </div>

    <!-- Footer Section -->
    <div th:replace="~{footer :: footer-fragment}"></div>

</body>
</html>
