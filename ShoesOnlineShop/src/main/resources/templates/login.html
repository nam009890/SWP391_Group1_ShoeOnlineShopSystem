<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Login - ShoesOnlineShop</title>
    <!-- Use Bootstrap or basic styles -->
    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body>

<div class="login-container">
    <a th:href="@{/}" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>
    <div class="login-header">
        <h2>Customer Login</h2>
        <p>Welcome back to ShoesOnlineShop</p>
    </div>

    <div th:if="${param.error}" class="error">
        Tài khoản không tồn tại hoặc sai mật khẩu.
    </div>
    <div th:if="${param.logout}" class="success">
        Đăng xuất thành công.
    </div>
    <div th:if="${successMessage}" class="success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/login/process}" method="post" autocomplete="off">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required pattern="^\S+$" title="Username không được chứa khoảng trắng" autofocus autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn">Login</button>
        <div style="text-align: right; margin-top: 10px;">
            <a th:href="@{/forgot-password}" style="text-decoration: none; color: #6c757d; font-size: 13px;">Forgot Password?</a>
        </div>
    </form>

    <div class="divider"><span>OR</span></div>

    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google">
        Login with Google
    </a>
    
    <a th:href="@{/register}" class="internal-link" style="margin-top: 5px; color: #007bff;">Create an Account</a>
</div>

<script th:if="${param.logout}">
    // Force clear fields on logout success
    document.addEventListener("DOMContentLoaded", function() {
        var userField = document.getElementById("username");
        var passField = document.getElementById("password");
        if (userField) userField.value = "";
        if (passField) passField.value = "";
    });
</script>

</body>
</html>
