spring.application.name=ShoesOnlineShop
# Server Port
server.port=8080

# Databse Connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShoesOnlineShop;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf cache (Set false \u0111\u1ec3 khi s\u1eeda HTML n\u00f3 nh\u1eadn ngay l\u00fac dev)
spring.thymeleaf.cache=false