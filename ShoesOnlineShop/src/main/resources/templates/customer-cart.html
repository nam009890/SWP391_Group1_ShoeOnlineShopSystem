<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ShoesOnlineShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#0a0a0a;--primary-light:#1a1a2e;--accent:#e94560;--accent-hover:#ff6b81;
            --surface:#16213e;--bg:#0f0f23;--text:#eaeaea;--text-muted:#a0a0b0;
            --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);
            --radius:16px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,0.4);
            --transition:all .35s cubic-bezier(.25,.46,.45,.94);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
        a{text-decoration:none;color:inherit}

        .navbar{display:flex;justify-content:space-between;align-items:center;padding:0 3rem;height:72px;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:fixed;width:100%;top:0;z-index:1000}
        .navbar-brand{font-family:'Teko',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:3px}
        .nav-actions{display:flex;gap:1rem;align-items:center}
        .nav-actions a{color:var(--text);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:.5rem 1rem;border-radius:6px;transition:var(--transition)}
        .nav-actions a:hover{background:var(--glass);color:var(--accent)}

        .cart-container { padding: 100px 4rem 4rem; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; align-items: start; }
        .cart-header { font-family: 'Teko', sans-serif; font-size: 3rem; text-transform: uppercase; color: #fff; margin-bottom: 2rem; }
        
        .cart-items { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2rem; }
        .cart-item { display: flex; gap: 1.5rem; padding: 1.5rem 0; border-bottom: 1px solid var(--glass-border); position: relative; }
        .cart-item:last-child { border-bottom: none; padding-bottom: 0; }
        .cart-item-img { width: 120px; height: 120px; background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cart-item-img img { max-width: 80%; max-height: 80%; object-fit: contain; }
        
        .cart-item-details { flex: 1; display:flex; flex-direction: column; justify-content: center; }
        .cart-item-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 0.3rem; }
        .cart-item-price { font-size: 1rem; color: var(--accent); font-weight: 700; margin-bottom: 1rem; }
        
        .cart-item-actions { display: flex; align-items: center; justify-content: space-between; }
        .quantity-form { display: flex; align-items: center; gap: 0.5rem; }
        .quantity-input { width: 60px; padding: 0.4rem; background: var(--bg); border: 1px solid var(--glass-border); color: #fff; border-radius: 6px; text-align: center; }
        .btn-update { background: transparent; color: var(--text); border: 1px solid var(--glass-border); padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; transition: var(--transition); font-size: 0.8rem; text-transform: uppercase; }
        .btn-update:hover { background: var(--glass); color: #fff; border-color: rgba(255,255,255,0.3); }
        
        .btn-remove { position: absolute; top: 1.5rem; right: 0; background: transparent; color: var(--text-muted); border: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: color 0.3s; }
        .btn-remove:hover { color: var(--accent); }

        .cart-empty { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .cart-empty svg { width: 64px; height: 64px; stroke: var(--text-muted); margin-bottom: 1rem; }
        .btn-shop { display: inline-block; margin-top: 1.5rem; padding: 0.8rem 2rem; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #fff; border-radius: var(--radius-sm); font-weight: 600; text-transform: uppercase; }

        .cart-summary { background: var(--primary-light); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2rem; position: sticky; top: 100px; }
        .summary-title { font-family: 'Teko', sans-serif; font-size: 2rem; text-transform: uppercase; color: #fff; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--text-muted); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); font-size: 1.3rem; font-weight: 700; color: #fff; }
        .summary-total span:last-child { color: var(--accent-hover); }
        
        .btn-checkout { display: block; width: 100%; text-align: center; margin-top: 2rem; padding: 1rem; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: var(--transition); }
        .btn-checkout:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(233,69,96,0.4); }

        @media(max-width: 900px) {
            .cart-container { grid-template-columns: 1fr; padding: 100px 1.5rem 2rem; }
            .cart-summary { position: static; }
        }
    </style>
</head>
<body>
    <!-- JAVASCRIPT FOR ERROR MESSAGES (IF ANY) -->
    <script th:if="${errorMessage}">
        alert('[[${errorMessage}]]');
    </script>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
        <div class="nav-actions">
            <a th:href="@{/}">HOME</a>
            <a th:href="@{/products}">PRODUCTS</a>
            <th:block th:if="${#authorization.expression('hasRole(''CUSTOMER'')')}">
                <a th:href="@{/profile}" th:text="${#authentication.name.toUpperCase()}">USER</a>
                <a th:href="@{/logout}">LOGOUT</a>
            </th:block>
            <th:block th:unless="${#authorization.expression('hasRole(''CUSTOMER'')')}">
                <a th:href="@{/login}">LOG IN</a>
                <a th:href="@{/register}">SIGN UP</a>
            </th:block>
        </div>
    </nav>

    <div class="cart-container">
        <div>
            <h1 class="cart-header">Your Cart</h1>
            <div class="cart-items" th:if="${cartItems != null and !cartItems.isEmpty()}">
                <div class="cart-item" th:each="item : ${cartItems}">
                    <div class="cart-item-img">
                        <img th:src="${item.product.imageUrl}" alt="Product image" onerror="this.src='/images/placeholder.png'">
                    </div>
                    <div class="cart-item-details">
                        <div class="cart-item-title" th:text="${item.product.name}">Product Name</div>
                        <div class="cart-item-price" th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</div>
                        <div class="cart-item-actions">
                            <form th:action="@{/cart/update}" method="post" class="quantity-form">
                                <input type="hidden" name="cartId" th:value="${item.cartId}">
                                <input type="number" name="quantity" class="quantity-input" th:value="${item.quantity}" min="1" th:max="${item.product.stockQuantity}">
                                <button type="submit" class="btn-update">Update</button>
                            </form>
                        </div>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="cartId" th:value="${item.cartId}">
                            <button type="submit" class="btn-remove">Remove &times;</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="cart-empty" th:if="${cartItems == null or cartItems.isEmpty()}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <h2>Your cart is empty</h2>
                <p style="margin-top: 0.5rem">Looks like you haven't added any shoes yet.</p>
                <a th:href="@{/products}" class="btn-shop">Shop Now</a>
            </div>
        </div>

        <div class="cart-summary" th:if="${cartItems != null and !cartItems.isEmpty()}">
            <h2 class="summary-title">Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Calculating at checkout</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
            </div>
            <a th:href="@{/checkout}" class="btn-checkout">Proceed to Checkout</a>
        </div>
    </div>
</body>
</html>
