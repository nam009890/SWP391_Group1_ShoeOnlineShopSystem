<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
    <meta charset="UTF-8">
        <title>My Profile</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <div class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                </div>
                <span class="brand-name">Shoes Online Shop</span>
            </div>
            <span class="nav-label">Navigation</span>

            <a href="/internal/MarketingHome"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard</a>
            <a href="/internal/sliders"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/></svg> Slider</a>
            <a href="/internal/coupons"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg> Coupon Code</a>
            <a href="/internal/contents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Content</a>
            <div class="sidebar-logout">
                <a href="/internal/logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </a>
            </div>
        </div>

        <div class="main">
            <div class="topbar">
                <div>
                    <h4>My Profile</h4>
                    <p>Manage your account settings and personal information</p>
                </div>
                <!-- Removed anchor wrapper here -->
                <div class="user-pill" style="cursor:pointer;" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="user-avatar">MKT</div>
                    <div>
                        <div class="user-name" th:text="${user.userName}">Username</div>
                        <div class="user-role" th:text="${user.userRole}">Marketing</div>
                    </div>
                </div>
                                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="/internal/profile">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Edit Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="/internal/profile/change-password">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            Change Password
                        </a>
                    </li>
                </ul>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" style="padding: 12px; background: #d1fae5; color: #065f46; border-radius: 8px; font-size: 14px; margin-bottom: 20px">
                <strong th:text="${successMessage}"></strong>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" style="padding: 12px; background: #fee2e2; color: #991b1b; border-radius: 8px; font-size: 14px; margin-bottom: 20px">
                <strong th:text="${errorMessage}"></strong>
            </div>

            <div class="card" style="max-width: 720px;">
                <div class="card-header-bar">
                    <h6>Account Information</h6>
                </div>
                <div class="card-body-pad">
                    <form th:action="@{/internal/profile/update}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{userId}">

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Username (Cannot be changed)</label>
                                <input type="text" th:field="*{userName}" class="form-control" style="background:#f9fafb; cursor:not-allowed" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Role</label>
                                <input type="text" th:field="*{userRole}" class="form-control" style="background:#f9fafb; cursor:not-allowed" readonly>
                            </div>
                        </div>

                        <hr style="border-top:1px dashed var(--border); margin-bottom:24px">

                        <div class="row mb-4 align-items-start">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted">Email Address (Cannot be changed)</label>
                                <input type="email" th:field="*{userEmail}" class="form-control" style="background:#f9fafb; cursor:not-allowed" readonly>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" th:field="*{phone}" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label class="form-label">Address</label>
                                <input type="text" th:field="*{address}" class="form-control" placeholder="House number, street, city..." th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                            </div>
                        </div>

                        <div class="form-footer" style="padding:0; border:none;">
                            <button type="submit" class="btn-dark-solid" style="width: 100%">Save Profile Changes</button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
