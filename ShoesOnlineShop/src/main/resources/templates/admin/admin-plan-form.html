<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Marketing Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/shop-manager.css}">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="brand-name">Admin Panel</span>
    </div>
    <span class="nav-label">Navigation</span>

    <a href="/internal/admin/home" th:classappend="${requestURI == '/internal/admin/home' ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Home
    </a>
    <a href="/internal/admin/products" th:classappend="${requestURI.startsWith('/internal/admin/products') ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Products
    </a>
    <a href="/internal/admin/categories" th:classappend="${requestURI.startsWith('/internal/admin/categories') ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h8v8H3zM13 3h8v8h-8zM3 13h8v8H3zM13 13h8v8h-8z"/></svg> Categories
    </a>
    <a href="/internal/admin/users" th:classappend="${requestURI.startsWith('/internal/admin/users') ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> Users
    </a>
    <a href="/internal/admin/orders" th:classappend="${requestURI.startsWith('/internal/admin/orders') ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><polyline points="9 11 12 14 22 4"/></svg> Orders
    </a>
    <a href="/internal/admin/financials" th:classappend="${requestURI.startsWith('/internal/admin/financials') ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Financials
    </a>
    <span class="nav-label" style="margin-top:15px; padding-left:15px; font-size:11px; text-transform:uppercase; color:var(--text-mid); font-weight:700; letter-spacing:0.5px;">Marketing Mgmt</span>
    <a href="/internal/admin/approvals/sliders" th:classappend="${type == 'sliders' ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/></svg> Slider Approvals
    </a>
    <a href="/internal/admin/approvals/coupons" th:classappend="${type == 'coupons' ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg> Coupon Approvals
    </a>
    <a href="/internal/admin/approvals/contents" th:classappend="${type == 'contents' ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Content Approvals
    </a>
    <a href="/internal/admin/marketing-plans" th:classappend="${requestURI.startsWith('/internal/admin/marketing-plans') ? 'active' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> Marketing Plans
    </a>
    <a href="/internal/logout" style="margin-top:auto; color:#ef4444;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
</div>
<div class="main">
        <div class="topbar">
            <div>
                <h4 th:text="${plan.id != null ? 'Edit Plan' : 'Create New Plan'}">Create New Plan</h4>
                <p class="greeting-text" th:text="${plan.id != null ? 'Modify the marketing campaign details' : 'Setup a new marketing goal or promotional campaign'}">Setup a new marketing goal</p>
            </div>
            <div class="user-pill">
                <div class="user-avatar" style="background-color: var(--accent);">AD</div>
                <div><div class="user-name">Admin</div><div class="user-role">Admin</div></div>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger mb-3" role="alert" style="background: rgba(220,53,69,0.2); color:#dc3545; border:1px solid rgba(220,53,69,0.5); border-radius:12px;">
            <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${errorMessage}"></span>
        </div>

        <div class="mb-4">
            <a href="/internal/admin/marketing-plans" style="color:var(--accent); text-decoration:none;">
                <i class="fas fa-arrow-left me-1"></i> Back to Plans
            </a>
        </div>

        <div class="form-container">
            <form th:action="@{/internal/admin/marketing-plans/save}" method="post" th:object="${plan}" id="planForm">
                <input type="hidden" th:field="*{id}">
                
                <input type="hidden" th:field="*{assignedRole}" value="MARKETING_STAFF">
                
                <div class="row g-4 mb-4">
                    <div class="col-md-12">
                        <label class="form-label">Plan Title</label>
                        <input type="text" th:field="*{title}" class="form-control-dark" placeholder="E.g. Lunar New Year Mega Sale" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Plan Description & Objectives</label>
                    <textarea th:field="*{description}" class="form-control-dark" rows="5" placeholder="Detailed description of what needs to be achieved..." required></textarea>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Start Date</label>
                        <input type="date" th:field="*{startDate}" class="form-control-dark" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">End Date</label>
                        <input type="date" th:field="*{endDate}" class="form-control-dark" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Initial Status</label>
                        <select th:field="*{status}" class="form-select-dark" required>
                            <option value="OPEN">Open (Not Started)</option>
                            <option value="IN_PROGRESS">In Progress</option>
                        </select>
                    </div>
                </div>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 30px 0;">

                <div class="d-flex justify-content-end gap-3">
                    <a href="/internal/admin/marketing-plans" class="btn" style="border:1px solid var(--border); color:var(--text-mid); border-radius:10px; padding:10px 24px;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="background:var(--accent); border:none; border-radius:10px; padding:10px 30px;">
                        <i class="fas fa-save me-1"></i> <span th:text="${plan.id != null ? 'Update Plan' : 'Save Plan'}">Save Plan</span>
                    </button>
                </div>
                
            </form>

            <script>
                document.getElementById('planForm').addEventListener('submit', function(e) {
                    var startDate = document.querySelector('[name="startDate"]').value;
                    var endDate = document.querySelector('[name="endDate"]').value;
                    if (startDate && endDate && new Date(endDate) < new Date(startDate)) {
                        e.preventDefault();
                        alert('End date must be after or equal to start date!');
                    }
                });
            </script>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
