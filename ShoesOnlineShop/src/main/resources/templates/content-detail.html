<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Content Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-container">
    <div class="sidebar">
        <a href="/sliders">Slider management</a>
        <a href="/coupons">Coupon code management</a>
        <a href="/contents" class="active">Content management</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between mb-5">
            <h5 class="text-secondary">Content Detail</h5>
            <span>Username</span>
        </div>

        <div class="bg-white border border-secondary p-5 mx-auto shadow-sm" style="max-width: 900px;">
            <div class="text-center mb-4">
                <span class="badge bg-secondary mb-2" th:text="${content.contentType}">Type</span>
                <h2 class="fw-bold" th:text="${content.contentTitle}">Tên bài đăng</h2>
                <small class="text-muted">Ngày tạo: <span th:text="${#temporals.format(content.createdAt, 'dd/MM/yyyy')}"></span></small>
            </div>
            
            <div class="text-center mb-4" th:if="${content.imageUrl != null and !content.imageUrl.isEmpty()}">
                <img th:src="${content.imageUrl}" class="img-fluid rounded" alt="Thumbnail" style="max-height: 400px; object-fit: cover;">
            </div>

            <hr>

            <div class="content-body fs-5 mt-4" style="line-height: 1.8;" th:utext="${content.contentText}">
                Nội dung bài viết sẽ hiển thị ở đây...
            </div>

            <div class="mt-5 text-center">
                <a href="/contents" class="btn btn-light border shadow-sm px-5">Back to List</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
