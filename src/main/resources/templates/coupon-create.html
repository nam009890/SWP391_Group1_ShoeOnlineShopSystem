<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Create Coupon Code</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <div class="main-container">
            <div class="sidebar">
                <a href="#">Slider management</a>
                <a href="/coupons" class="active">Coupon code management</a>
                <a href="#">Content management</a>
            </div>

            <div class="content">
                <div class="d-flex justify-content-between mb-4">
                    <h4>Create Coupon Code</h4>
                    <span>Username</span>
                </div>

                <div class="form-blue-box">
                    <form th:action="@{/coupons/save}" th:object="${coupon}" method="post">

                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3 text-end"><label>Name of Coupon</label></div>
                            <div class="col-md-6">
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Enter Coupon Name">
                                <div class="text-danger-custom" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Error</div>
                            </div>
                        </div>

                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3 text-end"><label>Coupon Code</label></div>
                            <div class="col-md-4">
                                <input type="text" id="couponCodeInput" th:field="*{code}" class="form-control" placeholder="Enter Coupon code">
                                <div class="text-danger-custom" th:if="${#fields.hasErrors('code')}" th:errors="*{code}">Error</div>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-random" onclick="generateRandomCode()">Random Code</button>
                            </div>
                        </div>

                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3 text-end"><label>Discount</label></div>
                            <div class="col-md-6">
                                <select th:field="*{discountPercent}" class="form-select">
                                    <option value="">Discount</option>
                                    <option th:each="i : ${#numbers.sequence(5, 50, 5)}" 
                                            th:value="${i}" th:text="${i} + '%'">5%</option>
                                </select>
                                <div class="text-danger-custom" th:if="${#fields.hasErrors('discountPercent')}" th:errors="*{discountPercent}">Error</div>
                            </div>
                        </div>

                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3 text-end"><label>Start date</label></div>
                            <div class="col-md-6">
                                <input type="date" th:field="*{createDate}" class="form-control">
                                <div class="text-danger-custom" th:if="${#fields.hasErrors('createDate')}" th:errors="*{createDate}">Error</div>
                            </div>
                        </div>

                        <div class="row mb-3 align-items-center">
                            <div class="col-md-3 text-end"><label>End date</label></div>
                            <div class="col-md-6">
                                <input type="date" th:field="*{endDate}" class="form-control">
                                <div class="text-danger-custom" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}">Error</div>
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-add-coupon">Add Coupon code</button>
                        </div>
                    </form>
                </div>

                <p class="fw-bold">List coupon code (Recently Added)</p>
                <div class="table-responsive bg-white border mb-4">
                    <table class="table table-bordered mb-0 align-middle">
                        <thead class="table-header">
                            <tr>
                                <th>No</th>
                                <th>Coupon code</th>
                                <th>Discount</th>
                                <th>Create date</th>
                                <th>End Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c, state : ${recentCoupons}">
                                <td th:text="${state.count}">1</td>
                                <td th:text="${c.code}">CODE</td>
                                <td th:text="${c.discountPercent} + '%'">50%</td>
                                <td th:text="${c.createDate}">Date</td>
                                <td th:text="${c.endDate}">Date</td>
                                <td>
                                    <a th:href="@{/coupons/edit/{id}(id=${c.id})}" 
                                       class="text-primary text-decoration-none me-2">Update</a>

                                    <a th:href="@{/coupons/delete/{id}(id=${c.id}, redirect='create')}" 
                                       onclick="return confirm('Bạn có chắc muốn xóa mã này khỏi danh sách vừa tạo?')"
                                       class="text-danger text-decoration-none">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/coupons}" class="btn btn-light border px-4">Back</a>
                    <a href="/coupons" class="btn btn-light border px-4">Create</a> </div>

            </div>
        </div>

        <script>
            function generateRandomCode() {
                const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let result = '';
                const length = 8; // Độ dài mã
                for (let i = 0; i < length; i++) {
                    result += characters.charAt(Math.floor(Math.random() * characters.length));
                }
                document.getElementById('couponCodeInput').value = result;
            }
        </script>

    </body>
</html>
