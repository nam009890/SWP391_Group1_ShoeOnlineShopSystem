<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ShoesOnlineShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/customer-checkout.css}">
</head>
<body>
    <script th:if="${errorMessage}">
        alert('[[${errorMessage}]]');
    </script>
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
        <a th:href="@{/cart}" style="color:var(--text-muted); font-size:0.9rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; transition:color 0.3s;">&larr; Back to Cart</a>
    </nav>

    <form th:action="@{/checkout/process}" method="post" class="checkout-container">
        <div class="checkout-form-section">
            <h1 class="checkout-header">Checkout</h1>
            
            <div class="form-section-title">Shipping Information</div>
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" th:value="${user.fullName}" readonly style="opacity:0.7">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number (10 digits starting with 0)</label>
                <input type="text" class="form-control" name="phone" th:value="${user.phone}" required pattern="^0\d{9}$">
            </div>
            <div class="form-group">
                <label class="form-label">Delivery Address</label>
                <textarea class="form-control" name="address" rows="3" required th:text="${user.address}"></textarea>
            </div>

            <div class="form-section-title" style="margin-top: 3rem;">Apply Coupon</div>
            <div class="form-group">
                <select name="couponId" id="couponSelect" class="form-control" onchange="updateDiscount()">
                    <option value="">Select a coupon (Optional)</option>
                    <option th:each="c : ${coupons}" 
                            th:value="${c.coupon.id}" 
                            th:data-discount="${c.coupon.discountPercent}"
                            th:text="${c.coupon.couponName} + ' (' + ${c.coupon.discountPercent} + '% OFF)'">
                    </option>
                </select>
            </div>

            <div class="form-section-title" style="margin-top: 3rem;">Payment Method</div>
            <div class="payment-methods">
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="VNPAY" checked>
                    <div style="display:flex; flex-direction:column;">
                        <span class="payment-option-label">VNPay Gateway</span>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Pay securely via VNPay</span>
                    </div>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="COD">
                    <div style="display:flex; flex-direction:column;">
                        <span class="payment-option-label">Cash on Delivery (COD)</span>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Pay when you receive the order</span>
                    </div>
                </label>
            </div>
            
            <button type="submit" class="btn-submit">Place Order & Pay</button>
        </div>

        <div class="order-summary">
            <h2 class="form-section-title" style="margin-bottom:2rem;">Order Summary</h2>
            
            <div class="summary-item" th:each="item : ${cartItems}">
                <div class="summary-item-info">
                    <div class="item-img">
                        <img th:src="${item.product.imageUrl}" onerror="this.src='/images/placeholder.png'">
                    </div>
                    <div>
                        <div class="item-name" th:text="${item.product.name}">Product</div>
                        <div class="item-qty" th:text="'Qty: ' + ${item.quantity}">Qty: 1</div>
                    </div>
                </div>
                <div class="item-price" th:text="${#numbers.formatDecimal(item.product.price.doubleValue() * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</div>
            </div>

            <div class="summary-totals">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                </div>
                <div class="total-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="total-row" id="discount-row" style="display: none; color: var(--accent);">
                    <span>Discount</span>
                    <span id="summary-discount">-0 ₫</span>
                </div>
                <div class="total-row final">
                    <span>Total</span>
                    <span id="summary-total" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                </div>
            </div>
        </div>
    </form>

    <script th:inline="javascript">
        /*<![CDATA[*/
        function updateDiscount() {
            const select = document.getElementById('couponSelect');
            const subtotal = /*[[${totalAmount}]]*/ 0;
            const discountPercent = select.options[select.selectedIndex].getAttribute('data-discount') || 0;
            
            const discountAmount = (subtotal * discountPercent) / 100;
            const finalTotal = subtotal - discountAmount;

            const discRow = document.getElementById('discount-row');
            const discText = document.getElementById('summary-discount');
            const totalText = document.getElementById('summary-total');

            if (discountAmount > 0) {
                discRow.style.display = 'flex';
                discText.innerText = '-' + new Intl.NumberFormat('vi-VN').format(discountAmount) + ' ₫';
            } else {
                discRow.style.display = 'none';
            }

            totalText.innerText = new Intl.NumberFormat('vi-VN').format(finalTotal) + ' ₫';
        }
        /*]]>*/
    </script>
</body>
</html>
