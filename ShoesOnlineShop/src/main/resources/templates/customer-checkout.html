<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ShoesOnlineShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#0a0a0a;--primary-light:#1a1a2e;--accent:#e94560;--accent-hover:#ff6b81;
            --surface:#16213e;--bg:#0f0f23;--text:#eaeaea;--text-muted:#a0a0b0;
            --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);
            --radius:16px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,0.4);
            --transition:all .35s cubic-bezier(.25,.46,.45,.94);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
        a{text-decoration:none;color:inherit}

        .navbar{display:flex;justify-content:space-between;align-items:center;padding:0 3rem;height:72px;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:fixed;width:100%;top:0;z-index:1000}
        .navbar-brand{font-family:'Teko',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:3px}
        
        .checkout-container { padding: 100px 4rem 4rem; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 3rem; align-items: start; }
        .checkout-header { font-family: 'Teko', sans-serif; font-size: 3rem; text-transform: uppercase; color: #fff; margin-bottom: 2rem; }
        
        .checkout-form-section { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2.5rem; }
        .form-section-title { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 1rem; background: var(--bg); border: 1px solid var(--glass-border); color: #fff; border-radius: 8px; font-family: inherit; font-size: 1rem; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(233,69,96,0.1); }
        
        .payment-methods { display: flex; flex-direction: column; gap: 1rem; }
        .payment-option { display: flex; align-items: center; gap: 1rem; padding: 1.2rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 8px; cursor: pointer; transition: var(--transition); }
        .payment-option:hover { border-color: rgba(255,255,255,0.3); }
        .payment-option input[type="radio"] { accent-color: var(--accent); width: 20px; height: 20px; }
        .payment-option-label { font-weight: 600; font-size: 1.1rem; color: #fff; }

        .order-summary { background: var(--primary-light); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 2.5rem; position: sticky; top: 100px; }
        .summary-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .summary-item-info { display: flex; align-items: center; gap: 1rem; }
        .item-img { width: 60px; height: 60px; background: var(--surface); border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .item-img img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .item-name { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .item-qty { font-size: 0.85rem; color: var(--text-muted); }
        .item-price { font-weight: 700; color: var(--text); }
        
        .summary-totals { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1rem; color: var(--text-muted); }
        .total-row.final { font-size: 1.4rem; font-weight: 700; color: #fff; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--glass-border); }
        .total-row.final span:last-child { color: var(--accent-hover); }

        .btn-submit { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: var(--transition); margin-top: 2rem; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(233,69,96,0.4); }

        @media(max-width: 900px) {
            .checkout-container { grid-template-columns: 1fr; padding: 100px 1.5rem 2rem; }
            .order-summary { position: static; }
        }
    </style>
</head>
<body>
    <script th:if="${errorMessage}">
        alert('[[${errorMessage}]]');
    </script>
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
        <a th:href="@{/cart}" style="color:var(--text-muted); font-size:0.9rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; transition:color 0.3s;">&larr; Back to Cart</a>
    </nav>

    <form th:action="@{/checkout/process}" method="post" class="checkout-container">
        <div class="checkout-form-section">
            <h1 class="checkout-header">Checkout</h1>
            
            <div class="form-section-title">Shipping Information</div>
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" th:value="${user.fullName}" readonly style="opacity:0.7">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number (10 digits starting with 0)</label>
                <input type="text" class="form-control" name="phone" th:value="${user.phone}" required pattern="^0\d{9}$">
            </div>
            <div class="form-group">
                <label class="form-label">Delivery Address</label>
                <textarea class="form-control" name="address" rows="3" required th:text="${user.address}"></textarea>
            </div>

            <div class="form-section-title" style="margin-top: 3rem;">Apply Coupon</div>
            <div class="form-group">
                <select name="couponId" id="couponSelect" class="form-control" onchange="updateDiscount()">
                    <option value="">Select a coupon (Optional)</option>
                    <option th:each="c : ${coupons}" 
                            th:value="${c.coupon.id}" 
                            th:data-discount="${c.coupon.discountPercent}"
                            th:text="${c.coupon.couponName} + ' (' + ${c.coupon.discountPercent} + '% OFF)'">
                    </option>
                </select>
            </div>

            <div class="form-section-title" style="margin-top: 3rem;">Payment Method</div>
            <div class="payment-methods">
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="VNPAY" checked>
                    <div style="display:flex; flex-direction:column;">
                        <span class="payment-option-label">VNPay Gateway</span>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Pay securely via VNPay</span>
                    </div>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="COD">
                    <div style="display:flex; flex-direction:column;">
                        <span class="payment-option-label">Cash on Delivery (COD)</span>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Pay when you receive the order</span>
                    </div>
                </label>
            </div>
            
            <button type="submit" class="btn-submit">Place Order & Pay</button>
        </div>

        <div class="order-summary">
            <h2 class="form-section-title" style="margin-bottom:2rem;">Order Summary</h2>
            
            <div class="summary-item" th:each="item : ${cartItems}">
                <div class="summary-item-info">
                    <div class="item-img">
                        <img th:src="${item.product.imageUrl}" onerror="this.src='/images/placeholder.png'">
                    </div>
                    <div>
                        <div class="item-name" th:text="${item.product.name}">Product</div>
                        <div class="item-qty" th:text="'Qty: ' + ${item.quantity}">Qty: 1</div>
                    </div>
                </div>
                <div class="item-price" th:text="${#numbers.formatDecimal(item.product.price.doubleValue() * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</div>
            </div>

            <div class="summary-totals">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                </div>
                <div class="total-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="total-row" id="discount-row" style="display: none; color: var(--accent);">
                    <span>Discount</span>
                    <span id="summary-discount">-0 ₫</span>
                </div>
                <div class="total-row final">
                    <span>Total</span>
                    <span id="summary-total" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>
                </div>
            </div>
        </div>
    </form>

    <script th:inline="javascript">
        /*<![CDATA[*/
        function updateDiscount() {
            const select = document.getElementById('couponSelect');
            const subtotal = /*[[${totalAmount}]]*/ 0;
            const discountPercent = select.options[select.selectedIndex].getAttribute('data-discount') || 0;
            
            const discountAmount = (subtotal * discountPercent) / 100;
            const finalTotal = subtotal - discountAmount;

            const discRow = document.getElementById('discount-row');
            const discText = document.getElementById('summary-discount');
            const totalText = document.getElementById('summary-total');

            if (discountAmount > 0) {
                discRow.style.display = 'flex';
                discText.innerText = '-' + new Intl.NumberFormat('vi-VN').format(discountAmount) + ' ₫';
            } else {
                discRow.style.display = 'none';
            }

            totalText.innerText = new Intl.NumberFormat('vi-VN').format(finalTotal) + ' ₫';
        }
        /*]]>*/
    </script>
</body>
</html>
