<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Coupon Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <div style="height: 100px;"></div> <a href="/sliders">Slider management</a>
        <a href="/coupons" class="active">Coupon code management</a>
        <a href="/contents">Content management</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between align-items-center mb-4 px-4">
            <h5 class="m-0 text-dark">Update Coupon Code</h5>
            <span class="text-dark">Username</span>
        </div>

        <form th:action="@{/coupons/save}" th:object="${coupon}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <div class="form-box">
                <div class="row mb-4 align-items-center">
                    <div class="col-md-3 text-start"><label>Name of Coupon</label></div>
                    <div class="col-md-6">
                        <input type="text" th:field="*{couponName}" class="form-control rounded-0" placeholder="Enter Coupon Name" th:classappend="${#fields.hasErrors('couponName')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback bg-white px-2 mt-1" th:if="${#fields.hasErrors('couponName')}" th:errors="*{couponName}"></div>
                    </div>
                </div>

                <div class="row mb-4 align-items-center">
                    <div class="col-md-3 text-start"><label>Coupon Code</label></div>
                    <div class="col-md-6">
                        <input type="text" th:field="*{couponCode}" id="couponCodeInput" class="form-control rounded-0" placeholder="Enter Coupon code" th:classappend="${#fields.hasErrors('couponCode')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback bg-white px-2 mt-1" th:if="${#fields.hasErrors('couponCode')}" th:errors="*{couponCode}"></div>
                    </div>
                    <div class="col-md-3">
                        <button type="button" class="btn btn-light rounded-1 border shadow-sm" onclick="generateRandomCode()">Random Code</button>
                    </div>
                </div>

                <div class="row mb-4 align-items-center">
                    <div class="col-md-3 text-start"><label>Discount</label></div>
                    <div class="col-md-6">
                        <select th:field="*{discountPercent}" class="form-select rounded-0" th:classappend="${#fields.hasErrors('discountPercent')} ? 'is-invalid' : ''">
                            <option value="">Discount</option>
                            <option value="5">5%</option>
                            <option value="10">10%</option>
                            <option value="15">15%</option>
                            <option value="20">20%</option>
                            <option value="50">50%</option>
                        </select>
                        <div class="invalid-feedback bg-white px-2 mt-1" th:if="${#fields.hasErrors('discountPercent')}" th:errors="*{discountPercent}"></div>
                    </div>
                </div>

                <div class="row mb-4 align-items-center">
                    <div class="col-md-3 text-start"><label>Start date</label></div>
                    <div class="col-md-6">
                        <input type="date" th:field="*{createDate}" class="form-control rounded-0" th:classappend="${#fields.hasErrors('createDate')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback bg-white px-2 mt-1" th:if="${#fields.hasErrors('createDate')}" th:errors="*{createDate}"></div>
                    </div>
                </div>

                <div class="row mb-2 align-items-center">
                    <div class="col-md-3 text-start"><label>End date</label></div>
                    <div class="col-md-6">
                        <input type="date" th:field="*{endDate}" class="form-control rounded-0" th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback bg-white px-2 mt-1" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-buttons">
                <a href="/coupons" class="btn btn-light rounded-1 border shadow-sm px-4">Back</a>
                <button type="submit" class="btn btn-light rounded-1 border shadow-sm px-4">Update</button>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function generateRandomCode() {
        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = 'SALE-';
        for (let i = 0; i < 6; i++) {
            result += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        document.getElementById('couponCodeInput').value = result;
    }
</script>
</body>
</html>
