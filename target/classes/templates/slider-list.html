<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Slider Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="main-container">
    <div class="sidebar">
        <a href="/sliders" class="active">Slider management</a>
        <a href="/coupons">Coupon code management</a>
        <a href="/contents">Content management</a>
    </div>

    <div class="content">
        
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h5 class="text-dark m-0">Slider management</h5>
            <span class="text-dark">Username</span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <form th:action="@{/sliders}" method="get" class="d-flex gap-2">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Enter name of slider" style="width: 250px;">
                <button type="submit" class="btn btn-light border shadow-sm px-3">Search</button>
            </form>
            <a th:href="@{/sliders/create}" class="btn btn-light border shadow-sm px-4">Create Slider</a>
        </div>

        <div class="bg-white border">
            <table class="table table-bordered text-center align-middle mb-0">
                <thead class="table-header">
                    <tr>
                        <th>No</th>
                        <th>Name of slider</th>
                        <th>description</th>
                        <th>Create date</th>
                        <th>action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="slider, state : ${sliders}">
                        <td th:text="${(currentPage - 1) * 5 + state.count}">1</td>
                        <td th:text="${slider.sliderTitle}">Super sale 1/1</td>
                        <td></td>
                        <td th:text="${#temporals.format(slider.createdAt, 'dd/MM/yyyy')}">25/10/2024</td>
                        <td>
                            <a th:href="@{/sliders/update/{id}(id=${slider.id})}" class="btn btn-light border shadow-sm btn-action">Update</a>
                            <a th:href="@{/sliders/delete/{id}(id=${slider.id})}" class="btn btn-light border shadow-sm btn-action" onclick="return confirm('Are you sure you want to delete?');">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav class="mt-4" th:if="${totalPages > 0}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="${currentPage > 1} ? @{/sliders(page=${currentPage - 1}, keyword=${keyword})} : '#'">Previous</a>
                </li>
                
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/sliders(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                </li>
                
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="${currentPage < totalPages} ? @{/sliders(page=${currentPage + 1}, keyword=${keyword})} : '#'">Next</a>
                </li>
            </ul>
        </nav>

    </div>
</div>

</body>
</html>
