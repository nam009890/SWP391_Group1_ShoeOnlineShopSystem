<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <span class="brand-name">Sale Staff</span>
    </div>

    <span class="nav-label">Management</span>

    <a th:href="@{/internal/orders}" class="active">
        Order Management
    </a>

    <a th:href="@{/internal/feedbacks}">
        Feedback Management
    </a>

    <div class="sidebar-logout">
        <a th:href="@{/internal/logout}">Logout</a>
    </div>
</aside>


<main class="main">

    <div class="topbar">
        <div>
            <h4>Order Detail</h4>
        </div>

        <a href="/internal/admin/profile" style="text-decoration:none;">
        <div class="user-pill">
            <div class="user-avatar">SS</div>
            <div>
                <div class="user-name">Sale Staff</div>
                <div class="user-role">Administrator</div>
            </div>
        </div>
        </a>
    </div>


    <div class="breadcrumb-bar">
        <a th:href="@{/}">Home</a>
        <span>></span>
        <a th:href="@{/internal/orders}">Order Management</a>
        <span>></span>
        <span>Order Detail</span>
    </div>


    <div class="card mx-auto" style="max-width:640px;">

        <div class="card-header-bar">
            <h6>Order Information</h6>
            <span class="badge-coupon" th:text="'#' + ${order.orderId}"></span>
        </div>


        <div class="card-body-pad">

            <div class="detail-row">
                <span class="detail-label">Order ID</span>
                <span class="detail-value" th:text="${order.orderId}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Phone</span>
                <span class="detail-value" th:text="${order.phone}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Shipping Address</span>
                <span class="detail-value" th:text="${order.shippingAddress}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Product</span>
                <span class="detail-value"
                      th:text="${order.orderDetails[0].product.productName}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Quantity</span>
                <span class="detail-value"
                      th:text="${order.orderDetails[0].quantity}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="status-badge status-active"
                      th:text="${order.orderStatus}">
                </span>
            </div>

        </div>


        <div class="form-footer">
            <a th:href="@{/internal/orders}" class="btn-outline">
                Back
            </a>
        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
