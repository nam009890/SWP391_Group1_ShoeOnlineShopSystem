<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.name} + ' - Shoes Store'">Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #fdfdfd; }
        .customer-topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .header-brand { font-size: 20px; font-weight: 800; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .header-brand svg { width: 24px; height: 24px; fill: var(--accent); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 15px; }
        .customer-main { padding: 40px; max-width: 1000px; margin: 0 auto; }
        
        .detail-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 40px; display: flex; gap: 40px; margin-bottom: 40px; }
        .detail-img-col { flex: 1; }
        .detail-img { width: 100%; height: 400px; object-fit: cover; border-radius: 12px; background: #f5f6f8; }
        
        .detail-info-col { flex: 1; display: flex; flex-direction: column; }
        .d-cat { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
        .d-name { font-size: 32px; font-weight: 800; color: var(--text-dark); margin-bottom: 16px; line-height: 1.2;}
        .d-price { font-size: 28px; font-weight: 800; color: var(--text-dark); margin-bottom: 24px; }
        
        .qty-box { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .qty-input { width: 80px; text-align: center; }
        
        .add-cart-btn { padding: 14px 0; width: 100%; display: flex; justify-content: center; font-size: 16px; }
        
        .alert-toast { position: fixed; bottom: 20px; right: 20px; z-index: 1050; border-radius: 8px; box-shadow: var(--shadow-md); padding: 15px 24px; display: flex; gap: 10px; align-items: center; background: var(--text-dark); color: white;}
    </style>
</head>
<body>

    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/products" style="color: var(--accent)">Shop</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
        </nav>
    </header>

    <div class="customer-main">
        
        <!-- Toast Notification -->
        <div th:if="${message}" class="alert-toast">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--success)" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span th:text="${message}"></span>
        </div>

        <div class="breadcrumb-bar" style="margin-bottom: 24px;">
            <a href="/products">Shop</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span th:text="${product.name}">Product</span>
        </div>

        <div class="detail-card">
            <div class="detail-img-col">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/500?text=No+Image'}" class="detail-img" alt="Product Image">
            </div>
            <div class="detail-info-col">
                <div class="d-cat" th:text="${product.categoryName != null ? product.categoryName : 'Uncategorized'}">Category</div>
                <h1 class="d-name" th:text="${product.name}">Product Name</h1>
                <div class="d-price" th:text="${'$' + product.price}">$99.00</div>
                
                <p style="color: var(--text-mid); line-height: 1.6; margin-bottom: 30px;">
                    Experience comfort and style with our premium quality shoes. Designed for durability and everyday wear.
                </p>
                
                <div style="margin-bottom: 12px; font-weight: 600; font-size: 13px;">Stock: <span th:text="${product.stockQuantity}">10</span></div>

                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <div class="qty-box">
                        <label style="font-weight: 600; font-size: 14px;">Quantity</label>
                        <input type="number" name="quantity" class="form-control qty-input" value="1" min="1" th:max="${product.stockQuantity}">
                    </div>
                    
                    <button type="submit" class="btn-dark-solid add-cart-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                        Add to Cart
                    </button>
                </form>
            </div>
        </div>
        
        <!-- Feedback section could be added here later -->

    </div>

    <!-- Auto close toast -->
    <script th:if="${message}">
        setTimeout(function() {
            document.querySelector('.alert-toast').style.display = 'none';
        }, 3000);
    </script>
</body>
</html>
