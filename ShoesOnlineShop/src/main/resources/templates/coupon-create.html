<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Coupon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-container">
    <div class="sidebar">
        <a href="/sliders">Slider management</a>
        <a href="/coupons" class="active">Coupon code management</a>
        <a href="/contents">Content management</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between mb-5">
            <h5 class="text-secondary">Create Coupon</h5>
            <span>Username</span>
        </div>

        <div class="bg-white border border-secondary p-4 mx-auto" style="max-width: 800px;">
            <form th:action="@{/coupons/save}" th:object="${coupon}" method="post">
                
                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Name of Coupon Code</label></div>
                    <div class="col-md-9">
                        <input type="text" th:field="*{couponName}" class="form-control" th:classappend="${#fields.hasErrors('couponName')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('couponName')}" th:errors="*{couponName}"></div>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Code</label></div>
                    <div class="col-md-9">
                        <div class="input-group">
                            <input type="text" id="couponCodeInput" th:field="*{couponCode}" class="form-control" th:classappend="${#fields.hasErrors('couponCode')} ? 'is-invalid' : ''">
                            <button class="btn btn-outline-secondary fw-bold" type="button" onclick="generateRandomCode()">Random Code</button>
                        </div>
                        <div class="text-danger mt-1" style="font-size: 0.875em;" th:if="${#fields.hasErrors('couponCode')}" th:errors="*{couponCode}"></div>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Discount (%)</label></div>
                    <div class="col-md-9">
                        <select th:field="*{discountPercent}" class="form-select" th:classappend="${#fields.hasErrors('discountPercent')} ? 'is-invalid' : ''">
                            <option value="">-- Select Discount --</option>
                            <option th:each="i : ${#numbers.sequence(5, 50, 5)}" th:value="${i}" th:text="${i + '%'}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('discountPercent')}" th:errors="*{discountPercent}"></div>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Start Date</label></div>
                    <div class="col-md-9">
                        <input type="date" th:field="*{createDate}" class="form-control" th:classappend="${#fields.hasErrors('createDate')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('createDate')}" th:errors="*{createDate}"></div>
                    </div>
                </div>

                <div class="row mb-4 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">End Date</label></div>
                    <div class="col-md-9">
                        <input type="date" th:field="*{endDate}" class="form-control" th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-9 offset-md-3">
                        <button type="submit" class="btn btn-dark shadow-sm px-4">Submit</button>
                        <a href="/coupons" class="btn btn-light border ms-2 px-4">Back</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function generateRandomCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = 'CP'; // Tiền tố mặc định
        for (let i = 0; i < 6; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('couponCodeInput').value = code;
    }
</script>
</body>
</html>
