<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Order</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 col-md-6 mx-auto">

        <h3 class="text-center mb-4">Edit Order</h3>

        <form th:action="@{/orders/update}" method="post">
<div th:if="${successMessage}" 
     class="alert alert-success alert-dismissible fade show">
    <span th:text="${successMessage}"></span>
</div>

<div th:if="${errorMessage}" 
     class="alert alert-danger alert-dismissible fade show">
    <span th:text="${errorMessage}"></span>
</div>
            <input type="hidden" name="id" th:value="${order.orderId}" />

            <!-- Order ID -->
            <div class="mb-3">
                <label>Order ID</label>
                <input type="text" class="form-control"
                       th:value="${order.orderId}" readonly>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label>Enter Phone</label>
                <input type="text" class="form-control"
                       name="phone"
                       th:value="${order.phone}">
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label>Enter Address</label>
                <input type="text" class="form-control"
                       name="address"
                       th:value="${order.shippingAddress}">
            </div>

            <!-- Product (ONLY VIEW) -->
            <div class="mb-3">
                <label>Select Product</label>
                <input type="text"
                       class="form-control"
                       th:value="${order.orderDetails[0].product.productName}"
                       readonly>
            </div>

            <!-- Quantity -->
            <div class="mb-3">
                <label>Enter Quantity</label>
                <input type="number"
                       class="form-control"
                       name="quantity"
                       th:value="${order.orderDetails[0].quantity}">
            </div>

            <!-- Status -->
            <div class="mb-3">
                <label>Select Status</label>
                <select name="status" class="form-control">
                    <option th:each="s : ${statuses}"
                            th:value="${s}"
                            th:text="${s}"
                            th:selected="${s == order.orderStatus}">
                    </option>
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/orders}" class="btn btn-secondary">
                    Back to Home
                </a>

                <button type="submit" class="btn btn-primary">
                    Finish Edit
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
