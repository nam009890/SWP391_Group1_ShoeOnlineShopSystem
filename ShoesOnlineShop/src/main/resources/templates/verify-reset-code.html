<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify Code - ShoesOnlineShop</title>
    <link rel="stylesheet" th:href="@{/css/pages/verify-reset-code.css}">
</head>
<body>

<div class="login-container">
    <a th:href="@{/}" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>
    <div class="login-header">
        <h2>Verify Reset Code</h2>
        <p>Enter the 6-digit code sent to your email</p>
    </div>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/verify-reset-code}" method="post">
        <input type="hidden" name="email" th:value="${email}">
        <div class="form-group">
            <label for="code">Verification Code</label>
            <input type="text" id="code" name="code" class="form-control" placeholder="123456" required maxlength="6" pattern="\d{6}">
        </div>
        <button type="submit" class="btn">Verify Code</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <span style="font-size: 14px; color: #666;">Didn't receive code? </span>
        <a th:href="@{/forgot-password}" style="text-decoration: none; color: #007bff; font-size: 14px;">Try Again</a>
    </div>
</div>

</body>
</html>
