<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shoes Online Shop - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Customer Specific Styles */
        body { background: #fdfdfd; }
        .customer-topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-brand { font-size: 20px; font-weight: 800; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .header-brand svg { width: 24px; height: 24px; fill: var(--accent); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 15px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }
        .cart-icon { position: relative; }
        .cart-badge { 
            position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; 
            font-size: 10px; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
        }
        .customer-main { padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        /* Hero Carousel */
        .hero { margin-bottom: 50px; border-radius: 16px; overflow: hidden; position: relative; }
        .carousel-item img { height: 400px; object-fit: cover; border-radius: 16px; width: 100%;}
        
        /* Section Title */
        .section-title { font-size: 24px; font-weight: 800; margin-bottom: 24px; color: var(--text-dark); display: flex; align-items: center; justify-content: space-between; }
        
        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; margin-bottom: 50px;}
        .prod-card {
            background: var(--white); border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; text-decoration: none; display: block; transition: transform .2s, box-shadow .2s;
        }
        .prod-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .prod-img { width: 100%; height: 220px; object-fit: cover; background: #f5f6f8; }
        .prod-info { padding: 16px; }
        .prod-cat { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 4px; }
        .prod-name { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-price { font-size: 18px; font-weight: 800; color: var(--accent); display: flex; align-items: center; justify-content: space-between; }
        
        /* Banners */
        .banner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 60px; }
        .promo-banner { border-radius: 14px; overflow: hidden; height: 200px; position: relative; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .promo-banner:hover img { transform: scale(1.05); }
        .promo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; }
        .promo-title { color: white; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        
    </style>
</head>
<body>

    <!-- Customer Topbar -->
    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/products">Shop</a>
            <a href="/orders">My Orders</a>
            <a href="/cart" class="cart-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                <!-- <span class="cart-badge">2</span> -->
            </a>
            <a href="/login" class="btn-dark-solid" style="padding: 6px 16px; border-radius: 20px; font-size: 13px;">Login</a>
        </nav>
    </header>

    <div class="customer-main">
        <!-- Hero Sliders -->
        <div id="heroCarousel" class="carousel slide hero" data-bs-ride="carousel" th:if="${not #lists.isEmpty(sliders)}">
            <div class="carousel-inner">
                <div th:each="slider, iterStat : ${sliders}" class="carousel-item" th:classappend="${iterStat.index == 0} ? 'active'">
                    <img th:src="${slider.imageUrl}" class="d-block w-100" th:alt="${slider.sliderTitle}">
                    <div class="carousel-caption d-none d-md-block" style="background: rgba(0,0,0,0.5); border-radius: 12px; padding: 20px;">
                        <h5 th:text="${slider.sliderTitle}" style="font-weight: 800; font-size: 28px;">Slider Title</h5>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

        <!-- Promo Banners -->
        <div class="banner-grid" th:if="${not #lists.isEmpty(banners)}">
            <a href="#" class="promo-banner" th:each="banner : ${banners}">
                <img th:src="${banner.imageUrl != null ? banner.imageUrl : 'https://via.placeholder.com/600x200?text=Banner'}" alt="Banner">
                <div class="promo-overlay">
                    <div class="promo-title" th:text="${banner.contentTitle}">Promo Title</div>
                </div>
            </a>
        </div>

        <!-- Featured Products -->
        <h2 class="section-title">
            Trending Now
            <a href="/products" style="font-size: 14px; color: var(--accent); text-decoration: none; font-weight: 600;">View All →</a>
        </h2>
        
        <div class="product-grid">
            <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="prod-card" th:each="prod : ${featuredProducts}">
                <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/300?text=No+Image'}" class="prod-img" alt="Product">
                <div class="prod-info">
                    <div class="prod-cat" th:text="${prod.categoryName != null ? prod.categoryName : 'Uncategorized'}">Category</div>
                    <div class="prod-name" th:text="${prod.name}">Product Name</div>
                    <div class="prod-price">
                        <span th:text="${'$' + prod.price}">$99.00</span>
                        <div style="background: var(--accent-light); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 12px;">View</div>
                    </div>
                </div>
            </a>
            
            <!-- Handle empty state -->
            <div th:if="${#lists.isEmpty(featuredProducts)}" style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-light);">
                No products available at the moment.
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
