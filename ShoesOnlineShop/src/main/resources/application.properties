\u00ef\u00bb\u00bfspring.application.name=ShoesOnlineShop
# Server Port
server.port=8080

# Databse Connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShoesOnlineShop;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf cache
spring.thymeleaf.cache=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
# Essential: Let Tomcat fully read the large request so it can return an HTTP response (preventing ERR_CONNECTION_RESET)
server.tomcat.max-swallow-size=-1
