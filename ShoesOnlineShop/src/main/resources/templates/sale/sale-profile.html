<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
    <meta charset="UTF-8">
        <title>My Profile</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <div class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <span class="brand-name">Sale Staff</span>
            </div>
            <span class="nav-label">Management</span>

            <a th:href="@{/internal/sales/dashboard}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Home
            </a>
            <a th:href="@{/internal/orders}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Order Management
            </a>
            <a th:href="@{/internal/deliveries}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                Delivery Management
            </a>
            <a th:href="@{/internal/feedbacks}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                Feedback Management
            </a>
            <a th:href="@{/internal/invoices}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 14l2 2 4-4"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 3h10a2 2 0 012 2v14l-3-2-3 2-3-2-3 2V5a2 2 0 012-2z"/></svg>
                Invoice Management
            </a>
            <div class="sidebar-logout" style="margin-top:auto;">
                <a th:href="@{/internal/logout}">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </a>
            </div>
        </div>

        <div class="main">
            <div class="topbar">
                <div>
                    <h4>My Profile</h4>
                    <p>Manage your account settings and personal information</p>
                </div>
                <!-- Removed anchor wrapper here -->
                <div class="user-pill" style="cursor:pointer;" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="user-avatar">SS</div>
                    <div>
                        <div class="user-name" th:text="${user.userName}">Username</div>
                        <div class="user-role" th:text="${user.userRole}">Sale Staff</div>
                    </div>
                </div>
                                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="/internal/profile">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Edit Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="/internal/profile/change-password">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            Change Password
                        </a>
                    </li>
                </ul>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" style="padding: 12px; background: #d1fae5; color: #065f46; border-radius: 8px; font-size: 14px; margin-bottom: 20px">
                <strong th:text="${successMessage}"></strong>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger" style="padding: 12px; background: #fee2e2; color: #991b1b; border-radius: 8px; font-size: 14px; margin-bottom: 20px">
                <strong th:text="${errorMessage}"></strong>
            </div>

            <div class="card" style="max-width: 720px;">
                <div class="card-header-bar">
                    <h6>Account Information</h6>
                </div>
                <div class="card-body-pad">
                    <form th:action="@{/internal/profile/update}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{userId}">

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Username (Cannot be changed)</label>
                                <input type="text" th:field="*{userName}" class="form-control" style="background:#f9fafb; cursor:not-allowed" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Role</label>
                                <input type="text" th:field="*{userRole}" class="form-control" style="background:#f9fafb; cursor:not-allowed" readonly>
                            </div>
                        </div>

                        <hr style="border-top:1px dashed var(--border); margin-bottom:24px">

                        <div class="row mb-4 align-items-start">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted">Email Address (Cannot be changed)</label>
                                <input type="email" th:field="*{userEmail}" class="form-control" style="background:#f9fafb; cursor:not-allowed" readonly>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" th:field="*{phone}" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label class="form-label">Address</label>
                                <input type="text" th:field="*{address}" class="form-control" placeholder="House number, street, city..." th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                            </div>
                        </div>

                        <div class="form-footer" style="padding:0; border:none;">
                            <button type="submit" class="btn-dark-solid" style="width: 100%">Save Profile Changes</button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
