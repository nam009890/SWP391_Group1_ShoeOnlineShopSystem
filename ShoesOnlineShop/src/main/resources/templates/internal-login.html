<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Internal Login - ShoesOnlineShop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #343a40; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 20px; }
        .login-header h2 { color: #343a40; }
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background-color: #218838; }
        .error { color: red; text-align: center; margin-bottom: 10px; font-weight: bold;}
        .success { color: green; text-align: center; margin-bottom: 10px; }
        .customer-link { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #6c757d; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2>Staff Portal</h2>
        <p>Admin, Sale & Marketing</p>
    </div>

    <div th:if="${param.error}" class="error">
        Tài khoản không tồn tại hoặc không có quyền truy cập.
    </div>
    <div th:if="${param.logout}" class="success">
        Đăng xuất thành công.
    </div>

    <form th:action="@{/internal/login/process}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Staff Username" required pattern="^\S+$" title="Username không được chứa khoảng trắng" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Password" required minlength="6">
        </div>
        <button type="submit" class="btn">Secure Login</button>
    </form>
    
    <a th:href="@{/login}" class="customer-link">&larr; Back to Shop</a>
</div>

</body>
</html>
