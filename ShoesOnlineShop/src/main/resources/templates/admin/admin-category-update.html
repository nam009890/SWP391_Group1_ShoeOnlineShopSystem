<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Update Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/pages/admin-category-update.css}">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="brand-name">Admin Panel</span>
    </div>
    <span class="nav-label">Navigation</span>
    <a href="/internal/admin/home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
    </a>
    <a href="/internal/admin/products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Products
    </a>
    <a href="/internal/admin/categories" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h8v8H3zM13 3h8v8h-8zM3 13h8v8H3zM13 13h8v8h-8z"/></svg>
        Categories
    </a>
    <a href="/internal/admin/users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Users
    </a>
    <a href="/internal/admin/orders">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><polyline points="9 11 12 14 22 4"/></svg>
        Orders
    </a>
    <a href="/internal/admin/financials">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Financials
    </a>
</div>

<div class="main">
    <div class="topbar">
        <div>
            <h4>Update Category</h4>
            <p>Edit category information</p>
        </div>
        <a href="/internal/admin/profile" style="text-decoration:none;">
        <div class="user-pill">
            <div class="user-avatar">AD</div>
            <div>
                <div class="user-name" th:text="${#authentication.principal.user.fullName}">Administrator</div>
                <div class="user-role">Admin</div>
            </div>
        </div>
        </a>
    </div>

    <!-- Breadcrumb -->
    <div class="breadcrumb-bar">
        <a href="/internal/admin/categories">Categories</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <a th:href="@{/internal/admin/categories/detail/{id}(id=${category.id})}" th:text="${category.name}">Detail</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <span>Update</span>
    </div>

    <form th:action="@{/internal/admin/categories/update/{id}(id=${category.id})}" method="post">

        <div class="row g-4">
            <div class="col-md-3"></div>


            <!-- Right: Form Fields -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header-bar">
                        <h6>Category Information</h6>
                        <span style="font-size:12px; color:var(--text-mid);">ID: <strong th:text="'#' + ${category.id}">#1</strong></span>
                    </div>
                    <div class="card-body-pad">
                        <div class="row g-3">

                            <!-- Name -->
                            <div class="col-12">
                                <label class="form-label">Category Name <span style="color:var(--danger)">*</span></label>
                                <input type="text" name="name" th:value="${category.name}"
                                       th:class="${errors?.containsKey('name')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Ex: Running Shoes, T-Shirts..." maxlength="100">

                                <div th:if="${errors?.containsKey('name')}" class="error-text" th:text="${errors['name']}"></div>
                            </div>

                            <!-- Parent Category -->
                            <div class="col-12">
                                <label class="form-label">Category Type</label>
                                <select name="parentId" class="form-select" th:classappend="${errors?.containsKey('parent')} ? 'is-invalid'" th:disabled="${category.parent == null}">
                                    <option th:if="${category.parent == null}" value="" selected>[ Fixed Root Category ]</option>
                                    <option th:if="${category.parent != null}" th:each="c : ${rootCategories}" 
                                            th:value="${c.id}" 
                                            th:text="${'[ Level 2 ] Child category of: ' + c.name}"
                                            th:selected="${category.parent != null && category.parent.id == c.id}">
                                    </option>
                                </select>
                                <div th:if="${errors?.containsKey('parent')}" class="error-text" th:text="${errors['parent']}"></div>
                            </div>



                            <!-- Status -->
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select name="isActive" class="form-select">
                                    <option value="true" th:selected="${category.isActive}">Active</option>
                                    <option value="false" th:selected="${!category.isActive}">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 24px; border-top:1px solid var(--border);">
                        <a th:href="@{/internal/admin/categories/detail/{id}(id=${category.id})}" class="btn-outline">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;"><polyline points="15 18 9 12 15 6"/></svg>
                            Cancel
                        </a>
                        <button type="submit" class="btn-save">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px; display:inline; margin-right:6px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                            Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
