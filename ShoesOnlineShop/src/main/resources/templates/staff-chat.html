<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Staff Chat - Hỗ Trợ Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg); }
        .chat-page { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .chat-layout { display: flex; gap: 20px; height: 620px; }

        /* Customer inbox list */
        .inbox-list { width: 280px; flex-shrink: 0; background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: auto; }
        .inbox-title { padding: 16px 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-light); border-bottom: 1px solid var(--border); }
        .inbox-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; text-decoration: none; border-bottom: 1px solid var(--border); transition: background .15s; }
        .inbox-item:last-child { border-bottom: none; }
        .inbox-item:hover { background: #fafbff; }
        .inbox-item.active { background: var(--accent-light); }
        .inbox-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #4f6ef7, #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
        .inbox-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        .inbox-sub  { font-size: 11px; color: var(--text-mid); margin-top: 1px; }

        /* Chat window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .chat-win-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .chat-win-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #4f6ef7, #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; }
        .chat-win-name { font-size: 15px; font-weight: 700; }
        .chat-win-email { font-size: 12px; color: var(--text-mid); }

        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f8f9fb; }

        .msg-bubble { max-width: 65%; display: flex; flex-direction: column; }
        .msg-bubble.mine { align-self: flex-end; align-items: flex-end; }
        .msg-bubble.theirs { align-self: flex-start; align-items: flex-start; }
        .bubble-text { padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .mine .bubble-text { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble-text { background: var(--white); border: 1px solid var(--border); color: var(--text-dark); border-bottom-left-radius: 4px; }
        .bubble-time { font-size: 11px; color: var(--text-light); margin-top: 4px; padding: 0 4px; }

        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: var(--text-light); font-size: 14px; }

        .chat-input-bar { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--white); }
        .chat-input-bar textarea { flex: 1; min-height: 44px; max-height: 120px; border: 1px solid var(--border); border-radius: 22px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color .15s; }
        .chat-input-bar textarea:focus { border-color: var(--accent); }
        .send-btn { width: 44px; height: 44px; background: var(--accent); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s; flex-shrink: 0; }
        .send-btn:hover { opacity: .85; }
        .send-btn svg { fill: white; width: 20px; }

        .no-chat { display: flex; align-items: center; justify-content: center; flex: 1; background: var(--white); border: 1px solid var(--border); border-radius: 14px; flex-direction: column; gap: 10px; color: var(--text-light); font-size: 14px; }
    </style>
</head>
<body>
    <div class="chat-page">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px;">
            <h2 style="font-size: 22px; font-weight: 800; color: var(--text-dark);">
                💬 Inbox - Hỗ Trợ Khách Hàng
            </h2>
            <a href="/marketing" class="btn-outline" style="font-size:13px;">← Dashboard</a>
        </div>

        <div class="chat-layout">
            <!-- Customer inbox list -->
            <div class="inbox-list">
                <div class="inbox-title">Customers</div>
                <a th:each="cust : ${customers}"
                   th:href="@{/staff/chat(customerId=${cust.userId})}"
                   class="inbox-item"
                   th:classappend="${selectedCustomerId != null and selectedCustomerId == cust.userId} ? 'active' : ''">
                    <div class="inbox-avatar" th:text="${#strings.substring(cust.fullName, 0, 1)}">C</div>
                    <div>
                        <div class="inbox-name" th:text="${cust.fullName}">Customer</div>
                        <div class="inbox-sub" th:text="${cust.userEmail}">email</div>
                    </div>
                </a>
                <div th:if="${#lists.isEmpty(customers)}" style="padding: 24px; text-align: center; color: var(--text-light); font-size: 13px;">
                    Chưa có tin nhắn nào.
                </div>
            </div>

            <!-- Chat window -->
            <div class="chat-window" th:if="${selectedCustomer != null}">
                <div class="chat-win-header">
                    <div class="chat-win-avatar" th:text="${#strings.substring(selectedCustomer.fullName, 0, 1)}">C</div>
                    <div>
                        <div class="chat-win-name" th:text="${selectedCustomer.fullName}">Customer</div>
                        <div class="chat-win-email" th:text="${selectedCustomer.userEmail}">email</div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea">
                    <div th:if="${#lists.isEmpty(messages)}" class="empty-chat">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>Chưa có tin nhắn nào.</span>
                    </div>
                    <div th:each="msg : ${messages}"
                         class="msg-bubble"
                         th:classappend="${msg.sender.userId == currentUser.userId} ? 'mine' : 'theirs'">
                        <div class="bubble-text" th:text="${msg.message}">message</div>
                        <div class="bubble-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm, dd/MM/yyyy')}">time</div>
                    </div>
                </div>

                <form class="chat-input-bar" th:action="@{/staff/chat/send}" method="post" id="chatForm">
                    <input type="hidden" name="receiverId" th:value="${selectedCustomerId}">
                    <textarea name="message" id="msgInput" placeholder="Trả lời khách hàng..." rows="1" onkeydown="handleKey(event)"></textarea>
                    <button type="submit" class="send-btn" title="Gửi">
                        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
                    </button>
                </form>
            </div>

            <div class="no-chat" th:if="${selectedCustomer == null}">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Chọn khách hàng để phản hồi.</span>
            </div>
        </div>
    </div>

    <script>
        const area = document.getElementById('messagesArea');
        if (area) area.scrollTop = area.scrollHeight;

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const input = document.getElementById('msgInput');
                if (input.value.trim()) {
                    document.getElementById('chatForm').submit();
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
