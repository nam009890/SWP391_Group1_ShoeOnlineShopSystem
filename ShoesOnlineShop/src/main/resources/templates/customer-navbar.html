<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- SuperSport-Style Navbar Fragment -->
    <div th:fragment="navbar-fragment">
        <!-- Utility Bar -->
        <div class="ss-utility-bar">
            <div class="ss-container">
                <span>✓ 100% Chính hãng</span>
                <span>🚚 Giao hàng nhanh từ 699k</span>
                <span>🔄 Đổi trả 30 ngày</span>
                <span>📞 Hotline: 1900 2026</span>
            </div>
        </div>
        <!-- Main Header -->
        <header class="ss-header">
            <div class="ss-container ss-header-inner">
                <a href="/" class="ss-logo">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 7l4.41-4.41A2 2 0 017.83 2h8.34a2 2 0 011.42.59L22 7"/>
                        <path d="M4 7h16v13a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/>
                        <path d="M9 11a3 3 0 006 0"/>
                    </svg>
                    SHOES STORE
                </a>

                <nav class="ss-nav">
                    <a href="/" class="ss-nav-link">TRANG CHỦ</a>
                    <a href="/products" class="ss-nav-link">SẢN PHẨM</a>
                    <a href="/products?category=Sneaker" class="ss-nav-link">SNEAKER</a>
                    <a href="/products?category=Running" class="ss-nav-link">RUNNING</a>
                    <a href="/products?category=Basketball" class="ss-nav-link">BASKETBALL</a>
                    <a href="/articles" class="ss-nav-link">TIN TỨC</a>
                </nav>

                <div class="ss-header-actions">
                    <a href="/orders" class="ss-icon-btn" title="Đơn hàng">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    </a>
                    <a href="/cart" class="ss-icon-btn ss-cart-btn" title="Giỏ hàng">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
                        </svg>
                    </a>
                </div>
            </div>
        </header>
    </div>
</body>
</html>
