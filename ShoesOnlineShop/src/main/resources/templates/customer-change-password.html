<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | ShoesOnlineShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/customer-change-password.css}">
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
        <div class="nav-actions">
            <a th:href="@{/}">HOME</a>
            <a th:href="@{/products}">PRODUCTS</a>
            <a th:href="@{/cart}">CART</a>
            <a th:href="@{/logout}">LOGOUT</a>
        </div>
    </nav>

    <div class="profile-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar" th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</div>
                <div class="sidebar-name" th:text="${user.fullName}">User Name</div>
                <div class="sidebar-email" th:text="${user.userEmail}">user@gmail.com</div>
            </div>
            <div class="sidebar-menu">
                <a th:href="@{/profile}" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Personal Information
                </a>
                <a th:href="@{/profile/change-password}" class="sidebar-link active">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Change Password
                </a>
                <a th:href="@{/my-orders}" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    Order History
                </a>
                <a th:href="@{/logout}" class="sidebar-link" style="color: #e74c3c; margin-top: 1rem; border-top: 1px solid var(--glass-border);">
                    <svg viewBox="0 0 24 24" stroke="#e74c3c"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </a>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main-content">
            <div class="content-header">
                <h1 class="content-title">Change Password</h1>
                <p class="content-desc">Keep your account secure by using a strong password.</p>
            </div>

            <div th:if="${successMessage}" class="alert alert-success">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/profile/change-password}" method="post">
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-control" name="currentPassword" required>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" name="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" name="confirmPassword" required minlength="6">
                </div>

                <button type="submit" class="btn-submit">Update Password</button>
            </form>
        </div>
    </div>
</body>
</html>
