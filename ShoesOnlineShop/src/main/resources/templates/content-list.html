<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Content Management</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="main-container">
            <div class="sidebar">
                <a href="/sliders">Slider management</a>
                <a href="/coupons">Coupon code management</a>
                <a href="/contents" class="active">Content management</a>
            </div>

            <div class="content">
                <div class="d-flex justify-content-between mb-5">
                    <h5 class="text-secondary">Content management</h5>
                    <span>Username</span>
                </div>

                <form action="/contents" method="get" class="d-flex justify-content-between mb-4">
                    <div class="d-flex gap-2">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search by title..." style="width: 250px;">
                        <button type="submit" class="btn btn-light border shadow-sm px-4">Search</button>
                    </div>
                    <div>
                        <a th:href="@{/contents/create}" class="btn btn-dark shadow-sm px-4">Create Content</a>
                    </div>
                </form>

                <div class="table-responsive bg-white border border-secondary mb-4">
                    <table class="table table-bordered mb-0 align-middle text-center">
                        <thead class="table-light">
                            <tr>
                                <th>No</th><th>Name of Content</th><th>Type</th><th>Create Date</th><th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="content, state : ${contents}">
                                <td th:text="${(currentPage - 1) * 5 + state.count}">1</td>
                                <td th:text="${content.contentTitle}">Title</td>
                                <td th:text="${content.contentType}">Type</td>
                                <td th:text="${#temporals.format(content.createdAt, 'dd/MM/yyyy')}">Date</td>
                                <td>
                                    <a th:href="@{/contents/detail/{id}(id=${content.id})}" class="btn btn-info text-white border btn-sm shadow-sm px-3">Detail</a>
                                    <a th:href="@{/contents/update/{id}(id=${content.id})}" class="btn btn-light border btn-sm shadow-sm px-3 ms-2">Update</a>
                                    <a th:href="@{/contents/delete/{id}(id=${content.id})}" class="btn btn-light border btn-sm shadow-sm px-3 ms-2" onclick="return confirm('Delete this content?');">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav class="mt-3" th:if="${totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/contents(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" 
                            th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/contents(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/contents(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </body>
</html>
