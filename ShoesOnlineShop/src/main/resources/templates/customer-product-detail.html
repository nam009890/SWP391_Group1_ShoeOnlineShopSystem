<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.name} + ' - Shoes Store'">Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body class="ss-page">

    <div th:replace="~{customer-navbar :: navbar-fragment}"></div>

    <div class="ss-main">
        <!-- Toast -->
        <div th:if="${message}" class="ss-toast">
            ✓ <span th:text="${message}"></span>
        </div>

        <!-- Breadcrumb -->
        <div class="ss-breadcrumb">
            <a href="/">Trang chủ</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <a href="/products">Sản phẩm</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span th:text="${product.name}">Product</span>
        </div>

        <!-- Product Detail -->
        <div class="ss-detail-layout">
            <div class="ss-detail-img-col">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/500?text=No+Image'}"
                     class="ss-detail-img" alt="Product Image">
            </div>
            <div class="ss-detail-info">
                <div class="ss-detail-brand" th:text="${product.categoryName != null ? product.categoryName : 'SHOES STORE'}">BRAND</div>
                <h1 class="ss-detail-name" th:text="${product.name}">Product Name</h1>
                <div class="ss-detail-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">2,500,000 ₫</div>

                <p class="ss-detail-desc" th:text="${product.description != null ? product.description : 'Giày chất lượng cao, thiết kế hiện đại, mang lại sự thoải mái tối ưu cho người sử dụng.'}">
                    Product description
                </p>

                <div class="ss-detail-stock">
                    Tình trạng: <span th:text="${product.stockQuantity > 0 ? 'Còn hàng (' + product.stockQuantity + ')' : 'Hết hàng'}">Còn hàng</span>
                </div>

                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">

                    <!-- Color Picker -->
                    <div th:if="${colors != null and !colors.isEmpty()}">
                        <div class="ss-option-label">MÀU SẮC</div>
                        <div class="ss-color-picker">
                            <label th:each="color, stat : ${colors}" class="ss-color-swatch"
                                   th:classappend="${stat.index == 0} ? 'active'"
                                   th:style="'background-color: ' + ${color.colorCode != null ? color.colorCode : '#ccc'}"
                                   th:title="${color.colorName}"
                                   th:onclick="'document.querySelectorAll(\'.ss-color-swatch\').forEach(s=>s.classList.remove(\'active\'));this.classList.add(\'active\')'">
                                <input type="radio" name="selectedColor" th:value="${color.colorName}" th:checked="${stat.index == 0}">
                            </label>
                        </div>
                    </div>

                    <!-- Size Picker -->
                    <div th:if="${sizes != null and !sizes.isEmpty()}">
                        <div class="ss-option-label">KÍCH CỠ</div>
                        <div class="ss-size-picker">
                            <label th:each="size, stat : ${sizes}" class="ss-size-btn"
                                   th:classappend="${stat.index == 0} ? 'active'"
                                   th:onclick="'document.querySelectorAll(\'.ss-size-btn\').forEach(s=>s.classList.remove(\'active\'));this.classList.add(\'active\')'">
                                <input type="radio" name="selectedSize" th:value="${size.sizeName}" th:checked="${stat.index == 0}">
                                <span th:text="${size.sizeName}">40</span>
                            </label>
                        </div>
                    </div>

                    <!-- Quantity -->
                    <div class="ss-option-label">SỐ LƯỢNG</div>
                    <div class="ss-qty-wrap">
                        <button type="button" class="ss-qty-btn" onclick="changeQty(-1)">−</button>
                        <input type="number" name="quantity" id="qtyInput" class="ss-qty-input" value="1" min="1" th:max="${product.stockQuantity}">
                        <button type="button" class="ss-qty-btn" onclick="changeQty(1)">+</button>
                    </div>

                    <button type="submit" class="ss-add-cart-btn" th:disabled="${product.stockQuantity <= 0}">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
                        </svg>
                        THÊM VÀO GIỎ HÀNG
                    </button>
                </form>
            </div>
        </div>

        <!-- Feedback Section -->
        <div class="ss-feedback-section">
            <div class="ss-feedback-header">
                <h2 style="font-size: 22px; font-weight: 800; color: #001a35; margin: 0;">ĐÁNH GIÁ SẢN PHẨM</h2>
                <div style="font-size: 14px; font-weight: 700; color: #9ca3af;">
                    <span th:text="${#lists.size(feedbacks)}">0</span> đánh giá
                </div>
            </div>

            <div th:if="${#lists.isEmpty(feedbacks)}" class="ss-empty" style="padding: 40px;">
                <h3>Chưa có đánh giá</h3>
                <p>Hãy là người đầu tiên đánh giá sản phẩm này!</p>
            </div>

            <div th:each="fb : ${feedbacks}" class="ss-feedback-item">
                <div class="ss-feedback-user">
                    <div class="ss-feedback-avatar" th:text="${#strings.substring(fb.user.fullName, 0, 1)}">U</div>
                    <div>
                        <div style="font-weight: 700; color: #001a35;" th:text="${fb.user.fullName}">User</div>
                        <div class="ss-stars">
                            <svg th:each="i : ${#numbers.sequence(1, 5)}" viewBox="0 0 24 24"
                                 th:style="${i <= fb.rating} ? 'color: #facc15' : 'color: #e5e7eb'">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <p style="font-size: 14px; color: #374151; line-height: 1.6;" th:text="${fb.comment}">Comment</p>
                <div style="font-size: 12px; color: #9ca3af; margin-top: 8px;" th:text="${#temporals.format(fb.createdAt, 'dd/MM/yyyy')}">Date</div>
            </div>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>

    <script>
        function changeQty(delta) {
            var input = document.getElementById('qtyInput');
            var newVal = parseInt(input.value) + delta;
            var max = parseInt(input.max) || 999;
            if (newVal >= 1 && newVal <= max) {
                input.value = newVal;
            }
        }
        // Auto-close toast
        setTimeout(function() {
            var toast = document.querySelector('.ss-toast');
            if (toast) toast.style.display = 'none';
        }, 3000);
    </script>
</body>
</html>
