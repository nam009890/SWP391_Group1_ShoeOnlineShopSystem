spring.application.name=shoesshop

# C\u1ea5u h\u00ecnh H2 Database

spring.datasource.url=jdbc:h2:mem:shoedb

spring.datasource.driverClassName=org.h2.Driver

spring.datasource.username=sa

spring.datasource.password=

# \u00c9p \u0111\u01b0\u1eddng d\u1eabn console ph\u1ea3i l\u00e0 /h2-console
spring.h2.console.path=/h2-console
# D\u00f2ng n\u00e0y quan tr\u1ecdng: B\u1eadt console \u0111\u1ec3 v\u00e0o xem d\u1eef li\u1ec7u

spring.h2.console.enabled=true 



# JPA: T\u1ef1 \u0111\u1ed9ng t\u1ea1o b\u1ea3ng t\u1eeb code Java (C\u1ef1c ti\u1ec7n)

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true