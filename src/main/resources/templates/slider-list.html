<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Slider Management</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <div class="main-container">
            <div class="sidebar">
                <a href="/sliders">Slider management</a>
                <a href="/coupons">Coupon code management</a>
                <a href="/contents" class="active">Content management</a>
            </div>

            <div class="content">
                <div class="d-flex justify-content-between mb-5">
                    <h4 class="text-secondary">Slider management</h4>
                    <span>Username</span>
                </div>

                <form action="/sliders" method="get" class="d-flex justify-content-between mb-4">
                    <div class="d-flex gap-2">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Enter name of slider" style="width: 250px;">
                        <button type="submit" class="btn btn-light border shadow-sm">Search</button>
                    </div>
                    <div>
                        <a href="/sliders/create" class="btn btn-light border shadow-sm">Create Slider</a>
                    </div>
                </form>

                <div class="table-responsive bg-white border border-secondary mb-4">
                    <table class="table table-bordered mb-0 align-middle">
                        <thead class="table-header">
                            <tr>
                                <th>No</th>
                                <th>Name of slider</th>
                                <th>description</th>
                                <th>Create date</th>
                                <th>action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="slider, state : ${sliders}">
                                <td th:text="${(currentPage - 1) * 5 + state.count}">1</td>
                                <td th:text="${slider.name}">Super sale 1/1</td>
                                <td th:text="${slider.description}"></td>
                                <td th:text="${#temporals.format(slider.createDate, 'dd/MM/yyyy')}">25/10/2024</td>
                                <td class="text-center">
                                    <a th:href="@{/sliders/update/{id}(id=${slider.id})}" class="btn btn-light border btn-sm shadow-sm px-3">Update</a>

                                    <a th:href="@{/sliders/delete/{id}(id=${slider.id})}" 
                                       class="btn btn-light border btn-sm shadow-sm px-3 ms-2" 
                                       onclick="return confirm('Are you sure you want to delete this slider?');">Delete</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sliders)}">
                                <td colspan="5" class="text-center text-muted">No sliders found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav class="mt-4" th:if="${totalPages > 1}">
                    <ul class="pagination pagination-circle justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link border-0 bg-transparent text-primary" th:href="@{/sliders(page=${currentPage - 1}, keyword=${keyword})}">&lt;&lt;prev</a>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/sliders(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                        </li>

                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link border-0 bg-transparent text-primary" th:href="@{/sliders(page=${currentPage + 1}, keyword=${keyword})}">next&gt;&gt;</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    </body>
</html>
