<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Marketing Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/shop-manager.css}">
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <!-- Brand & Nav items matching above -->
        <div class="sidebar-brand">
            <div class="brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></div>
            <span class="brand-name">Shoes Online Shop</span>
        </div>
        <span class="nav-label">Navigation</span>

        <a href="/internal/shop-manager/dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> Dashboard
        </a>
        <a href="/internal/shop-manager/approvals/coupons">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg> Coupon Approvals
        </a>
        <a href="/internal/shop-manager/approvals/sliders">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/></svg> Slider Approvals
        </a>
        <a href="/internal/shop-manager/approvals/contents">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Content Approvals
        </a>
        <a href="/internal/shop-manager/marketing-plans" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> Marketing Plans
        </a>
        
        <div class="sidebar-logout">
            <a href="/internal/logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Logout
            </a>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="main">
        <div class="topbar">
            <div>
                <h4>Create New Plan</h4>
                <p class="greeting-text">Setup a new marketing goal or promotional campaign</p>
            </div>
            <div class="user-pill">
                <div class="user-avatar" style="background-color: var(--accent);">SM</div>
                <div><div class="user-name">Shop Manager</div><div class="user-role">Manager</div></div>
            </div>
        </div>

        <div class="mb-4">
            <a href="/internal/shop-manager/marketing-plans" style="color:var(--accent); text-decoration:none;">
                <i class="fas fa-arrow-left me-1"></i> Back to Plans
            </a>
        </div>

        <div class="form-container">
            <form th:action="@{/internal/shop-manager/marketing-plans/save}" method="post" th:object="${plan}">
                
                <div class="row g-4 mb-4">
                    <div class="col-md-8">
                        <label class="form-label">Plan Title</label>
                        <input type="text" th:field="*{title}" class="form-control-dark" placeholder="E.g. Lunar New Year Mega Sale" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Assigned Department</label>
                        <select th:field="*{assignedRole}" class="form-select-dark" required>
                            <option value="MARKETING_STAFF">Marketing Team</option>
                            <option value="SALE_STAFF">Sale Team</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Plan Description & Objectives</label>
                    <textarea th:field="*{description}" class="form-control-dark" rows="5" placeholder="Detailed description of what needs to be achieved..." required></textarea>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Start Date</label>
                        <input type="date" th:field="*{startDate}" class="form-control-dark" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">End Date</label>
                        <input type="date" th:field="*{endDate}" class="form-control-dark" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Initial Status</label>
                        <select th:field="*{status}" class="form-select-dark" required>
                            <option value="OPEN">Open (Not Started)</option>
                            <option value="IN_PROGRESS">In Progress</option>
                        </select>
                    </div>
                </div>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 30px 0;">

                <div class="d-flex justify-content-end gap-3">
                    <a href="/internal/shop-manager/marketing-plans" class="btn btn-outline-light" style="border:1px solid rgba(255,255,255,0.2); color:white; border-radius:10px; padding:10px 24px;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="background:var(--accent); border:none; border-radius:10px; padding:10px 30px;">
                        <i class="fas fa-save me-1"></i> Save Plan
                    </button>
                </div>
                
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
