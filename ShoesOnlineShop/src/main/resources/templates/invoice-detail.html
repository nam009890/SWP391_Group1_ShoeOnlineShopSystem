<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoice Detail</title>

    <style>

        body{
            background:#f3f4f6;
            font-family:Arial;
        }

        .container{
            width:900px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:15px;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:4px;
            background:#f5f5f5;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

        th{
            background:#f8f9fa;
        }

        .btn{
            padding:8px 16px;
            border:none;
            border-radius:4px;
            cursor:pointer;
            text-decoration:none;
            font-size:14px;
        }

        .btn-back{
            background:#6c757d;
            color:white;
        }

        .btn-group{
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Invoice Detail</h2>

<label>Invoice Number</label>
<input type="text" th:value="${invoice.invoiceNumber}" readonly>

<label>Order ID</label>
<input type="text" th:value="${invoice.order.orderId}" readonly>

<label>Customer Name</label>
<input type="text" th:value="${invoice.order.user.fullName}" readonly>

<label>Phone</label>
<input type="text" th:value="${invoice.order.phone}" readonly>

<label>Address</label>
<input type="text" th:value="${invoice.order.shippingAddress}" readonly>

<table>

<thead>
<tr>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
</tr>
</thead>

<tbody>

<tr th:each="d : ${invoice.order.orderDetails}">

<td th:text="${d.product.productName}"></td>

<td th:text="${d.quantity}"></td>

<td th:text="${d.unitPrice}"></td>

</tr>

</tbody>

</table>

<label>Total Price</label>
<input type="text" th:value="${invoice.totalAmount}" readonly>

<label>Generated Date</label>
<input type="text" th:value="${invoice.generatedDate}" readonly>

<div class="btn-group">

<a href="/invoices" class="btn btn-back">
Back to List
</a>

</div>

</div>

</body>
</html>
