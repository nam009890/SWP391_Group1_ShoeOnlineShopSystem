<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verify Code - ShoesOnlineShop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #0056b3; }
        .back-link { display: inline-flex; align-items: center; gap: 5px; color: #6c757d; text-decoration: none; font-size: 14px; margin-bottom: 20px; transition: 0.3s; }
        .back-link:hover { color: #007bff; }
        .message { text-align: center; margin-bottom: 15px; font-size: 14px; color: #666; }
        .error { color: red; text-align: center; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <a th:href="@{/}" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>
    <div class="login-header">
        <h2>Verify Reset Code</h2>
        <p>Enter the 6-digit code sent to your email</p>
    </div>

    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <form th:action="@{/verify-reset-code}" method="post">
        <input type="hidden" name="email" th:value="${email}">
        <div class="form-group">
            <label for="code">Verification Code</label>
            <input type="text" id="code" name="code" class="form-control" placeholder="123456" required maxlength="6" pattern="\d{6}">
        </div>
        <button type="submit" class="btn">Verify Code</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <span style="font-size: 14px; color: #666;">Didn't receive code? </span>
        <a th:href="@{/forgot-password}" style="text-decoration: none; color: #007bff; font-size: 14px;">Try Again</a>
    </div>
</div>

</body>
</html>
