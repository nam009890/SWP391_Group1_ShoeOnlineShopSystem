spring.application.name=ShoesOnlineShop
# Server Port
server.port=8082

# Databse Connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Shoes_Online_Shop;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf cache (Set false \u0111\u1ec3 khi s\u1eeda HTML n\u00f3 nh\u1eadn ngay l\u00fac dev)
spring.thymeleaf.cache=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# Essential: Let Tomcat fully read the large request so it can return an HTTP response (preventing ERR_CONNECTION_RESET)
server.tomcat.max-swallow-size=-1