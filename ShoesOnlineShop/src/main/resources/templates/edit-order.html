<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Order</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<div>

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <span class="brand-name">Sale Staff</span>
        </div>

        <span class="nav-label">Management</span>

        <a th:href="@{/internal/orders}" class="active">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Order Management
        </a>

        <a th:href="@{/internal/feedbacks}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
            </svg>
            Feedback Management
        </a>

        <div class="sidebar-logout">
            <a th:href="@{/internal/logout}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </a>
        </div>

    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <h4>Edit Order</h4>
                <p>Update order information and status</p>
            </div>
            <a href="/internal/admin/profile" style="text-decoration:none;">
            <div class="user-pill">
                <div class="user-avatar">SS</div>
                <div>
                    <div class="user-name">Sale Staff</div>
                    <div class="user-role">Administrator</div>
                </div>
            </div>
            </a>
        </div>

        <!-- BREADCRUMB -->
        <div class="breadcrumb-bar">
            <a th:href="@{/}">Home</a>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
            <a th:href="@{/internal/orders}">Order Management</a>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
            <span>Edit Order</span>
        </div>

        <!-- CARD -->
        <div class="card mx-auto" style="max-width:640px;">

            <div class="card-header-bar">
                <h6>Order Information</h6>
                <span class="badge-coupon" th:text="'#' + ${order.orderId}"></span>
            </div>

            <div class="card-body-pad">

                <!-- Alert messages -->
                <div th:if="${successMessage}"
                     style="background:#d1fae5; border:1px solid #6ee7b7; color:#065f46;
                            border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13.5px;">
                    <span th:text="${successMessage}"></span>
                </div>

                <div th:if="${errorMessage}"
                     style="background:#fef2f2; border:1px solid #fecaca; color:#991b1b;
                            border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13.5px;">
                    <span th:text="${errorMessage}"></span>
                </div>

                <form th:action="@{/internal/orders/update}" method="post">
                    <input type="hidden" name="id" th:value="${order.orderId}"/>

                    <!-- Order ID -->
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Order ID</label>
                        <input type="text" class="form-control field-readonly"
                               th:value="${order.orderId}" readonly>
                    </div>

                    <!-- Phone -->
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control"
                               name="phone"
                               th:value="${order.phone}">
                    </div>

                    <!-- Address -->
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Shipping Address</label>
                        <input type="text" class="form-control"
                               name="address"
                               th:value="${order.shippingAddress}">
                    </div>

                    <!-- Product (read-only) -->
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Product</label>
                        <input type="text" class="form-control field-readonly"
                               th:value="${order.orderDetails[0].product.productName}"
                               readonly>
                    </div>

                    <!-- Quantity -->
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Quantity</label>
                        <input type="number" class="form-control"
                               name="quantity"
                               th:value="${order.orderDetails[0].quantity}">
                    </div>

                    <!-- Status -->
                    <div style="margin-bottom:18px;">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option th:each="s : ${statuses}"
                                    th:value="${s}"
                                    th:text="${s}"
                                    th:selected="${s == order.orderStatus}">
                            </option>
                        </select>
                    </div>

                    <div class="form-footer" style="border-top:1px solid var(--border); padding-top:20px; margin-top:8px;">
                        <a th:href="@{/internal/orders}" class="btn-outline">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor" stroke-width="2" style="width:14px;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                            </svg>
                            Back
                        </a>
                        <button type="submit" class="btn-save">Save Changes</button>
                    </div>

                </form>
            </div>

        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
