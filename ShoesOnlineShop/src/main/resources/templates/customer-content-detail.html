<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${content.contentTitle} + ' | ShoesOnlineShop'">Story Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#0a0a0a;--primary-light:#1a1a2e;--accent:#e94560;--accent-hover:#ff6b81;
            --surface:#16213e;--bg:#0f0f23;--text:#eaeaea;--text-muted:#a0a0b0;
            --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);
            --radius:16px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,0.4);
            --transition:all .35s cubic-bezier(.25,.46,.45,.94);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
        a{text-decoration:none;color:inherit}

        .navbar{display:flex;justify-content:space-between;align-items:center;padding:0 3rem;height:72px;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:fixed;width:100%;top:0;z-index:1000}
        .navbar-brand{font-family:'Teko',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:3px}

        .content-container { padding: 120px 2rem 4rem; max-width: 900px; margin: 0 auto; }
        
        .content-badge { display: inline-block; padding: 0.4rem 1.2rem; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 30px; background: rgba(233,69,96,0.15); color: var(--accent); margin-bottom: 1.5rem; }
        .content-title { font-family: 'Teko', sans-serif; font-size: 4rem; text-transform: uppercase; color: #fff; line-height: 1.1; margin-bottom: 2rem; }
        .content-date { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 3rem; display: flex; align-items: center; gap: 0.5rem; }
        .content-date svg { width: 18px; height: 18px; stroke: var(--text-muted); }

        .content-hero-img { width: 100%; height: auto; max-height: 500px; object-fit: cover; border-radius: var(--radius); margin-bottom: 4rem; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4)); }

        .content-body { font-size: 1.15rem; color: var(--text); line-height: 1.8; margin-bottom: 5rem; }
        .content-body p { margin-bottom: 1.5rem; }
        .content-body h2 { font-family: 'Teko', sans-serif; font-size: 2.5rem; text-transform: uppercase; color: #fff; margin-top: 3rem; margin-bottom: 1rem; }
        
        .btn-back { display: inline-flex; align-items: center; gap: 0.5rem; padding: 1rem 2rem; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); color: var(--text); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition); }
        .btn-back:hover { background: var(--glass); color: var(--accent); border-color: rgba(233,69,96,0.3); }

        footer { text-align: center; padding: 3rem; background: var(--primary); border-top: 1px solid var(--glass-border); }
        .footer-logo { font-family: 'Teko', sans-serif; font-size: 2rem; color: #fff; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
    </nav>

    <div class="content-container">
        <span class="content-badge" th:text="${content.contentType}">Story</span>
        <h1 class="content-title" th:text="${content.contentTitle}">Content Title</h1>
        
        <div class="content-date" th:if="${content.createdAt != null}">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <span th:text="${#temporals.format(content.createdAt, 'MMMM dd, yyyy')}">Publish Date</span>
        </div>

        <img th:if="${content.imageUrl != null and !content.imageUrl.isEmpty()}" 
             th:src="${content.imageUrl != null and content.imageUrl.startsWith('/uploads') ? content.imageUrl : '/uploads/contents/' + content.imageUrl}" 
             th:alt="${content.contentTitle}" 
             class="content-hero-img"
             onerror="this.src='/images/placeholder.png'">

        <div class="content-body" th:utext="${content.contentText}">
            Content HTML goes here...
        </div>

        <a th:href="@{/home}" class="btn-back">&larr; Back to Home</a>
    </div>

    <footer>
        <div class="footer-logo">SHOESONLINESHOP</div>
        <p style="color:var(--text-muted);font-size:0.85rem;">&copy; 2026 ShoesOnlineShop Group 1.</p>
    </footer>
</body>
</html>
