<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Login - ShoesOnlineShop</title>
    <!-- Use Bootstrap or basic styles -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #0056b3; }
        .error { color: red; text-align: center; margin-bottom: 10px; }
        .success { color: green; text-align: center; margin-bottom: 10px; }
        .internal-link { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #6c757d; font-size: 14px; }
        .btn-google { background-color: #db4437; margin-top: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-weight: bold; }
        .btn-google:hover { background-color: #c23321; }
        .divider { margin: 20px 0; border-bottom: 1px solid #eee; position: relative; text-align: center; }
        .divider span { background: #fff; padding: 0 10px; position: relative; top: 10px; color: #999; font-size: 12px; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2>Customer Login</h2>
        <p>Welcome back to ShoesOnlineShop</p>
    </div>

    <div th:if="${param.error}" class="error">
        Tài khoản không tồn tại hoặc sai mật khẩu.
    </div>
    <div th:if="${param.logout}" class="success">
        Đăng xuất thành công.
    </div>

    <form th:action="@{/login/process}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required pattern="^\S+$" title="Username không được chứa khoảng trắng" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required minlength="6">
        </div>
        <button type="submit" class="btn">Login</button>
    </form>

    <div class="divider"><span>OR</span></div>

    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google">
        Login with Google
    </a>
    
    <a th:href="@{/register}" class="internal-link" style="margin-top: 5px; color: #007bff;">Create an Account</a>
</div>

</body>
</html>
