<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Page Not Found</title>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="body-404">
    <div class="error-container">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Oops! Page not found.</h2>
        <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            <a href="/internal/admin/home" class="btn-home">Back to Admin Home</a>
        </div>
        <div th:if="${#authorization.expression('hasRole(''SALE_STAFF'')')}">
            <a href="/internal/orders" class="btn-home">Back to Sale Home</a>
        </div>
        <div th:if="${#authorization.expression('hasRole(''MARKETING_STAFF'')')}">
            <a href="/internal/MarketingHome" class="btn-home">Back to Marketing Home</a>
        </div>
        <div th:if="${#authorization.expression('!isAuthenticated() or hasRole(''CUSTOMER'')')}">
            <a href="/home" class="btn-home">Back to Homepage</a>
        </div>
    </div>
</body>
</html>
