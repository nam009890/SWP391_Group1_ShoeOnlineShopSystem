<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Coupon Management</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>
        <div class="main-container">
            <div class="sidebar">
                <a href="/sliders">Slider management</a>
                <a href="/coupons" class="active">Coupon code management</a>
                <a href="/contents">Content management</a>
            </div>

            <div class="content">
                <div class="d-flex justify-content-between mb-5">
                    <h5 class="text-secondary">Coupon code management</h5>
                    <span>Username</span>
                </div>

                <form action="/coupons" method="get" class="d-flex justify-content-between mb-4">
                    <div class="d-flex gap-2">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search coupon code" style="width: 250px;">
                        <button type="submit" class="btn btn-light border shadow-sm px-4">Search</button>
                    </div>
                    <div>
                        <a th:href="@{/coupons/create}" class="btn btn-light border shadow-sm px-4">Create Coupon code</a>
                    </div>
                </form>

                <div class="table-responsive bg-white border border-secondary mb-4">
                    <table class="table table-bordered mb-0 align-middle">
                        <thead class="table-header">
                            <tr>
                                <th>No</th><th>Coupon code</th><th>discount</th><th>Start Date</th><th>End Date</th><th class="text-center">action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="coupon, state : ${coupons}">
                                <td th:text="${(currentPage - 1) * 5 + state.count}">1</td>
                                <td th:text="${coupon.couponCode}">CODE</td>
                                <td th:text="${coupon.discountPercent + '%'}">10%</td>
                                <td th:text="${#temporals.format(coupon.createDate, 'dd/MM/yyyy')}">Start</td>
                                <td th:text="${#temporals.format(coupon.endDate, 'dd/MM/yyyy')}">End</td>
                                <td class="text-center">
                                    <a th:href="@{/coupons/detail/{id}(id=${coupon.id})}" class="btn btn-info text-white border btn-sm shadow-sm px-3">Detail</a>
                                    
                                    <a th:href="@{/coupons/update/{id}(id=${coupon.id})}" class="btn btn-light border btn-sm shadow-sm px-3 ms-2">Update</a>
                                    <a th:href="@{/coupons/delete/{id}(id=${coupon.id})}" class="btn btn-light border btn-sm shadow-sm px-3 ms-2" onclick="return confirm('Delete this coupon?');">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <nav class="mt-3" th:if="${totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/coupons(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" 
                            th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/coupons(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/coupons(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </body>
</html>
