<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ShoesOnlineShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#0a0a0a;--primary-light:#1a1a2e;--accent:#e94560;--accent-hover:#ff6b81;
            --surface:#16213e;--bg:#0f0f23;--text:#eaeaea;--text-muted:#a0a0b0;
            --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.1);
            --radius:16px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,0.4);
            --transition:all .35s cubic-bezier(.25,.46,.45,.94);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
        a{text-decoration:none;color:inherit}

        /* NAVBAR */
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:0 3rem;height:72px;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:fixed;width:100%;top:0;z-index:1000}
        .navbar-brand{font-family:'Teko',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:3px}
        .nav-actions{display:flex;gap:1rem;align-items:center}
        .nav-actions a{color:var(--text);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:.5rem 1rem;border-radius:6px;transition:var(--transition)}
        .nav-actions a:hover{background:var(--glass);color:var(--accent)}

        .profile-container { padding: 120px 4rem 4rem; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr; gap: 3rem; align-items: start; }
        
        /* SIDEBAR */
        .sidebar { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); overflow: hidden; }
        .sidebar-header { padding: 2.5rem 1.5rem; text-align: center; background: linear-gradient(135deg, var(--surface), var(--primary-light)); border-bottom: 1px solid var(--glass-border); }
        .sidebar-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: #fff; box-shadow: 0 10px 20px rgba(233,69,96,0.3); }
        .sidebar-name { font-weight: 700; font-size: 1.2rem; color: #fff; margin-bottom: 0.3rem; }
        .sidebar-email { font-size: 0.85rem; color: var(--text-muted); }
        
        .sidebar-menu { padding: 1rem 0; }
        .sidebar-link { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; color: var(--text-muted); font-weight: 600; transition: var(--transition); border-left: 3px solid transparent; }
        .sidebar-link svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
        .sidebar-link:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .sidebar-link.active { background: rgba(233,69,96,0.1); color: var(--accent); border-left-color: var(--accent); }

        /* MAIN CONTENT */
        .main-content { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 3rem; }
        .content-header { margin-bottom: 2.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1.5rem; }
        .content-title { font-family: 'Teko', sans-serif; font-size: 2.5rem; text-transform: uppercase; color: #fff; letter-spacing: 1px; line-height: 1; }
        .content-desc { font-size: 0.95rem; color: var(--text-muted); margin-top: 0.5rem; }

        /* FORM */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group.full { grid-column: 1 / -1; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 1rem 1.2rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff; border-radius: 8px; font-family: inherit; font-size: 0.95rem; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(233,69,96,0.1); }
        .form-control:read-only { opacity: 0.7; cursor: not-allowed; }

        .btn-submit { display: inline-flex; align-items: center; justify-content: center; padding: 1rem 2.5rem; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: var(--transition); margin-top: 2rem; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(233,69,96,0.4); }

        /* ALERTS */
        .alert { padding: 1rem 1.5rem; border-radius: 8px; margin-bottom: 2rem; font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 0.75rem; }
        .alert-success { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .alert-error { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }

        @media(max-width: 900px) {
            .profile-container { grid-template-columns: 1fr; padding: 100px 1.5rem 2rem; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
        <div class="nav-actions">
            <a th:href="@{/}">HOME</a>
            <a th:href="@{/products}">PRODUCTS</a>
            <a th:href="@{/cart}">CART</a>
            <a th:href="@{/logout}">LOGOUT</a>
        </div>
    </nav>

    <div class="profile-container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar" th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : 'U'}">U</div>
                <div class="sidebar-name" th:text="${user.fullName}">User Name</div>
                <div class="sidebar-email" th:text="${user.userEmail}">user@gmail.com</div>
            </div>
            <div class="sidebar-menu">
                <a th:href="@{/profile}" class="sidebar-link active">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Personal Information
                </a>
                <a th:href="@{/profile/change-password}" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Change Password
                </a>
                <!-- Optional: link to order history -->
                <a href="/MyOrder/list" class="sidebar-link">
                    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    Order History
                </a>
                <a th:href="@{/logout}" class="sidebar-link" style="color: #e74c3c; margin-top: 1rem; border-top: 1px solid var(--glass-border);">
                    <svg viewBox="0 0 24 24" stroke="#e74c3c"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </a>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main-content">
            <div class="content-header">
                <h1 class="content-title">Personal Information</h1>
                <p class="content-desc">Manage your basic profile information and preferences.</p>
            </div>

            <div th:if="${successMessage}" class="alert alert-success">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                <span th:text="${successMessage}"></span>
            </div>
            <div th:if="${errorMessage}" class="alert alert-error">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/profile/update}" th:object="${user}" method="post">
                <!-- Keep hidden ID -->
                <input type="hidden" th:field="*{userId}">
                <!-- Keep hidden role so it doesn't null out if submitted back -->
                <input type="hidden" th:field="*{userRole}">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:field="*{userName}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" th:field="*{fullName}" required th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                        <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" style="color:#e74c3c; font-size:0.85rem; margin-top:0.3rem;"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" th:field="*{userEmail}" readonly style="opacity:0.7; cursor:not-allowed">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" th:field="*{phone}" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                        <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" style="color:#e74c3c; font-size:0.85rem; margin-top:0.3rem;"></div>
                    </div>
                    <div class="form-group full">
                        <label class="form-label">Delivery Address</label>
                        <textarea class="form-control" th:field="*{address}" rows="3" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''"></textarea>
                        <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color:#e74c3c; font-size:0.85rem; margin-top:0.3rem;"></div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
