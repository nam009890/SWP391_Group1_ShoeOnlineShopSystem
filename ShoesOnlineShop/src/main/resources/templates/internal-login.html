<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Internal Login - ShoesOnlineShop</title>
    <link rel="stylesheet" th:href="@{/css/pages/internal-login.css}">
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2>Staff Portal</h2>
        <p>Admin, Sale & Marketing</p>
    </div>

    <div th:if="${param.error}" class="error">
        Tài khoản không tồn tại hoặc không có quyền truy cập.
    </div>
    <div th:if="${param.logout}" class="success">
        Đăng xuất thành công.
    </div>

    <form th:action="@{/internal/login/process}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Staff Username" required pattern="^\S+$" title="Username không được chứa khoảng trắng" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Password" required minlength="6">
        </div>
        <button type="submit" class="btn">Secure Login</button>
    </form>
    
    <a th:href="@{/login}" class="customer-link">&larr; Back to Shop</a>
</div>

</body>
</html>
