<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback Management</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
       <aside class="sidebar">

        <div class="sidebar-brand">
            <div class="brand-icon">
                <!-- Shop/Admin icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <span class="brand-name">Sale Staff</span>
        </div>

        <span class="nav-label">Management</span>

        <a th:href="@{/internal/orders}" >
            <!-- Orders icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Order Management
        </a>

        <a th:href="@{/internal/feedbacks}" class="active">
            <!-- Feedback icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
            </svg>
            Feedback Management
        </a>

        <a th:href="@{/internal/invoices}" >
            <!-- Invoice icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 14l2 2 4-4"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M7 3h10a2 2 0 012 2v14l-3-2-3 2-3-2-3 2V5a2 2 0 012-2z"/>
            </svg>
            Invoice Management
        </a>

        <div class="sidebar-logout" style="margin-top:auto;">
            <a th:href="@{/internal/logout}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </a>
        </div>

    </aside>


<!-- ================= MAIN ================= -->
<main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div>
            <h4>Feedback Management</h4>
            <p>View and manage customer product feedback</p>
        </div>

        <a href="/internal/admin/profile" style="text-decoration:none;">
        <div class="user-pill">
            <div class="user-avatar">SS</div>
            <div>
                <div class="user-name">Sale Staff</div>
                <div class="user-role">Administrator</div>
            </div>
        </div>
        </a>
    </div>


    <!-- BREADCRUMB -->
    <div class="breadcrumb-bar">
        <a th:href="@{/}">Home</a>
        <span> / </span>
        <span>Feedback Management</span>
    </div>


    <!-- CARD -->
    <div class="card">

        <!-- TOOLBAR -->
        <div class="toolbar"
             style="display:flex; align-items:center; justify-content:space-between; gap:12px;">

            <form method="get" id="filterForm"
                  style="display:flex; align-items:center; gap:10px;">

                <div class="search-input">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="Search by customer name"/>
                </div>

                <button type="submit" class="btn-search">Search</button>

                <select name="status" id="statusFilter"
                        class="form-select" style="width:140px;">
                    <option value="">All Status</option>
                    <option value="Active" th:selected="${currentStatus=='Active'}">Active</option>
                    <option value="Inactive" th:selected="${currentStatus=='Inactive'}">Inactive</option>
                </select>

                <select name="sort" id="sortFilter"
                        class="form-select" style="width:150px;">
                    <option value="feedbackId" th:selected="${sort=='feedbackId'}">Sort by ID</option>
                    <option value="createdAt" th:selected="${sort=='createdAt'}">Sort by Date</option>
                </select>

            </form>

        </div>


        <!-- TABLE -->
        <div class="table-responsive">

            <table class="table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(feedbacks.content)}">
                    <td colspan="6" class="text-center">No feedback found</td>
                </tr>

                <tr th:each="f, stat : ${feedbacks.content}">

                    <td th:text="${f.feedbackId}"></td>

                    <td th:text="${f.user.fullName}"></td>

                    <td th:text="${f.product.productName}"></td>

                    <td th:text="${#temporals.format(f.createdAt,'dd/MM/yyyy')}"></td>

                    <td>
                        <form th:action="@{/internal/feedbacks/toggle}" method="post">

                            <input type="hidden" name="id" th:value="${f.feedbackId}">

                            <select class="form-select" onchange="this.form.submit()">
                                <option value="Active" th:selected="${f.isApproved}">Active</option>
                                <option value="Inactive" th:selected="${!f.isApproved}">Inactive</option>
                            </select>

                        </form>
                    </td>

                    <td>

                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/internal/feedbacks/view/{id}(id=${f.feedbackId})}">
                            Detail
                        </a>

                        <a class="btn btn-sm btn-danger"
                           th:href="@{/internal/feedbacks/delete/{id}(id=${f.feedbackId})}"
                           onclick="return confirm('Delete this feedback?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>


        <!-- PAGINATION -->
        <div class="pagination-bar">

            <span class="page-info"
                  th:text="'Page ' + (${feedbacks.number}+1) + ' of ' + ${feedbacks.totalPages}">
            </span>

            <div class="page-btns">
                <!-- Prev arrow -->
                <a class="page-btn"
                   th:classappend="${feedbacks.number == 0} ? ' disabled' : ''"
                   th:href="@{/internal/feedbacks(page=${feedbacks.number - 1}, status=${currentStatus}, keyword=${keyword}, sort=${sort})}">
                    &#8249;
                </a>

                <a class="page-btn"
                   th:each="i : ${#numbers.sequence(0, feedbacks.totalPages-1)}"
                   th:href="@{/internal/feedbacks(page=${i}, status=${currentStatus}, keyword=${keyword}, sort=${sort})}"
                   th:text="${i+1}"
                   th:classappend="${i == feedbacks.number} ? ' active' : ''">
                </a>

                <!-- Next arrow -->
                <a class="page-btn"
                   th:classappend="${feedbacks.number + 1 >= feedbacks.totalPages} ? ' disabled' : ''"
                   th:href="@{/internal/feedbacks(page=${feedbacks.number + 1}, status=${currentStatus}, keyword=${keyword}, sort=${sort})}">
                    &#8250;
                </a>
            </div>

        </div>

    </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const form = document.getElementById("filterForm");
document.getElementById("statusFilter").addEventListener("change", () => form.submit());
document.getElementById("sortFilter").addEventListener("change", () => form.submit());
</script>

</body>
</html>
