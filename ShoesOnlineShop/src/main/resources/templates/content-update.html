<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Content</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
</head>
<body>
<div class="main-container">
    <div class="sidebar">
        <a href="/sliders">Slider management</a>
        <a href="/coupons">Coupon code management</a>
        <a href="/contents" class="active">Content management</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between mb-5">
            <h5 class="text-secondary">Update Content</h5>
            <span>Username</span>
        </div>

        <div class="bg-white border border-secondary p-4 mx-auto" style="max-width: 900px;">
            <form th:action="@{/contents/save}" th:object="${content}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="row mb-3 align-items-center">
                    <div class="col-md-2 text-end"><label class="col-form-label fw-bold">Title</label></div>
                    <div class="col-md-10">
                        <input type="text" th:field="*{contentTitle}" class="form-control" th:classappend="${#fields.hasErrors('contentTitle')} ? 'is-invalid' : ''" required>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-2 text-end"><label class="col-form-label fw-bold">Type</label></div>
                    <div class="col-md-10">
                        <select th:field="*{contentType}" class="form-select">
                            <option value="BANNER">Banner</option>
                            <option value="PROMO">Promotion</option>
                            <option value="ABOUT">About Us</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-2 text-end"><label class="col-form-label fw-bold">Thumbnail URL</label></div>
                    <div class="col-md-10">
                        <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="Link ảnh đại diện bài viết">
                    </div>
                </div>

                <div class="row mb-4 align-items-start">
                    <div class="col-md-2 text-end pt-2"><label class="col-form-label fw-bold">Main content</label></div>
                    <div class="col-md-10">
                        <textarea id="summernote" th:field="*{contentText}" class="form-control"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-10 offset-md-2">
                        <button type="submit" class="btn btn-dark shadow-sm px-4">Save Changes</button>
                        <a href="/contents" class="btn btn-light border ms-2 px-4">Back</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // KÍCH HOẠT BỘ SOẠN THẢO VĂN BẢN VÀ HIỂN THỊ LẠI NỘI DUNG CŨ
    $(document).ready(function() {
        $('#summernote').summernote({
            placeholder: 'Viết nội dung bài đăng vào đây, có thể kéo thả ảnh hoặc ấn nút chèn ảnh/video phía trên...',
            tabsize: 2,
            height: 400,
            toolbar: [
                ['style', ['style']],
                ['font', ['bold', 'underline', 'clear']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['table', ['table']],
                ['insert', ['link', 'picture', 'video']], // NÚT CHÈN ẢNH NẰM Ở ĐÂY
                ['view', ['fullscreen', 'codeview', 'help']]
            ]
        });
    });
</script>
</body>
</html>
