<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Coupon Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-container">
    <div class="sidebar">
        <a href="/sliders">Slider management</a>
        <a href="/coupons" class="active">Coupon code management</a>
        <a href="/contents">Content management</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between mb-5">
            <h5 class="text-secondary">Coupon Detail</h5>
            <span>Username</span>
        </div>

        <div class="bg-white border border-secondary p-4 mx-auto" style="max-width: 800px;">
            <div class="row mb-3 align-items-center">
                <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Name of Coupon Code</label></div>
                <div class="col-md-9">
                    <input type="text" class="form-control bg-light" th:value="${coupon.couponName}" readonly>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Code</label></div>
                <div class="col-md-9">
                    <input type="text" class="form-control text-primary fw-bold bg-light" th:value="${coupon.couponCode}" readonly>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Discount (%)</label></div>
                <div class="col-md-9">
                    <input type="text" class="form-control text-danger fw-bold bg-light" th:value="${coupon.discountPercent + ' %'}" readonly>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Start Date</label></div>
                <div class="col-md-9">
                    <input type="date" class="form-control bg-light" th:value="${coupon.createDate}" readonly>
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <div class="col-md-3 text-end"><label class="col-form-label fw-bold">End Date</label></div>
                <div class="col-md-9">
                    <input type="date" class="form-control bg-light" th:value="${coupon.endDate}" readonly>
                </div>
            </div>

            <div class="row">
                <div class="col-md-9 offset-md-3">
                    <a href="/coupons" class="btn btn-light border shadow-sm px-4">Back to List</a>
                    <a th:href="@{/coupons/update/{id}(id=${coupon.id})}" class="btn btn-dark shadow-sm px-4 ms-2">Edit Coupon</a>
                </div>
            </div>
            
        </div>
    </div>
</div>
</body>
</html>
