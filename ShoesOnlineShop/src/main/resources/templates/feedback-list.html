<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Feedback Management</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body { background-color: #f5f6fa; }

        .sidebar {
            height: 100vh;
            background: #fff;
            border-right: 1px solid #ddd;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #333;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }

        .content-area { padding: 30px; }

        .table thead { background: #e9ecef; }
    </style>
</head>

<body>
<div class="container-fluid">
    <div class="row">

        <!-- ================= SIDEBAR ================= -->
        <div class="col-md-2 sidebar">

            <h5 class="text-center mb-4">Sale Staff Management</h5>

            <a th:href="@{/orders}" class="active">
                Order Management
            </a>

            <a th:href="@{/feedbacks}">
                Feedback Management
            </a>

        </div>

        <!-- CONTENT -->
        <div class="col-md-10 content-area">

            <h3>Feedback Management</h3>

            <form method="get" class="row mb-3">

                <div class="col-md-2">
                    <select name="status" class="form-select">
                        <option value="">All</option>
                        <option value="Active"
                                th:selected="${currentStatus=='Active'}">
                            Active
                        </option>
                        <option value="Inactive"
                                th:selected="${currentStatus=='Inactive'}">
                            Inactive
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="Search by name customer"
                           class="form-control"/>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary">Search</button>
                </div>
            </form>

            <table class="table table-bordered table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Product</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th width="200">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="f : ${feedbacks.content}">
                    <td th:text="${f.feedbackId}"></td>
                    <td th:text="${f.user.fullName}"></td>
                    <td th:text="${f.product.productName}"></td>
                    <td th:text="${#temporals.format(f.createdAt,'dd/MM/yyyy')}"></td>

                    <td>
                        <form th:action="@{/feedbacks/toggle}" method="post">
                            <input type="hidden" name="id"
                                   th:value="${f.feedbackId}">
                            <select class="form-select"
                                    onchange="this.form.submit()">
                                <option th:selected="${f.isApproved}">
                                    Active
                                </option>
                                <option th:selected="${!f.isApproved}">
                                    Inactive
                                </option>
                            </select>
                        </form>
                    </td>

                    <td>
                        <a th:href="@{/feedbacks/delete/{id}(id=${f.feedbackId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this feedback?')">
                            Delete
                        </a>

                        <a class="btn btn-info btn-sm"
                           th:href="@{/feedbacks/view/{id}(id=${f.feedbackId})}">
                            View Details
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- PAGINATION -->
            <nav>
                <ul class="pagination">
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, feedbacks.totalPages-1)}">
                        <a class="page-link"
                           th:href="@{/feedbacks(page=${i},status=${currentStatus},keyword=${keyword})}"
                           th:text="${i+1}">
                        </a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</div>
</body>
</html>
