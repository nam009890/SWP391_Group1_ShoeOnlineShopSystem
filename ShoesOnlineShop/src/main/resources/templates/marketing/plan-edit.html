<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/shop-manager.css}">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            </div>
            <span class="brand-name">Marketing</span>
        </div>
        <span class="nav-label">Navigation</span>
        <a href="/internal/MarketingHome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Home
        </a>
        <a href="/internal/sliders">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 2l-4 5-4-5"/></svg>
            Slider
        </a>
        <a href="/internal/coupons">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
            Coupon Code
        </a>
        <a href="/internal/contents">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Content
        </a>
        <a href="/internal/plans" class="active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><path d="M9 5a2 2 0 012-2h2a2 2 0 012 2"/><path d="M9 14l2 2 4-4"/></svg>
            Marketing Plan
        </a>
        <div class="sidebar-logout">
            <a href="/internal/logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </a>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div>
                <h4>Edit Plan</h4>
                <p>Modify your marketing plan details</p>
            </div>
            <div class="user-pill">
                <div class="user-avatar">MKT</div>
                <div><div class="user-name">Username</div><div class="user-role">Marketing</div></div>
            </div>
        </div>

        <div class="breadcrumb-bar">
            <a href="/internal/plans">Marketing Plan</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <a th:href="@{/internal/plans/detail/{id}(id=${plan.id})}">Detail</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span>Edit</span>
        </div>

        <div class="form-container">
            <form th:action="@{/internal/plans/save-edit}" method="post" th:object="${plan}">
                <input type="hidden" th:field="*{id}">

                <div class="row g-4 mb-4">
                    <div class="col-12">
                        <label class="form-label">Plan Title</label>
                        <input type="text" th:field="*{title}" class="form-control-dark" placeholder="Plan title..." required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control-dark" rows="5" placeholder="Describe the plan objectives..."></textarea>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Start Date</label>
                        <input type="date" th:field="*{startDate}" class="form-control-dark" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">End Date</label>
                        <input type="date" th:field="*{endDate}" class="form-control-dark" required>
                    </div>
                </div>

                <!-- Info about re-submission -->
                <div th:if="${plan.approvalStatus == 'REMAKE' or plan.approvalStatus == 'REJECTED'}"
                     style="background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.3); border-radius:10px; padding:14px; margin-bottom:20px; color:#60a5fa; font-size:14px;">
                    <i class="fas fa-info-circle me-2"></i> Saving will resubmit this plan for approval (status will reset to PENDING).
                </div>

                <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

                <div class="d-flex justify-content-end gap-3">
                    <a th:href="@{/internal/plans/detail/{id}(id=${plan.id})}" class="btn" style="border:1px solid var(--border); color:var(--text-mid); border-radius:10px; padding:10px 24px; text-decoration:none;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="background:var(--accent); border:none; border-radius:10px; padding:10px 30px;">
                        <i class="fas fa-save me-1"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
