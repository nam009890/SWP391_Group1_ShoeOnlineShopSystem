<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback Detail</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </div>
        <span class="brand-name">Sale Staff</span>
    </div>

    <span class="nav-label">Management</span>

    <a th:href="@{/internal/orders}">
        Order Management
    </a>

    <a th:href="@{/internal/feedbacks}" class="active">
        Feedback Management
    </a>

    <div class="sidebar-logout">
        <a th:href="@{/internal/logout}">Logout</a>
    </div>

</aside>


<!-- ================= MAIN ================= -->
<main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div>
            <h4>Feedback Detail</h4>
            <p>View detailed information of customer feedback</p>
        </div>

        <div class="user-pill">
            <div class="user-avatar">SS</div>
            <div>
                <div class="user-name">Sale Staff</div>
                <div class="user-role">Administrator</div>
            </div>
        </div>
    </div>


    <!-- BREADCRUMB -->
    <div class="breadcrumb-bar">
        <a th:href="@{/}">Home</a>
        <span> ></span>
        <a th:href="@{/internal/feedbacks}">Feedback Management</a>
        <span> ></span>
        <span>Detail</span>
    </div>


    <!-- CARD -->
    <div class="card mx-auto" style="max-width:640px;">

        <div class="card-header-bar">
            <h6>Feedback Information</h6>
            <span class="badge-coupon" th:text="'#' + ${feedback.feedbackId}"></span>
        </div>

        <div class="card-body-pad">

            <div class="detail-row">
                <span class="detail-label">Feedback ID</span>
                <span class="detail-value" th:text="${feedback.feedbackId}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Customer Name</span>
                <span class="detail-value" style="font-weight:600;"
                      th:text="${feedback.user.fullName}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Product</span>
                <span class="detail-value" th:text="${feedback.product.productName}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Description</span>
                <span class="detail-value" th:text="${feedback.comment}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Date</span>
                <span class="detail-value"
                      th:text="${#temporals.format(feedback.createdAt,'dd/MM/yyyy')}"></span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Status</span>

                <span th:if="${feedback.isApproved}" class="status-badge status-active">
                    <span style="width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;"></span>
                    Active
                </span>

                <span th:unless="${feedback.isApproved}" class="status-badge status-expired">
                    <span style="width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
                    Inactive
                </span>

            </div>

        </div>


        <div class="form-footer">
            <a th:href="@{/internal/feedbacks}" class="btn-outline">
                Back
            </a>
        </div>

    </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
