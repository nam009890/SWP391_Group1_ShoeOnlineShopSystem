<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shoes Store - Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body class="ss-page">

    <div th:replace="~{customer-navbar :: navbar-fragment}"></div>

    <div class="ss-main">
        <div class="ss-page-header">
            <div>
                <h1 class="ss-page-title" th:text="${brand != null ? brand : (category != null ? category : (sort == 'newest' ? 'Hàng mới về' : 'Bộ sưu tập'))}">Bộ sưu tập</h1>
                <p class="ss-page-subtitle" th:text="${category != null ? 'Khám phá bộ sưu tập ' + category : 'Khám phá các mẫu giày cao cấp'}">Khám phá các mẫu giày cao cấp</p>
            </div>
            <div style="font-size: 14px; font-weight: 700; color: #9ca3af;">
                <strong th:text="${totalItems}" style="color: #001a35;">0</strong> sản phẩm
            </div>
        </div>

        <div class="ss-product-grid" th:if="${not #lists.isEmpty(products)}">
            <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="ss-product-card" th:each="prod : ${products}">
                <div class="ss-product-img-wrap">
                    <span class="ss-badge" th:if="${sort == 'newest'}">MỚI</span>
                    <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/400?text=Shoes'}"
                         class="ss-product-img" alt="Product">
                </div>
                <div class="ss-product-info">
                    <div class="ss-product-brand" th:text="${prod.categoryName != null ? prod.categoryName : 'SHOES STORE'}">BRAND</div>
                    <div class="ss-product-name" th:text="${prod.name}">Product Name</div>
                    <div class="ss-product-price" th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">2,500,000 ₫</div>
                </div>
            </a>
        </div>

        <div class="ss-empty" th:if="${#lists.isEmpty(products)}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <h3>Không tìm thấy sản phẩm</h3>
            <p>Thử điều chỉnh bộ lọc hoặc xem các danh mục khác.</p>
            <a href="/products" class="ss-shop-now-btn">Xem tất cả</a>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>
</body>
</html>
