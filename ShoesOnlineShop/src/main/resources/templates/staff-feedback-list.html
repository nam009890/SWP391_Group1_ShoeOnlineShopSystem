<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Reviews - Shoes Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .feedback-row {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
            transition: transform 0.2s;
        }
        .feedback-row:hover { transform: translateX(8px); }
        .rating-stars { color: #facc15; display: flex; gap: 4px; margin-bottom: 8px; }
        .rating-stars svg { width: 14px; height: 14px; fill: currentColor; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            </div>
            <span class="brand-name">Shoes Online Shop</span>
        </div>
        <span class="nav-label">Navigation</span>
        <a href="/home">Dashboard</a>
        <a href="/staff/chat">Chat Inbox</a>
        <a href="/staff/feedbacks" class="active">Manage Reviews</a>
        <div class="sidebar-logout">
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div>
                <h4>Review Management</h4>
                <p class="greeting-text">Moderate and manage customer product reviews.</p>
            </div>
            <div class="user-pill">
                <div class="user-avatar">STF</div>
                <div>
                    <div class="user-name">Staff</div>
                    <div class="user-role">Management</div>
                </div>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${#lists.isEmpty(feedbacks)}" class="text-center py-5">
            <h5 class="text-muted">No reviews to manage yet.</h5>
        </div>

        <div th:each="fb : ${feedbacks}" class="feedback-row">
            <div class="d-flex justify-content-between align-items-start">
                <div style="flex: 1;">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <span class="fw-bold" th:text="${fb.user.fullName}">Customer Name</span>
                        <span th:if="${!fb.isApproved}" class="status-badge status-pending">Pending</span>
                        <span th:if="${fb.isApproved}" class="status-badge status-approved">Approved</span>
                    </div>
                    
                    <div class="rating-stars">
                        <svg th:each="i : ${#numbers.sequence(1, 5)}" viewBox="0 0 24 24" 
                             th:style="${i <= fb.rating} ? 'color: #facc15' : 'color: #e5e7eb'">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                    </div>

                    <div class="mb-2">
                        <span class="text-muted small">On product:</span>
                        <a th:href="@{/products/detail/{id}(id=${fb.product.id})}" target="_blank" 
                           class="fw-bold text-decoration-none" th:text="${fb.product.name}">Product Name</a>
                    </div>

                    <p class="mb-0 text-dark" th:text="${fb.comment}" style="font-size: 15px; line-height: 1.6;"></p>
                    <div class="mt-3 text-muted" style="font-size: 12px;" th:text="${'Submitted on ' + #temporals.format(fb.createdAt, 'MMM dd, yyyy HH:mm')}">Date</div>
                </div>

                <div class="d-flex gap-2">
                    <form th:if="${!fb.isApproved}" th:action="@{/staff/feedbacks/approve/{id}(id=${fb.feedbackId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-success px-3">Approve</button>
                    </form>
                    <form th:action="@{/staff/feedbacks/delete/{id}(id=${fb.feedbackId})}" method="post" onsubmit="return confirm('Are you sure you want to delete this review?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger px-3">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
