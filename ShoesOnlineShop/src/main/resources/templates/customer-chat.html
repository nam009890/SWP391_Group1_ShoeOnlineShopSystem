<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chat - Hỗ Trợ Khách Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f0f2f5; }
        .chat-page { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .chat-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .chat-header a { color: var(--text-mid); text-decoration: none; display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 14px; }
        .chat-header a:hover { color: var(--accent); }
        .chat-layout { display: flex; gap: 20px; height: 600px; }

        /* Staff sidebar */
        .staff-list { width: 260px; flex-shrink: 0; background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: auto; }
        .staff-list-title { padding: 16px 20px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-light); border-bottom: 1px solid var(--border); }
        .staff-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; text-decoration: none; border-bottom: 1px solid var(--border); transition: background .15s; }
        .staff-item:last-child { border-bottom: none; }
        .staff-item:hover { background: #fafbff; }
        .staff-item.active { background: var(--accent-light); }
        .staff-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #011E2D, #4f6ef7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
        .staff-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        .staff-role { font-size: 11px; color: var(--text-mid); margin-top: 1px; }
        .online-dot { width: 9px; height: 9px; background: #39FF14; border: 2px solid white; border-radius: 50%; margin-left: auto; flex-shrink: 0; }

        /* Chat window */
        .chat-window { flex: 1; display: flex; flex-direction: column; background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .chat-win-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .chat-win-header .staff-avatar { width: 36px; height: 36px; font-size: 12px; }
        .chat-win-name { font-size: 15px; font-weight: 700; }
        .chat-win-status { font-size: 12px; color: var(--success); }

        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #f8f9fb; }

        .msg-bubble { max-width: 65%; display: flex; flex-direction: column; }
        .msg-bubble.mine { align-self: flex-end; align-items: flex-end; }
        .msg-bubble.theirs { align-self: flex-start; align-items: flex-start; }
        .bubble-text { padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .mine .bubble-text { background: #011E2D; color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble-text { background: var(--white); border: 1px solid var(--border); color: var(--text-dark); border-bottom-left-radius: 4px; }
        .bubble-time { font-size: 11px; color: var(--text-light); margin-top: 4px; padding: 0 4px; }

        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: var(--text-light); font-size: 14px; }
        .empty-chat svg { width: 48px; height: 48px; opacity: .3; }

        .chat-input-bar { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--white); }
        .chat-input-bar textarea { flex: 1; min-height: 44px; max-height: 120px; border: 1px solid var(--border); border-radius: 22px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color .15s; overflow-y: auto; }
        .chat-input-bar textarea:focus { border-color: #011E2D; }
        .send-btn { width: 44px; height: 44px; background: #011E2D; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s; flex-shrink: 0; }
        .send-btn:hover { opacity: .85; }
        .send-btn svg { fill: white; width: 20px; }

        .no-staff { display: flex; align-items: center; justify-content: center; flex: 1; background: var(--white); border: 1px solid var(--border); border-radius: 14px; flex-direction: column; gap: 10px; color: var(--text-light); font-size: 14px; }
    </style>
</head>
<body>
    <div class="chat-page">
        <div class="chat-header">
            <a href="/">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Quay về trang chủ
            </a>
        </div>
        <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 20px; color: var(--text-dark);">
            💬 Chat Chăm Sóc Khách Hàng
        </h2>

        <div class="chat-layout">
            <!-- Staff list -->
            <div class="staff-list">
                <div class="staff-list-title">Sales Staff</div>
                <a th:each="staff : ${staffList}"
                   th:href="@{/chat(staffId=${staff.userId})}"
                   class="staff-item"
                   th:classappend="${selectedStaffId != null and selectedStaffId == staff.userId} ? 'active' : ''">
                    <div class="staff-avatar" th:text="${#strings.substring(staff.fullName, 0, 1)}">S</div>
                    <div>
                        <div class="staff-name" th:text="${staff.fullName}">Sales Staff</div>
                        <div class="staff-role">Sales Staff</div>
                    </div>
                    <div class="online-dot"></div>
                </a>
                <div th:if="${#lists.isEmpty(staffList)}" style="padding: 20px; text-align: center; color: var(--text-light); font-size: 13px;">
                    Chưa có nhân viên nào.
                </div>
            </div>

            <!-- Chat window -->
            <div class="chat-window" th:if="${selectedStaff != null}">
                <div class="chat-win-header">
                    <div class="staff-avatar" th:text="${#strings.substring(selectedStaff.fullName, 0, 1)}">S</div>
                    <div>
                        <div class="chat-win-name" th:text="${selectedStaff.fullName}">Sales Staff</div>
                        <div class="chat-win-status">● Trực tuyến</div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea">
                    <div th:if="${#lists.isEmpty(messages)}" class="empty-chat">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>Hãy gửi tin nhắn để bắt đầu trò chuyện!</span>
                    </div>
                    <div th:each="msg : ${messages}"
                         class="msg-bubble"
                         th:classappend="${msg.sender.userId == currentUser.userId} ? 'mine' : 'theirs'">
                        <div class="bubble-text" th:text="${msg.message}">message</div>
                        <div class="bubble-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm, dd/MM/yyyy')}">time</div>
                    </div>
                </div>

                <form class="chat-input-bar" th:action="@{/chat/send}" method="post" id="chatForm">
                    <input type="hidden" name="receiverId" th:value="${selectedStaffId}">
                    <textarea name="message" id="msgInput" placeholder="Nhập tin nhắn..." rows="1" onkeydown="handleKey(event)"></textarea>
                    <button type="submit" class="send-btn" title="Gửi">
                        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
                    </button>
                </form>
            </div>

            <div class="no-staff" th:if="${selectedStaff == null}">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span>Chọn nhân viên để bắt đầu chat.</span>
            </div>
        </div>
    </div>

    <script>
        // Auto scroll to bottom
        const area = document.getElementById('messagesArea');
        if (area) area.scrollTop = area.scrollHeight;

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const input = document.getElementById('msgInput');
                if (input.value.trim()) {
                    document.getElementById('chatForm').submit();
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Footer Section -->
    <div th:replace="~{footer :: footer-fragment}"></div>

</body>
</html>
