

﻿<!DOCTYPE html>


<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ShoesOnlineShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/customer-checkout.css}">
</head>
<body>
    <script th:if="${errorMessage}">
        alert('[[${errorMessage}]]');
    </script>
    <nav class="navbar">
        <a th:href="@{/}" class="navbar-brand">SHOESONLINESHOP</a>
        <a th:href="@{/cart}" style="color:var(--text-muted); font-size:0.9rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; transition:color 0.3s;">&larr; Back to Cart</a>
    </nav>

    <form th:action="@{/checkout/process}" method="post" class="checkout-container">
        <div class="checkout-form-section">
            <h1 class="checkout-header">Checkout</h1>
            
            <div class="form-section-title">Shipping Information</div>
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" th:value="${user.fullName}" readonly style="opacity:0.7">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number (10 digits starting with 0)</label>
                <input type="text" class="form-control" name="phone" th:value="${user.phone}" required pattern="^0\d{9}$">
            </div>
            <div class="form-group">
                <label class="form-label">Delivery Address</label>
                <textarea class="form-control" name="address" rows="3" required th:text="${user.address}"></textarea>
            </div>

            <div class="form-section-title" style="margin-top: 3rem;">Apply Coupon</div>
            <div class="form-group">


                <select name="couponId" id="couponSelect" class="form-control" onchange="updateDiscount()" style="margin-bottom: 8px;">
                    <option value="">Select a coupon (Optional)</option>
                    <option th:each="c : ${coupons}" 
                            th:value="${c.coupon.id}" 
                            th:data-discount="${c.coupon.discountValue}"
                            th:data-type="${c.coupon.discountType}"
                            th:data-min-order="${c.coupon.minOrderValue != null ? c.coupon.minOrderValue : 0}"
                            th:data-max-discount="${c.coupon.maxDiscountAmount != null ? c.coupon.maxDiscountAmount : 0}"
                            th:data-scope="${c.coupon.scope}"
                            th:data-products="${#strings.listJoin(c.coupon.products.![productId], ',')}"
                            th:text="${c.coupon.discountType == 'PERCENTAGE'} ? |${c.coupon.couponName} (${c.coupon.discountValue}% OFF)| : |${c.coupon.couponName} (${#numbers.formatDecimal(c.coupon.discountValue, 0, 'COMMA', 0, 'POINT')} ₫ OFF)|">
                    </option>
                </select>
                <div id="coupon-info-msg" style="font-size: 0.85rem; padding: 10px; border-radius: 8px; display: none;"></div>
                <div id="coupon-detail-box" style="font-size: 0.85rem; padding: 10px; border-radius: 8px; margin-top: 8px; display: none; background: #f8fafc; border: 1px dashed #cbd5f5; color: #334155;"></div>


            </div>

            <div class="form-section-title" style="margin-top: 3rem;">Payment Method</div>
            <div class="payment-methods">
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="VNPAY" checked>
                    <div style="display:flex; flex-direction:column;">
                        <span class="payment-option-label">VNPay Gateway</span>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Pay securely via VNPay</span>
                    </div>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="COD">
                    <div style="display:flex; flex-direction:column;">
                        <span class="payment-option-label">Cash on Delivery (COD)</span>
                        <span style="font-size:0.85rem; color:var(--text-muted);">Pay when you receive the order</span>
                    </div>
                </label>
            </div>
            
            <button type="submit" class="btn-submit">Place Order & Pay</button>
        </div>

        <div class="order-summary">
            <h2 class="form-section-title" style="margin-bottom:2rem;">Order Summary</h2>
            
            <div class="summary-item" th:each="item : ${cartItems}">
                <div class="summary-item-info">
                    <div class="item-img">
                        <img th:src="${item.product.imageUrl}" onerror="this.src='/images/placeholder.png'">
                    </div>
                    <div>
                        <div class="item-name" th:text="${item.product.name}">Product</div>
                        <div class="item-qty" th:text="'Qty: ' + ${item.quantity}">Qty: 1</div>
                    </div>
                </div>


                <div class="item-price" th:text="${#numbers.formatDecimal(item.product.price.doubleValue() * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</div>


            </div>

            <div class="summary-totals">
                <div class="total-row">
                    <span>Subtotal</span>


                    <span th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>


                </div>
                <div class="total-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="total-row" id="discount-row" style="display: none; color: var(--accent);">
                    <span>Discount</span>


                    <span id="summary-discount">-0 ₫</span>
                </div>
                <div class="total-row final">
                    <span>Total</span>
                    <span id="summary-total" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</span>


                </div>
            </div>
        </div>
    </form>

    <script th:inline="javascript">
        /*<![CDATA[*/


        const cartItems = [
            /*[# th:each="item : ${cartItems}"]*/
            { id: [[${item.product.productId}]], price: [[${item.product.price}]], qty: [[${item.quantity}]] },
            /*[/]*/
        ];
        const subtotal = /*[[${totalAmount}]]*/ 0;

                function updateDiscount() {
            const select = document.getElementById('couponSelect');
            const selectedOption = select.options[select.selectedIndex];
            
            if (!selectedOption.value) {
                resetDiscount();
                return;
            }

            const discountVal = parseFloat(selectedOption.getAttribute('data-discount')) || 0;
            const type = selectedOption.getAttribute('data-type');
            const minOrder = parseFloat(selectedOption.getAttribute('data-min-order')) || 0;
            const maxDiscount = parseFloat(selectedOption.getAttribute('data-max-discount')) || 0;
            const scope = selectedOption.getAttribute('data-scope');
            const productIdsRaw = selectedOption.getAttribute('data-products') || "";
            const productIds = productIdsRaw ? productIdsRaw.split(',').map(id => parseInt(id)) : [];

            let discountAmount = 0;
            let eligibleAmount = 0;
            let eligibleCount = 0;

            if (scope === 'SPECIFIC_PRODUCTS') {
                cartItems.forEach(item => {
                    if (productIds.includes(item.id)) {
                        eligibleAmount += (item.price * item.qty);
                        eligibleCount += item.qty;
                    }
                });
            } else {
                eligibleAmount = subtotal;
                eligibleCount = cartItems.reduce((sum, item) => sum + item.qty, 0);
            }

            renderCouponDetails({
                scope,
                discountVal,
                type,
                minOrder,
                maxDiscount,
                eligibleAmount,
                eligibleCount
            });

            // 1. Min Order Check
            if (subtotal < minOrder) {
                showMsg('Order total of ' + formatPrice(minOrder) + ' is required for this coupon.', 'error');
                applyNoDiscount();
                return;
            }

            // 2. Scope / Eligible Products
            if (scope === 'SPECIFIC_PRODUCTS') {
                if (eligibleAmount === 0) {
                    showMsg('This coupon is not applicable to any items in your cart.', 'error');
                    applyNoDiscount();
                    return;
                }
            }

            // 3. Calculate Discount
            if (type === 'PERCENTAGE') {
                discountAmount = (eligibleAmount * discountVal) / 100;
                if (maxDiscount > 0 && discountAmount > maxDiscount) {
                    discountAmount = maxDiscount;
                    showMsg('Discount is capped at ' + formatPrice(maxDiscount), 'info');
                } else {
                    showMsg('Success! Eligible for ' + discountVal + '% discount.', 'success');
                }
            } else {
                discountAmount = discountVal;
                if (discountAmount > eligibleAmount) discountAmount = eligibleAmount;
                showMsg('Success! Eligible for ' + formatPrice(discountVal) + ' discount.', 'success');
            }

            const finalTotal = subtotal - discountAmount;
            


            const discRow = document.getElementById('discount-row');
            const discText = document.getElementById('summary-discount');
            const totalText = document.getElementById('summary-total');



            discRow.style.display = 'flex';
            discText.innerText = '-' + formatPrice(discountAmount);
            totalText.innerText = formatPrice(finalTotal);
        }

        function applyNoDiscount() {
            document.getElementById('discount-row').style.display = 'none';
            document.getElementById('summary-total').innerText = formatPrice(subtotal);
        }

        function resetDiscount() {
            applyNoDiscount();
            const infoMsg = document.getElementById('coupon-info-msg');
            const detailBox = document.getElementById('coupon-detail-box');
            if (document.getElementById('couponSelect').selectedIndex === 0) {
                infoMsg.style.display = 'none';
                detailBox.style.display = 'none';
            }
        }

        function showMsg(text, type) {
            const info = document.getElementById('coupon-info-msg');
            info.innerText = text;
            info.style.display = 'block';
            if (type === 'error') {
                info.style.background = '#fee2e2';
                info.style.color = '#dc2626';
                info.style.border = '1px solid #fecaca';
            } else if (type === 'success') {
                info.style.background = '#d1fae5';
                info.style.color = '#059669';
                info.style.border = '1px solid #a7f3d0';
            } else {
                info.style.background = '#fef3c7';
                info.style.color = '#d97706';
                info.style.border = '1px solid #fde68a';
            }
        }

        function renderCouponDetails(detail) {
            const box = document.getElementById('coupon-detail-box');
            const scopeText = detail.scope === 'SPECIFIC_PRODUCTS'
                ? 'Only eligible items in your cart'
                : 'All items in your cart';
            const discountText = detail.type === 'PERCENTAGE'
                ? detail.discountVal + '%'
                : formatPrice(detail.discountVal);
            const minText = detail.minOrder > 0 ? formatPrice(detail.minOrder) : 'No minimum';
            const maxText = detail.maxDiscount > 0 ? formatPrice(detail.maxDiscount) : 'No cap';
            let eligibleLine = '';
            if (detail.scope === 'SPECIFIC_PRODUCTS') {
                eligibleLine = `<div><strong>Eligible total:</strong> ${detail.eligibleCount > 0 ? formatPrice(detail.eligibleAmount) : 'None in cart'}</div>`;
            }

            box.innerHTML = `
                <div><strong>Applies to:</strong> ${scopeText}</div>
                <div><strong>Discount:</strong> ${discountText}</div>
                <div><strong>Min order:</strong> ${minText}</div>
                <div><strong>Max discount:</strong> ${maxText}</div>
                ${eligibleLine}
            `;
            box.style.display = 'block';
        }

        function formatPrice(val) {
            return new Intl.NumberFormat('vi-VN').format(val) + ' ₫';
        }/*]]>*/

    </script>
</body>
</html>
