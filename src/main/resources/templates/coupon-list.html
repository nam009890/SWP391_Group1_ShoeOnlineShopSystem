<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Coupon Management</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <div class="main-container">
            <div class="sidebar">
                <a href="/sliders">Slider management</a>
                <a href="/coupons">Coupon code management</a>
                <a href="/contents" class="active">Content management</a>
            </div>

            <div class="content">
                <div class="d-flex justify-content-between mb-4">
                    <h4>Coupon code management</h4>
                    <span>Username</span>
                </div>

                <form action="/coupons" method="get" class="row g-3 mb-4 align-items-center">
                    <div class="col-auto">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Enter name of coupon code" style="width: 250px;">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-light border">Search</button>
                    </div>

                    <div class="col-auto ms-auto">
                        <select class="form-select" style="width: 150px;">
                            <option>Filter</option>
                            <option>Active</option>
                            <option>Expired</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/coupons/create}" class="btn btn-light border">Create Coupon</a>
                    </div>
                </form>

                <div class="table-responsive bg-white border">
                    <table class="table table-bordered mb-0 align-middle">
                        <thead class="table-header">
                            <tr>
                                <th>No</th>
                                <th>Name of coupon code</th>
                                <th>Code</th>
                                <th>Discount</th>
                                <th>Create date</th>
                                <th>End Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="coupon, state : ${coupons}">
                                <td th:text="${(currentPage - 1) * 5 + state.count}">1</td>
                                <td th:text="${coupon.name}">Tên</td>
                                <td th:text="${coupon.code}">Mã</td>
                                <td th:text="${coupon.discountPercent} + '%'">10%</td>
                                <td th:text="${coupon.createDate}">2025-01-01</td>
                                <td th:text="${coupon.endDate}">2025-02-01</td>
                                <td>
                                <td>
                                    <a th:href="@{/coupons/edit/{id}(id=${coupon.id})}" 
                                       class="btn btn-light border btn-sm btn-action">Update</a>

                                    <a th:href="@{/coupons/delete/{id}(id=${coupon.id})}"
                                       onclick="return confirm('Are you sure you want to delete this coupon?')"
                                       class="btn btn-light border btn-sm btn-action text-danger">Delete</a>
                                </td>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(coupons)}">
                                <td colspan="7" class="text-center">No coupons found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav class="mt-3" th:if="${totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/coupons(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" 
                            th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/coupons(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/coupons(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>

    </body>
</html>
