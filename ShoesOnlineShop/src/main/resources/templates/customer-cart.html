<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng - Shoes Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body class="ss-page">

    <div th:replace="~{customer-navbar :: navbar-fragment}"></div>

    <div class="ss-main">
        <h1 style="font-size: 28px; font-weight: 800; color: #001a35; text-transform: uppercase; margin-bottom: 32px;">GIỎ HÀNG CỦA BẠN</h1>

        <div class="ss-cart-layout">
            <div class="ss-cart-items">
                <div th:if="${#lists.isEmpty(cartItems)}" class="ss-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
                    <h3>Giỏ hàng trống</h3>
                    <p>Hãy thêm sản phẩm yêu thích vào giỏ hàng!</p>
                    <a href="/products" class="ss-shop-now-btn">TIẾP TỤC MUA SẮM</a>
                </div>

                <div class="ss-cart-item" th:each="item : ${cartItems}">
                    <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/100?text=Shoe'}"
                         class="ss-cart-item-img" alt="Shoe">
                    <div class="ss-cart-item-info">
                        <a th:href="@{/products/detail/{id}(id=${item.product.id})}" class="ss-cart-item-name" th:text="${item.product.name}">Product</a>
                        <div style="font-size: 13px; color: #6b7280; margin-bottom: 8px;" th:if="${item.selectedColor != null or item.selectedSize != null}">
                            <span th:if="${item.selectedColor != null}" th:text="'Màu: ' + ${item.selectedColor}">Màu</span>
                            <span th:if="${item.selectedColor != null and item.selectedSize != null}"> | </span>
                            <span th:if="${item.selectedSize != null}" th:text="'Size: ' + ${item.selectedSize}">Size</span>
                        </div>
                        <div class="ss-cart-item-price" th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">2,500,000 ₫</div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <form th:action="@{/cart/update}" method="post" style="display: flex; align-items: center; gap: 8px;">
                                <input type="hidden" name="cartId" th:value="${item.cartId}">
                                <div class="ss-qty-wrap" style="margin-bottom: 0;">
                                    <button type="button" class="ss-qty-btn" onclick="this.parentNode.querySelector('input[name=quantity]').stepDown();this.closest('form').submit()">−</button>
                                    <input type="number" name="quantity" class="ss-qty-input" th:value="${item.quantity}" min="1" style="width: 40px;">
                                    <button type="button" class="ss-qty-btn" onclick="this.parentNode.querySelector('input[name=quantity]').stepUp();this.closest('form').submit()">+</button>
                                </div>
                            </form>
                            <a th:href="@{/cart/remove/{id}(id=${item.cartId})}" style="color: #ef4444; font-size: 13px; font-weight: 700; text-decoration: none;">Xóa</a>
                        </div>
                    </div>
                    <div style="font-weight: 800; font-size: 16px; color: #001a35; white-space: nowrap;"
                         th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT') + ' ₫'}">2,500,000 ₫</div>
                </div>
            </div>

            <div class="ss-summary" th:if="${not #lists.isEmpty(cartItems)}">
                <div class="ss-summary-title">TỔNG ĐƠN HÀNG</div>
                <div class="ss-summary-row">
                    <span>Tạm tính</span>
                    <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                </div>
                <div class="ss-summary-row">
                    <span>Vận chuyển</span>
                    <span style="color: #10b981;">Miễn phí</span>
                </div>
                <div class="ss-summary-total">
                    <span>Tổng cộng</span>
                    <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                </div>

                <form action="/payment/create" method="post">
                    <div th:if="${errorMessage}" style="margin-bottom: 16px; padding: 12px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; color: #b91c1c; font-size: 13px; font-weight: 600;">
                        <span th:text="${errorMessage}"></span>
                    </div>
                    <div style="margin-bottom: 14px;">
                        <label class="form-label" style="font-weight: 700; font-size: 13px;">Địa chỉ giao hàng</label>
                        <input type="text" name="shippingAddress" class="form-control" placeholder="Nhập địa chỉ..." required>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label class="form-label" style="font-weight: 700; font-size: 13px;">Số điện thoại</label>
                        <input type="text" name="phone" class="form-control" placeholder="0123456789" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button type="submit" formaction="/cart/checkout" class="ss-add-cart-btn">THANH TOÁN KHI NHẬN HÀNG</button>
                        <button type="submit" class="ss-add-cart-btn" style="background: #005A9C; color: white;">THANH TOÁN VNPAY</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>
</body>
</html>
