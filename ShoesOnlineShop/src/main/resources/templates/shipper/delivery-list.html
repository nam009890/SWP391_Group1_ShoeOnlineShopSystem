<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Deliveries</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<div>

    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">

        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="1" y="3" width="15" height="13"></rect>
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                    <circle cx="5.5" cy="18.5" r="2.5"></circle>
                    <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
            </div>
            <span class="brand-name">Shipper</span>
        </div>

        <span class="nav-label">Management</span>

        <a th:href="@{/internal/shipper/deliveries/available}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
            </svg>
            Available Jobs
        </a>

        <a th:href="@{/internal/shipper/deliveries}" class="active">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            My Deliveries
        </a>

        <div class="sidebar-logout" style="margin-top:auto;">
            <a th:href="@{/internal/logout}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logout
            </a>
        </div>

    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <h4>My Deliveries</h4>
                <p>Manage and track your assigned shipments</p>
            </div>
            <div class="user-pill">
                <div class="user-avatar" style="background:#0d9488;">SH</div>
                <div>
                    <div class="user-name">Shipper</div>
                </div>
            </div>
        </div>

        <!-- BREADCRUMB -->
        <div class="breadcrumb-bar" style="margin-bottom: 15px;">
            <a th:href="@{/}">Home</a>
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px"><polyline points="9 18 15 12 9 6"/></svg>
            <span>My Deliveries</span>
        </div>

        <!-- Alert messages -->
        <div th:if="${successMessage}" style="background:#d1fae5; border:1px solid #6ee7b7; color:#065f46; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13.5px;">
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" style="background:#fef2f2; border:1px solid #fecaca; color:#991b1b; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13.5px;">
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- CARD -->
        <div class="card">

            <!-- TOOLBAR / FILTER -->
            <div class="toolbar" style="display:flex; align-items:center; justify-content:space-between; gap:12px;">

                <form method="get" id="filterForm" th:action="@{/internal/shipper/deliveries}" style="display:flex; align-items:center; gap:10px; width:100%;">
                    
                    <div class="search-input" style="flex: 1; max-width: 380px;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by customer name" />
                    </div>

                    <button type="submit" class="btn-search" style="padding: 0 20px; height: 40px; border-radius: 8px; font-weight: 600;">Search</button>

                    <select name="status" id="statusFilter" class="form-select" style="width:140px; height: 40px; margin-left: auto;">
                        <option value="">All Status</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == currentStatus}"></option>
                    </select>

                    <select name="sort" id="sortFilter" class="form-select" style="width:150px; height: 40px;">
                        <option value="deliveryId" th:selected="${sort=='deliveryId'}">Sort by ID</option>
                    </select>
                </form>

            </div>

            <!-- TABLE -->
            <div class="table-wrap" style="border:none; border-radius:0;">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>ORDER ID</th>
                        <th>CUSTOMER</th>
                        <th>SHIPPING FEE</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                    </thead>
                    <tbody>

                    <!-- Empty state -->
                    <tr class="empty-row" th:if="${#lists.isEmpty(deliveries.content)}">
                        <td colspan="6">You have no deliveries matching the criteria.</td>
                    </tr>

                    <tr th:each="d, stat : ${deliveries.content}">
                        <td th:text="${d.deliveryId}"></td>
                        <td th:text="'#' + ${d.order.orderId}"></td>
                        <td>
                            <div style="font-weight:600; color:var(--text-dark);" th:text="${d.order.user.fullName}"></div>
                            <div style="font-size:12px; color:var(--text-mid);" th:text="${d.order.shippingAddress}"></div>
                        </td>
                        <td style="font-weight:700; color:var(--danger);">
                            <span th:text="${#numbers.formatDecimal(d.shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </td>

                        <td>
                            <span style="padding:5px 14px; font-size:12.5px; font-weight:600; border-radius:6px; background-color:#f3f4f6; border:1px solid #d1d5db; color:#4b5563; display:inline-block;"
                                  th:text="${d.deliveryStatus}">
                            </span>
                        </td>

                        <td>
                            <div class="action-btns" style="display: flex; gap: 8px;">
                                <a th:href="@{/internal/shipper/deliveries/view/{id}(id=${d.deliveryId})}" class="btn-outline" style="padding:5px 14px; font-size:12.5px;">Detail & Update</a>
                            </div>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>

            <!-- PAGINATION -->
            <div class="pagination-bar" th:if="${deliveries.totalPages > 0}">
                <span class="page-info" th:text="'Page ' + (${deliveries.number}+1) + ' of ' + ${deliveries.totalPages}"></span>

                <div class="page-btns">
                    <!-- Prev arrow -->
                    <a class="page-btn"
                       th:classappend="${deliveries.number == 0} ? ' disabled' : ''"
                       th:href="@{/internal/shipper/deliveries(page=${deliveries.number - 1}, status=${currentStatus}, keyword=${keyword}, sort=${sort})}">
                        &#8249;
                    </a>

                    <a class="page-btn"
                       th:each="i : ${#numbers.sequence(0, deliveries.totalPages-1)}"
                       th:href="@{/internal/shipper/deliveries(page=${i}, status=${currentStatus}, keyword=${keyword}, sort=${sort})}"
                       th:text="${i+1}"
                       th:classappend="${i == deliveries.number} ? ' active' : ''">
                    </a>

                    <!-- Next arrow -->
                    <a class="page-btn"
                       th:classappend="${deliveries.number + 1 >= deliveries.totalPages} ? ' disabled' : ''"
                       th:href="@{/internal/shipper/deliveries(page=${deliveries.number + 1}, status=${currentStatus}, keyword=${keyword}, sort=${sort})}">
                        &#8250;
                    </a>
                </div>
            </div>

        </div> <!-- /card -->
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const form = document.getElementById("filterForm");
const statusFilter = document.getElementById("statusFilter");
const sortFilter = document.getElementById("sortFilter");
if(statusFilter) statusFilter.addEventListener("change", () => form.submit());
if(sortFilter) sortFilter.addEventListener("change", () => form.submit());
</script>

</body>
</html>
