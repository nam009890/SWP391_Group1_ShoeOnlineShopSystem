<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${slider.sliderTitle} + ' - Shoes Store'">Slider Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body class="ss-page">

    <div th:replace="~{customer-navbar :: navbar-fragment}"></div>

    <div class="ss-main">
        <!-- Breadcrumb -->
        <div class="ss-breadcrumb">
            <a href="/">Trang chủ</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span th:text="${slider.sliderTitle}">Slider</span>
        </div>

        <!-- Hero Image -->
        <img th:src="${slider.imageUrl}" class="ss-slider-hero" th:alt="${slider.sliderTitle}">

        <h1 style="font-size: 28px; font-weight: 800; color: #001a35; text-transform: uppercase; margin-bottom: 8px;"
            th:text="${slider.sliderTitle}">Slider Title</h1>

        <!-- Coupons Section -->
        <div th:if="${slider.coupons != null and !slider.coupons.isEmpty()}">
            <div class="ss-section-title" style="margin-top: 40px;">
                <span>MÃ GIẢM GIÁ</span>
            </div>
            <div class="ss-coupon-grid">
                <div class="ss-coupon-card" th:each="coupon : ${slider.coupons}">
                    <div class="ss-coupon-discount" th:text="${coupon.discountPercent + '%'}">10%</div>
                    <div class="ss-coupon-code" th:text="${coupon.couponCode}">CODE</div>
                    <div class="ss-coupon-name" th:text="${coupon.couponName}">Coupon Name</div>
                    <div class="ss-coupon-detail">
                        <span th:text="'HSD: ' + ${#temporals.format(coupon.endDate, 'dd/MM/yyyy')}">31/12/2026</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Products Section -->
        <div th:if="${slider.products != null and !slider.products.isEmpty()}">
            <div class="ss-section-title" style="margin-top: 40px;">
                <span>SẢN PHẨM KHUYẾN MÃI</span>
            </div>
            <div class="ss-product-grid">
                <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="ss-product-card" th:each="prod : ${slider.products}">
                    <div class="ss-product-img-wrap">
                        <span class="ss-badge ss-badge-sale">SALE</span>
                        <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/400?text=Shoes'}"
                             class="ss-product-img" alt="Product">
                    </div>
                    <div class="ss-product-info">
                        <div class="ss-product-brand" th:text="${prod.categoryName != null ? prod.categoryName : 'SHOES STORE'}">BRAND</div>
                        <div class="ss-product-name" th:text="${prod.name}">Product Name</div>
                        <div class="ss-product-price" th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">2,500,000 ₫</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>
</body>
</html>
