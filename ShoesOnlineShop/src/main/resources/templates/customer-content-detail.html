<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${content.contentTitle} + ' - Shoes Store'">Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body class="ss-page">

    <div th:replace="~{customer-navbar :: navbar-fragment}"></div>

    <div class="ss-main" style="max-width: 900px;">
        <!-- Breadcrumb -->
        <div class="ss-breadcrumb">
            <a href="/">Trang chủ</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <a href="/articles">Tin tức</a>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span th:text="${content.contentTitle}">Article</span>
        </div>

        <!-- Article Header -->
        <div class="ss-article-detail-header">
            <span class="ss-article-type" th:text="${content.contentType}">BANNER</span>
            <h1 class="ss-article-detail-title" th:text="${content.contentTitle}">Article Title</h1>
            <div style="font-size: 14px; color: #9ca3af;">
                <span th:text="${#temporals.format(content.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
            </div>
        </div>

        <!-- Featured Image -->
        <img th:if="${content.imageUrl != null}" th:src="${content.imageUrl}" class="ss-article-detail-img" alt="Article Image">

        <!-- Article Content -->
        <div class="ss-article-content" th:utext="${content.contentText}">
            Article content goes here...
        </div>

        <!-- Back Link -->
        <div style="margin-top: 48px; padding-top: 24px; border-top: 1px solid #f0f0f0; text-align: center;">
            <a href="/articles" class="ss-shop-now-btn">← QUAY LẠI TIN TỨC</a>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>
</body>
</html>
