<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shoes Online Shop - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/customer.css}">
</head>
<body class="ss-page">

    <!-- Shared Navbar -->
    <div th:replace="~{customer-navbar :: navbar-fragment}"></div>

    <div class="ss-main">
        <!-- Alerts -->
        <div th:if="${successMessage}" class="ss-toast">
            ✓ <span th:text="${successMessage}">Success!</span>
        </div>

        <!-- Hero Sliders -->
        <div id="heroCarousel" class="carousel slide ss-hero" data-bs-ride="carousel"
             th:if="${not #lists.isEmpty(sliders)}">
            <div class="carousel-inner">
                <div th:each="slider, iterStat : ${sliders}" class="carousel-item"
                     th:classappend="${iterStat.index == 0} ? 'active'">
                    <a th:href="@{/sliders/{id}(id=${slider.id})}">
                        <img th:src="${slider.imageUrl}" class="d-block w-100" th:alt="${slider.sliderTitle}">
                        <div class="carousel-caption d-none d-md-block">
                            <h5 th:text="${slider.sliderTitle}">Slider Title</h5>
                        </div>
                    </a>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
        </div>

        <!-- Promo Banners -->
        <div class="ss-banner-grid" th:if="${not #lists.isEmpty(banners)}">
            <a th:each="banner : ${banners}"
               th:href="${banner.contentTitle == 'Big Sneaker Sale' ? '/products?category=Sneaker' : (banner.contentTitle == 'New Arrival' ? '/products?sort=newest' : '#')}"
               class="ss-banner">
                <img th:src="${banner.imageUrl}" th:alt="${banner.contentTitle}">
                <div class="ss-banner-overlay">
                    <h3 th:text="${banner.contentTitle}">Promo Title</h3>
                    <p th:text="${banner.contentText}">Description</p>
                    <span class="ss-shop-now-btn">MUA NGAY →</span>
                </div>
            </a>
        </div>

        <!-- Featured Products -->
        <div class="ss-section-title">
            <span>HÀNG MỚI VỀ</span>
            <a href="/products">Xem tất cả →</a>
        </div>
        <div class="ss-product-grid" th:if="${not #lists.isEmpty(featuredProducts)}">
            <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="ss-product-card" th:each="prod : ${featuredProducts}">
                <div class="ss-product-img-wrap">
                    <span class="ss-badge">MỚI</span>
                    <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/400?text=Shoes'}"
                         class="ss-product-img" alt="Product">
                </div>
                <div class="ss-product-info">
                    <div class="ss-product-brand" th:text="${prod.categoryName != null ? prod.categoryName : 'SHOES STORE'}">BRAND</div>
                    <div class="ss-product-name" th:text="${prod.name}">Product Name</div>
                    <div class="ss-product-price" th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">2,500,000 ₫</div>
                </div>
            </a>
        </div>

        <!-- Available Coupons -->
        <div class="ss-section-title" th:if="${not #lists.isEmpty(availableCoupons)}">
            <span>MÃ GIẢM GIÁ</span>
        </div>
        <div class="ss-coupon-grid" th:if="${not #lists.isEmpty(availableCoupons)}">
            <div class="ss-coupon-card" th:each="coupon : ${availableCoupons}">
                <div class="ss-coupon-discount" th:text="${coupon.discountPercent + '%'}">10%</div>
                <div class="ss-coupon-code" th:text="${coupon.couponCode}">CODE</div>
                <div class="ss-coupon-name" th:text="${coupon.couponName}">Coupon Name</div>
                <div class="ss-coupon-detail">
                    <span th:text="'HSD: ' + ${#temporals.format(coupon.endDate, 'dd/MM/yyyy')}">HSD: 31/12/2026</span>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{footer :: footer-fragment}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-close toast
        setTimeout(function() {
            var toast = document.querySelector('.ss-toast');
            if (toast) toast.style.display = 'none';
        }, 3000);
    </script>
</body>
</html>
