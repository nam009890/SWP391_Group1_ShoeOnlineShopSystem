<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - ShoesOnlineShop</title>
    <link rel="stylesheet" th:href="@{/css/pages/forgot-password.css}">
</head>
<body>

<div class="login-container">
    <a th:href="@{/}" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Home
    </a>
    <div class="login-header">
        <h2>Forgot Password</h2>
        <p>Enter your email to reset password</p>
    </div>

    <div class="message">
        Submit your email address and we'll send you a link to reset your password.
    </div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="example@gmail.com" required>
        </div>
        <button type="submit" class="btn">Send Reset Link</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/login}" style="text-decoration: none; color: #007bff; font-size: 14px;">Back to Login</a>
    </div>
</div>

</body>
</html>
