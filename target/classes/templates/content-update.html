<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Content</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="main-container">
    <div class="sidebar">
        <a href="/sliders">Slider management</a>
        <a href="/coupons">Coupon code management</a>
        <a href="/contents" class="active">Content management</a>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between mb-5">
            <h5 class="text-secondary">Update Content</h5>
            <span>Username</span>
        </div>

        <div class="bg-white border border-secondary p-4 mx-auto" style="max-width: 800px;">
            <form th:action="@{/contents/save}" th:object="${content}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Name of Content</label></div>
                    <div class="col-md-9">
                        <input type="text" th:field="*{contentTitle}" class="form-control" th:classappend="${#fields.hasErrors('contentTitle')} ? 'is-invalid' : ''">
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Type</label></div>
                    <div class="col-md-9">
                        <select th:field="*{contentType}" class="form-select" th:classappend="${#fields.hasErrors('contentType')} ? 'is-invalid' : ''">
                            <option value="BANNER">Banner</option>
                            <option value="PROMO">Promotion</option>
                            <option value="ABOUT">About Us</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <div class="col-md-3 text-end"><label class="col-form-label fw-bold">Image URL</label></div>
                    <div class="col-md-9">
                        <input type="text" th:field="*{imageUrl}" class="form-control" th:classappend="${#fields.hasErrors('imageUrl')} ? 'is-invalid' : ''">
                    </div>
                </div>

                <div class="row mb-4 align-items-start">
                    <div class="col-md-3 text-end pt-2"><label class="col-form-label fw-bold">Main content</label></div>
                    <div class="col-md-9">
                        <textarea th:field="*{contentText}" class="form-control" rows="5" th:classappend="${#fields.hasErrors('contentText')} ? 'is-invalid' : ''"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-9 offset-md-3">
                        <button type="submit" class="btn btn-light border shadow-sm px-4">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
