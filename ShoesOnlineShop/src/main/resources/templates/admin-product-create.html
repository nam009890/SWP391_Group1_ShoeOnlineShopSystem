<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .img-preview { max-width:100%; max-height:200px; border-radius:8px; border:1px solid var(--border); display:none; margin-top:10px; }
        .upload-zone { border:2px dashed var(--border); border-radius:10px; padding:30px; text-align:center; cursor:pointer; transition:all .2s; }
        .upload-zone:hover { border-color:var(--accent); background:var(--accent-light); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        <span class="brand-name">Admin Panel</span>
    </div>
    <span class="nav-label">Navigation</span>
    <a href="/admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a href="/admin/products" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Products</a>
    <a href="/admin/users"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</a>
    <a href="/admin/orders"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><polyline points="9 11 12 14 22 4"/></svg>Orders</a>
    <a href="/admin/financials"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Financials</a>
</div>

<div class="main">
    <div class="topbar">
        <div>
            <h4>Add New Product</h4>
            <p>Fill in the product details below</p>
        </div>
        <div class="user-pill">
            <div class="user-avatar">AD</div>
            <div>
                <div class="user-name">Administrator</div>
                <div class="user-role">Admin</div>
            </div>
        </div>
    </div>

    <div class="breadcrumb-bar">
        <a href="/admin">Dashboard</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <a href="/admin/products">Products</a>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <span>Add New</span>
    </div>

    <div class="card">
        <div class="card-header-bar">
            <h6>Product Information</h6>
        </div>

        <div th:if="${errorMessage}" style="margin:16px 24px 0; padding:12px; background:#fee2e2; color:#991b1b; border-radius:8px; font-size:14px;">
            <strong th:text="${errorMessage}"></strong>
        </div>

        <form action="/admin/products/save" method="post" enctype="multipart/form-data" class="card-body-pad" th:object="${product}">
            <input type="hidden" th:field="*{id}">

            <div class="row g-4">
                <!-- Left column -->
                <div class="col-md-8">
                    <div class="mb-3">
                        <label class="form-label">Product Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" name="name" th:value="${product.name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                               placeholder="Enter product name" maxlength="200">
                        <div th:if="${#fields.hasErrors('name')}" style="color:var(--danger); font-size:12px; margin-top:4px;" th:errors="*{name}">Error</div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Price (₫) <span style="color:var(--danger)">*</span></label>
                            <input type="number" name="price" th:value="${product.price}" class="form-control"
                                   th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                                   placeholder="e.g. 1500000" min="0" step="1000">
                            <div th:if="${#fields.hasErrors('price')}" style="color:var(--danger); font-size:12px; margin-top:4px;" th:errors="*{price}">Error</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Stock Quantity <span style="color:var(--danger)">*</span></label>
                            <input type="number" name="stockQuantity" th:value="${product.stockQuantity != null ? product.stockQuantity : 0}" class="form-control"
                                   th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid' : ''"
                                   placeholder="0" min="0">
                            <div th:if="${#fields.hasErrors('stockQuantity')}" style="color:var(--danger); font-size:12px; margin-top:4px;" th:errors="*{stockQuantity}">Error</div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Category</label>
                        <input type="text" name="categoryName" th:value="${product.categoryName}" class="form-control"
                               placeholder="e.g. Sneaker, Sport, Running" list="category-list" maxlength="100">
                        <datalist id="category-list">
                            <option th:each="cat : ${categories}" th:value="${cat}"></option>
                        </datalist>
                    </div>

                    <div class="mt-3">
                        <label class="form-label">Status</label>
                        <select name="isActive" class="form-select">
                            <option value="true" th:selected="${product.isActive == null or product.isActive}">Active</option>
                            <option value="false" th:selected="${product.isActive != null and !product.isActive}">Inactive</option>
                        </select>
                    </div>
                </div>

                <!-- Right column: Image upload -->
                <div class="col-md-4">
                    <label class="form-label">Product Image</label>
                    <div class="upload-zone" onclick="document.getElementById('imageFile').click()">
                        <svg width="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-light)" stroke-width="1.5" style="margin-bottom:8px;"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        <div style="font-size:13px; color:var(--text-mid); font-weight:500;">Click to upload image</div>
                        <div style="font-size:11px; color:var(--text-light); margin-top:4px;">JPG, PNG, GIF (max 5MB)</div>
                    </div>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display:none;" onchange="previewImage(this)">
                    <img id="imgPreview" class="img-preview" alt="Preview">
                    <div th:if="${#fields.hasErrors('imageUrl')}" style="color:var(--danger); font-size:12px; margin-top:4px;" th:errors="*{imageUrl}">Error</div>
                </div>
            </div>

            <div class="form-footer mt-4">
                <a href="/admin/products" class="btn-outline">Cancel</a>
                <button type="submit" class="btn-save">Create Product</button>
            </div>
        </form>
    </div>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('imgPreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
