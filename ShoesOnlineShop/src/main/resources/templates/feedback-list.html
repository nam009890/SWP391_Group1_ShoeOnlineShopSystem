<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback Management</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </div>
        <span class="brand-name">Sale Staff</span>
    </div>

    <span class="nav-label">Management</span>

    <a th:href="@{/internal/orders}">
        Order Management
    </a>

    <a th:href="@{/internal/feedbacks}" class="active">
        Feedback Management
    </a>
<a th:href="@{/internal/invoices}" >
Invoice Management
</a>
    <div class="sidebar-logout">
        <a th:href="@{/internal/logout}">
            Logout
        </a>
    </div>

</aside>


<!-- ================= MAIN ================= -->
<main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <div>
            <h4>Feedback Management</h4>
            <p>View and manage customer product feedback</p>
        </div>

        <a href="/internal/admin/profile" style="text-decoration:none;">
        <div class="user-pill">
            <div class="user-avatar">SS</div>
            <div>
                <div class="user-name">Sale Staff</div>
                <div class="user-role">Administrator</div>
            </div>
        </div>
        </a>
    </div>


    <!-- BREADCRUMB -->
    <div class="breadcrumb-bar">
        <a th:href="@{/}">Home</a>
        <span> / </span>
        <span>Feedback Management</span>
    </div>


    <!-- CARD -->
    <div class="card">

        <!-- TOOLBAR -->
        <div class="toolbar d-flex justify-content-between align-items-center">

            <form method="get" id="filterForm" class="d-flex gap-2">

                <input type="text"
                       class="form-control"
                       name="keyword"
                       th:value="${keyword}"
                       placeholder="Search by customer name">

                <button class="btn btn-primary">
                    Search
                </button>

                <select name="status" class="form-select" style="width:150px;">
                    <option value="">All Status</option>
                    <option value="Active" th:selected="${currentStatus=='Active'}">Active</option>
                    <option value="Inactive" th:selected="${currentStatus=='Inactive'}">Inactive</option>
                </select>

            </form>

        </div>


        <!-- TABLE -->
        <div class="table-responsive">

            <table class="table">

                <thead>
                <tr>
                    <th>No</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(feedbacks.content)}">
                    <td colspan="6" class="text-center">No feedback found</td>
                </tr>

                <tr th:each="f, stat : ${feedbacks.content}">

                    <td th:text="${stat.count + (feedbacks.number * feedbacks.size)}"></td>

                    <td th:text="${f.user.fullName}"></td>

                    <td th:text="${f.product.productName}"></td>

                    <td th:text="${#temporals.format(f.createdAt,'dd/MM/yyyy')}"></td>

                    <td>
                        <form th:action="@{/internal/feedbacks/toggle}" method="post">

                            <input type="hidden" name="id" th:value="${f.feedbackId}">

                            <select class="form-select" onchange="this.form.submit()">
                                <option value="Active" th:selected="${f.isApproved}">Active</option>
                                <option value="Inactive" th:selected="${!f.isApproved}">Inactive</option>
                            </select>

                        </form>
                    </td>

                    <td>

                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/internal/feedbacks/view/{id}(id=${f.feedbackId})}">
                            Detail
                        </a>

                        <a class="btn btn-sm btn-danger"
                           th:href="@{/internal/feedbacks/delete/{id}(id=${f.feedbackId})}"
                           onclick="return confirm('Delete this feedback?')">
                            Delete
                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>


        <!-- PAGINATION -->
        <div class="d-flex justify-content-between align-items-center p-3">

            <span th:text="'Page ' + (${feedbacks.number}+1) + ' of ' + ${feedbacks.totalPages}"></span>

            <div>

                <a class="btn btn-sm btn-outline-secondary"
                   th:href="@{/internal/feedbacks(page=${feedbacks.number - 1},status=${currentStatus},keyword=${keyword})}">
                    Prev
                </a>

                <a class="btn btn-sm btn-outline-secondary"
                   th:href="@{/internal/feedbacks(page=${feedbacks.number + 1},status=${currentStatus},keyword=${keyword})}">
                    Next
                </a>

            </div>

        </div>

    </div>

</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
