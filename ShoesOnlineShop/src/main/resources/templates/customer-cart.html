<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Cart - Shoes Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #fdfdfd; }
        .customer-topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .header-brand { font-size: 20px; font-weight: 800; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .header-brand svg { width: 24px; height: 24px; fill: var(--accent); }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 15px; }
        .customer-main { padding: 40px; max-width: 1100px; margin: 0 auto; display: flex; gap: 40px; align-items: flex-start;}
        
        .cart-list { flex: 1; }
        .cart-item { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px; display: flex; gap: 20px; margin-bottom: 20px; align-items: center;}
        .cart-item-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #f5f6f8; }
        .cart-item-info { flex: 1; display: flex; flex-direction: column; justify-content: center;}
        .ci-name { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; text-decoration: none;}
        .ci-price { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 12px;}
        .ci-actions { display: flex; align-items: center; gap: 15px; }
        .ci-qty-form { display: flex; align-items: center; gap: 8px; }
        .ci-qty-input { width: 50px; text-align: center; padding: 4px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px;}
        .ci-update-btn { font-size: 12px; font-weight: 600; background: var(--text-dark); color: white; border: none; padding: 4px 10px; border-radius: 6px;}
        
        .summary-card { width: 340px; background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: sticky; top: 100px; flex-shrink: 0;}
        .summary-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px;}
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 14px; font-weight: 600; color: var(--text-mid); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border); font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 24px;}
        
    </style>
</head>
<body>

    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/products">Shop</a>
            <a href="/orders">My Orders</a>
            <a href="/cart" style="color: var(--accent)">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
        </nav>
    </header>

    <div class="customer-main">
        
        <div class="cart-list">
            <h1 style="font-size: 26px; font-weight: 800; margin-bottom: 30px;">Shopping Cart</h1>
            
            <div th:if="${#lists.isEmpty(cartItems)}" style="text-align: center; padding: 60px; background: white; border-radius: 14px; border: 1px dashed var(--border);">
                Your cart is empty. <br><br>
                <a href="/products" class="btn-dark-solid">Continue Shopping</a>
            </div>

            <div class="cart-item" th:each="item : ${cartItems}">
                <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/100?text=Shoe'}" class="cart-item-img" alt="Shoe">
                <div class="cart-item-info">
                    <a th:href="@{/products/detail/{id}(id=${item.product.id})}" class="ci-name" th:text="${item.product.name}">Product</a>
                    <div class="ci-price" th:text="${'$' + item.product.price}">$99.00</div>
                    
                    <div class="ci-actions">
                        <form th:action="@{/cart/update}" method="post" class="ci-qty-form">
                            <input type="hidden" name="cartId" th:value="${item.cartId}">
                            <input type="number" name="quantity" class="ci-qty-input" th:value="${item.quantity}" min="1">
                            <button type="submit" class="ci-update-btn">Update</button>
                        </form>
                        <a th:href="@{/cart/remove/{id}(id=${item.cartId})}" class="btn-del-link" style="font-size: 12px;">Remove</a>
                    </div>
                </div>
                <div style="font-weight: 800; font-size: 16px; color: var(--text-dark);" th:text="${'$' + (item.product.price * item.quantity)}">$99.00</div>
            </div>
            
        </div>

        <div class="summary-card" th:if="${not #lists.isEmpty(cartItems)}">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row">
                <span>Subtotal</span>
                <span th:text="${'$' + total}">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Free</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span th:text="${'$' + total}">$0.00</span>
            </div>
            
            <form action="/cart/checkout" method="post">
                <div th:if="${errorMessage}" class="alert alert-danger" style="margin-bottom: 20px; font-size: 14px; padding: 12px; border-radius: 8px; color: #b91c1c; background: #fee2e2; border: 1px solid #fecaca;">
                    <strong th:text="${errorMessage}"></strong>
                </div>
                <div class="mb-3">
                    <label class="form-label">Shipping Address</label>
                    <input type="text" name="shippingAddress" class="form-control" placeholder="123 Main St..." required oninput="this.value = this.value.replace(/[^\p{L}0-9\s.,-]/gu, '')">
                </div>
                <div class="mb-4">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phone" class="form-control" placeholder="0123456789" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <button type="submit" class="btn-accent" style="width: 100%; justify-content: center; padding: 12px; font-size: 15px;">Checkout</button>
            </form>
        </div>

    </div>

</body>
</html>
