<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shoes Online Shop - Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #fdfdfd; }
        .customer-topbar {
            background: var(--white); border-bottom: 1px solid var(--border);
            padding: 12px 32px; display: flex; align-items: center; gap: 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-brand { font-size: 18px; font-weight: 800; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-right: 28px;}
        .header-brand svg { width: 22px; height: 22px; fill: var(--accent); }

        /* Category links — grows in center */
        .topbar-categories { display: flex; align-items: center; gap: 4px; flex: 1; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
        .topbar-categories::-webkit-scrollbar { display: none; }
        .topbar-categories a { color: var(--text-dark); text-decoration: none; font-size: 14px; font-weight: 600; padding: 6px 10px; border-radius: 8px; transition: background 0.15s, color 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .topbar-categories a:hover { background: var(--bg); color: var(--accent); }
        .topbar-categories a.active-cat { color: var(--accent); background: var(--accent-light); }
        .topbar-categories a.sale-cat { color: #e53935; font-weight: 700; }
        .topbar-categories a.sale-cat:hover { background: #fef2f2; color: #c62828; }
        .cat-arrow { display: inline-block; width: 6px; height: 6px; border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; transform: rotate(45deg); margin-bottom: 2px; }

        .nav-links { display: flex; gap: 20px; align-items: center; flex-shrink: 0; margin-left: 20px; }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 14px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }
        .customer-main { padding: 40px; max-width: 1200px; margin: 0 auto; display: flex; gap: 40px; }
        
        .filter-sidebar { width: 250px; flex-shrink: 0; }
        .filter-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: sticky; top: 70px;}
        .filter-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;}
        
        .products-area { flex: 1; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 28px; font-weight: 800; color: var(--text-dark); margin: 0;}
        .results-count { color: var(--text-mid); font-size: 14px; font-weight: 500;}
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px;}
        .prod-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; text-decoration: none; display: block; transition: transform .2s, box-shadow .2s; }
        .prod-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .prod-img { width: 100%; height: 200px; object-fit: cover; background: #f5f6f8; }
        .prod-info { padding: 16px; }
        .prod-cat { font-size: 12px; color: var(--text-light); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .prod-name { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-price { font-size: 17px; font-weight: 800; color: var(--accent); }
        
        .promo-bar {
            background: #F8F7F3;
            border-bottom: 1px solid var(--border);
            padding: 10px 40px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 40px;
            font-size: 13px;
            color: #444;
            font-weight: 500;
            overflow-x: auto;
            white-space: nowrap;
        }
        .promo-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
            Shoes Store
        </a>

        <!-- Category Links (center) -->
        <nav class="topbar-categories">
            <a href="/products?category=Xu+H%C6%B0%E1%BB%9Bng" th:classappend="${category == 'Xu H\u01b0\u1edbng'} ? 'active-cat' : ''">Xu Hướng <span class="cat-arrow"></span></a>
            <a href="/products?category=Nam" th:classappend="${category == 'Nam'} ? 'active-cat' : ''">Nam <span class="cat-arrow"></span></a>
            <a href="/products?category=N%E1%BB%AF" th:classappend="${category == 'N\u1eef'} ? 'active-cat' : ''">Nữ <span class="cat-arrow"></span></a>
            <a href="/products?category=Tr%E1%BA%BB+Em" th:classappend="${category == 'Tr\u1ebb Em'} ? 'active-cat' : ''">Trẻ Em <span class="cat-arrow"></span></a>
            <a href="/products?category=Ph%E1%BB%A5+Ki%E1%BB%87n" th:classappend="${category == 'Ph\u1ee5 Ki\u1ec7n'} ? 'active-cat' : ''">Phụ Kiện <span class="cat-arrow"></span></a>
            <a href="/products?category=Th%C6%B0%C6%A1ng+Hi%E1%BB%87u" th:classappend="${category == 'Th\u01b0\u01a1ng Hi\u1ec7u'} ? 'active-cat' : ''">Thương Hiệu <span class="cat-arrow"></span></a>
            <a href="/products?category=Th%E1%BB%83+Thao" th:classappend="${category == 'Th\u1ec3 Thao'} ? 'active-cat' : ''">Thể Thao <span class="cat-arrow"></span></a>
            <a href="/products?category=%C6%AFu+%C4%90%C3%A3i" class="sale-cat" th:classappend="${category == '\u01afu \u0110\u00e3i'} ? 'active-cat' : ''">Ưu Đãi <span class="cat-arrow"></span></a>
        </nav>

        <!-- Right Nav -->
        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/products" style="color: var(--accent)">Shop</a>
            <a href="/orders">My Orders</a>
            <a href="/cart">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            </a>
        </nav>
    </header>

    <div class="promo-bar">
        <div class="promo-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
            Miễn phí giao hàng đơn từ 699k
        </div>
        <div class="promo-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            Miễn phí đổi trả đến 30 ngày
        </div>
        <div class="promo-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
            Cam kết 100% chính hãng
        </div>
    </div>

    <div class="customer-main">
        <!-- Sidebar Filters -->
        <div class="filter-sidebar">
            <div class="filter-card">
                <div class="filter-title">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    Filters
                </div>
                <form action="/products" method="get">
                    <div class="mb-4">
                        <label class="form-label" style="font-size: 12px; color: var(--text-mid);">Search</label>
                        <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="Product name...">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" style="font-size: 12px; color: var(--text-mid);">Category</label>
                        <select name="category" class="form-select">
                            <option value="">All Categories</option>
                            <option value="Xu Hướng" th:selected="${category == 'Xu Hướng'}">Xu Hướng</option>
                            <option value="Nam" th:selected="${category == 'Nam'}">Nam</option>
                            <option value="Nữ" th:selected="${category == 'Nữ'}">Nữ</option>
                            <option value="Trẻ Em" th:selected="${category == 'Trẻ Em'}">Trẻ Em</option>
                            <option value="Phụ Kiện" th:selected="${category == 'Phụ Kiện'}">Phụ Kiện</option>
                            <option value="Thương Hiệu" th:selected="${category == 'Thương Hiệu'}">Thương Hiệu</option>
                            <option value="Thể Thao" th:selected="${category == 'Thể Thao'}">Thể Thao</option>
                            <option value="Ưu Đãi" th:selected="${category == 'Ưu Đãi'}">Ưu Đãi</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-dark-solid" style="width: 100%;">Apply Filters</button>
                    <a href="/products" class="btn-outline mt-2" style="width: 100%; justify-content: center;">Clear</a>
                </form>
            </div>
        </div>

        <!-- Products List -->
        <div class="products-area">
            <div class="page-header">
                <h1 class="page-title">All Products</h1>
                <div class="results-count">Showing <span th:text="${totalItems}">0</span> results</div>
            </div>

            <div class="product-grid">
                <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="prod-card" th:each="prod : ${products}">
                    <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/300?text=No+Image'}" class="prod-img" alt="Product">
                    <div class="prod-info">
                        <div class="prod-cat" th:text="${prod.categoryName != null ? prod.categoryName : 'Uncategorized'}">Category</div>
                        <div class="prod-name" th:text="${prod.name}">Product Name</div>
                        <div class="prod-price" th:text="${'$' + prod.price}">$99.00</div>
                    </div>
                </a>
            </div>
            
            <div th:if="${#lists.isEmpty(products)}" style="text-align: center; padding: 60px; background: white; border-radius: 14px; border: 1px dashed var(--border);">
                Empty... No products found.
            </div>

            <!-- Pagination (Reuse CSS from style.css) -->
            <div class="pagination-bar" style="background: white; border-radius: 14px; border: 1px solid var(--border);" th:if="${totalPages > 1}">
                <span class="page-info">Page <strong th:text="${currentPage}">1</strong> of <strong th:text="${totalPages}">5</strong></span>
                <div class="page-btns">
                    <a class="page-btn" th:classappend="${currentPage == 1} ? 'disabled'" th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${category})}">
                        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    </a>
                    <a class="page-btn" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'" th:href="@{/products(page=${i}, keyword=${keyword}, category=${category})}" th:text="${i}">1</a>
                    <a class="page-btn" th:classappend="${currentPage == totalPages} ? 'disabled'" th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${category})}">
                        <svg width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer Care Chat FAB -->
    <a href="/chat" class="chat-fab" title="Chat với Sales Staff">
        <svg viewBox="0 0 24 24">
            <path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM8 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8 0c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"></path>
        </svg>
        <div class="chat-fab-indicator"></div>
    </a>
    <!-- Footer Section -->
    <div th:replace="~{footer :: footer-fragment}"></div>

</body>
</html>
