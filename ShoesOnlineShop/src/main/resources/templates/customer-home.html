<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Shoes Online Shop - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Customer Specific Styles */
        body {
            background: #fdfdfd;
        }

        .customer-topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 32px;
            display: flex;
            align-items: center;
            gap: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-brand {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-right: 28px;
        }

        .header-brand svg {
            width: 22px;
            height: 22px;
            fill: var(--accent);
        }

        /* Category links — center section, grows to fill space */
        .topbar-categories {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .topbar-categories::-webkit-scrollbar { display: none; }
        .topbar-categories a {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 8px;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .topbar-categories a:hover { background: var(--bg); color: var(--accent); }
        .topbar-categories a.active-cat { color: var(--accent); background: var(--accent-light); }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-shrink: 0;
            margin-left: 20px;
        }

        .nav-links a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .cart-icon {
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .customer-main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Hero Carousel */
        .hero {
            margin-bottom: 50px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .slider-link {
            cursor: pointer;
            display: block;
            text-decoration: none;
        }
        .carousel-item img {
            height: 500px;
            object-fit: cover;
            border-radius: 16px;
            width: 100%;
            transition: transform 0.5s ease;
        }
        .slider-link:hover img {
            transform: scale(1.02);
        }
        .carousel-caption {
            transition: transform 0.3s ease, background 0.3s ease;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 20px;
        }
        .slider-link:hover .carousel-caption {
            background: rgba(0,0,0,0.7) !important;
            transform: translateY(-5px);
        }

        /* Section Title */
        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title a {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }

        /* Promo Banners */
        .banner-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        .promo-banner {
            border-radius: 16px;
            height: 280px;
            overflow: hidden;
            position: relative;
            background: #eee;
            text-decoration: none;
            display: block;
        }

        .promo-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .promo-banner:hover img {
            transform: scale(1.05);
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: white;
        }

        .banner-overlay h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .banner-overlay p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .btn-banner {
            background: white;
            color: black;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }

        /* Product Cards */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .prod-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .prod-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-color: var(--accent);
        }

        .prod-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f8f8f8;
        }

        .prod-info {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .prod-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .prod-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            margin-top: auto;
        }
    </style>
</head>

<body>
    <header class="customer-topbar">
        <a href="/" class="header-brand">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
            </svg>
            Shoes Store
        </a>

        <nav class="topbar-categories">
            <a href="/products">Shop All</a>
            <a href="/products?category=sneaker" th:classappend="${category == 'sneaker'} ? 'active-cat' : ''">Sneaker</a>
            <a href="/products?category=running" th:classappend="${category == 'running'} ? 'active-cat' : ''">Running</a>
            <a href="/products?category=basketball" th:classappend="${category == 'basketball'} ? 'active-cat' : ''">Basketball</a>
        </nav>

        <nav class="nav-links">
            <a href="/">Home</a>
            <a href="/orders">Orders</a>
            <a href="/cart" class="cart-icon">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" />
                </svg>
                <span class="cart-badge">0</span>
            </a>
        </nav>
    </header>

    <div class="customer-main">
        <!-- Success/Error Alerts -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <span th:text="${successMessage}">Success!</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
            <span th:text="${errorMessage}">Error!</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Hero Sliders -->
        <div id="heroCarousel" class="carousel slide hero" data-bs-ride="carousel"
            th:if="${not #lists.isEmpty(sliders)}">
            <div class="carousel-inner">
                <div th:each="slider, iterStat : ${sliders}" class="carousel-item"
                    th:classappend="${iterStat.index == 0} ? 'active'">
                    <a th:href="${slider.linkUrl != null && !slider.linkUrl.isEmpty() ? slider.linkUrl : 'javascript:void(0)'}" 
                       class="slider-link" target="_self">
                        <img th:src="${slider.imageUrl}" class="d-block w-100" th:alt="${slider.sliderTitle}">
                        <div class="carousel-caption d-none d-md-block">
                            <h5 th:text="${slider.sliderTitle}" style="font-weight: 800; font-size: 28px;">Slider Title</h5>
                        </div>
                    </a>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>

        <!-- Promo Banners -->
        <div class="banner-grid" th:if="${not #lists.isEmpty(banners)}">
            <a th:each="banner : ${banners}" 
               th:href="${banner.contentTitle == 'Big Sneaker Sale' ? '/products?category=sneaker' : (banner.contentTitle == 'New Arrival' ? '/products?sort=newest' : (banner.linkUrl != null && !banner.linkUrl.isEmpty() ? banner.linkUrl : (banner.targetType == 'category' ? '/products?category=' + banner.targetId : (banner.targetType == 'product' ? '/products/detail/' + banner.targetId : 'javascript:void(0)'))))}" 
               class="promo-banner">
               <img th:src="${banner.imageUrl}" th:alt="${banner.contentTitle}">
               <div class="banner-overlay">
                   <h3 th:text="${banner.contentTitle}">Promo Title</h3>
                   <p th:text="${banner.contentText}">Description text here</p>
                   <span class="btn-banner">Shop Now</span>
               </div>
            </a>
        </div>

        <!-- Featured Products -->
        <div class="section-title">
            <span>Featured Collection</span>
            <a href="/products">View All →</a>
        </div>
        <div class="product-grid" th:if="${not #lists.isEmpty(featuredProducts)}">
            <a th:href="@{/products/detail/{id}(id=${prod.id})}" class="prod-card" th:each="prod : ${featuredProducts}">
                <img th:src="${prod.imageUrl != null ? prod.imageUrl : 'https://via.placeholder.com/400?text=Shoes'}" 
                     class="prod-img" alt="Product">
                <div class="prod-info">
                    <span class="prod-name" th:text="${prod.name}">Product Name</span>
                    <span class="prod-price" th:text="${'$' + prod.price}">$99.00</span>
                </div>
            </a>
        </div>
    </div>

    <!-- Reusable Footer -->
    <div th:replace="~{footer :: footer-fragment}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
