<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin - Invoice Management</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">

<div class="sidebar-brand">

<div class="brand-icon">
<svg viewBox="0 0 24 24">
<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
<polyline points="9 22 9 12 15 12 15 22"/>
</svg>
</div>

<span class="brand-name">Sale Staff</span>

</div>

<span class="nav-label">Management</span>

<a th:href="@{/internal/orders}">
Order Management
</a>

<a th:href="@{/internal/feedbacks}">
Feedback Management
</a>

<a th:href="@{/internal/invoices}" class="active">
Invoice Management
</a>

<div class="sidebar-logout">
<a th:href="@{/internal/logout}">
Logout
</a>
</div>

</aside>


<!-- ================= MAIN ================= -->
<main class="main">

<!-- TOPBAR -->
<div class="topbar">

<div>
<h4>Invoice Management</h4>
<p>Manage all customer invoices</p>
</div>

<a href="/internal/admin/profile" style="text-decoration:none;">
<div class="user-pill">

<div class="user-avatar">SS</div>

<div>
<div class="user-name">Sale Staff</div>
<div class="user-role">Administrator</div>
</div>

</div>
</a>

</div>


<!-- BREADCRUMB -->
<div class="breadcrumb-bar">

<a th:href="@{/}">Home</a>

<svg xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor"
stroke-width="2">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M9 5l7 7-7 7"/>

</svg>

<span>Invoice Management</span>

</div>


<!-- CARD -->
<div class="card">

<!-- TOOLBAR -->
<div class="toolbar"
style="display:flex; align-items:center; justify-content:space-between; gap:12px;">


<form method="get"
id="filterForm"
style="display:flex; align-items:center; gap:10px;">

<div class="search-input">

<svg xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24"
stroke="currentColor"
stroke-width="2">

<circle cx="11" cy="11" r="8"/>
<line x1="21" y1="21" x2="16.65" y2="16.65"/>

</svg>

<input type="text"
name="keyword"
th:value="${keyword}"
placeholder="Search by customer name"/>

</div>

<button type="submit" class="btn-search">
Search
</button>


<select name="status"
id="statusFilter"
class="form-select"
style="width:140px;">

<option value="">All Status</option>

<option value="true"
th:selected="${status == true}">
Active
</option>

<option value="false"
th:selected="${status == false}">
Inactive
</option>

</select>


<select name="sort"
id="sortFilter"
class="form-select"
style="width:150px;">

<option value="invoiceId"
th:selected="${sort=='invoiceId'}">
Sort by ID
</option>

<option value="totalAmount"
th:selected="${sort=='totalAmount'}">
Sort by Total
</option>

<option value="generatedDate"
th:selected="${sort=='generatedDate'}">
Sort by Date
</option>

</select>

</form>


<a th:href="@{/internal/invoices/create}"
class="btn-create"
style="white-space:nowrap;">

Create Invoice

</a>

</div>


<!-- TABLE -->
<div class="table-wrap">

<table>

<thead>

<tr>

<th>ID</th>
<th>CUSTOMER</th>
<th>PHONE</th>
<th>QUANTITY</th>
<th>TOTAL</th>
<th>DATE</th>
<th>ACTIONS</th>

</tr>

</thead>

<tbody>

<tr class="empty-row"
th:if="${#lists.isEmpty(invoices.content)}">

<td colspan="7">
No invoices found
</td>

</tr>

<tr th:each="i,stat : ${invoices.content}">

<td th:text="${stat.count + (invoices.number * invoices.size)}"></td>

<td>
<div style="font-weight:600;"
th:text="${i.order.user.fullName}">
</div>
</td>

<td th:text="${i.order.phone}"></td>

<td th:text="${i.order.orderDetails.size()}"></td>

<td style="font-weight:700;color:var(--danger);"
th:text="${i.totalAmount}">
</td>

<td th:text="${#temporals.format(i.generatedDate,'dd/MM/yyyy')}"></td>

<td>

<div class="action-btns">
    
<a th:href="@{/internal/invoices/detail/{id}(id=${i.invoiceId})}"
   class="btn-outline">
Detail
</a>

<a th:href="@{/internal/invoices/delete/{id}(id=${i.invoiceId})}"
class="btn-del"
onclick="return confirm('Delete this invoice?')">
Delete
</a>

</div>

</td>

</tr>

</tbody>

</table>

</div>


<!-- PAGINATION -->
<div class="pagination-bar">

<span class="page-info"
th:text="'Page ' + (${invoices.number}+1) + ' of ' + ${invoices.totalPages}">
</span>


<div class="page-btns">

<a class="page-btn"
th:href="@{/internal/invoices(page=${invoices.number - 1},
keyword=${keyword},
status=${status},
sort=${sort})}">

&#8249;

</a>


<a class="page-btn"
th:each="i : ${#numbers.sequence(0,invoices.totalPages-1)}"
th:href="@{/internal/invoices(page=${i},
keyword=${keyword},
status=${status},
sort=${sort})}"
th:text="${i+1}"
th:classappend="${i == invoices.number} ? ' active' : ''">

</a>


<a class="page-btn"
th:href="@{/internal/invoices(page=${invoices.number + 1},
keyword=${keyword},
status=${status},
sort=${sort})}">

&#8250;

</a>

</div>

</div>


</div>

</main>

</div>


<script>

const form = document.getElementById("filterForm")

document.getElementById("statusFilter")
.addEventListener("change",()=>form.submit())

document.getElementById("sortFilter")
.addEventListener("change",()=>form.submit())

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
