spring.application.name=ShoesOnlineShop
# Server Port
server.port=8080

# Databse Connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ShoesOnlineShop;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Request Encoding enforcement
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Thymeleaf cache
spring.thymeleaf.cache=false

# File Upload Configuration
# Spring Boot 2.0+
spring.servlet.multipart.max-file-size=524288000
spring.servlet.multipart.max-request-size=524288000
# Spring Boot 1.4 - 1.5
spring.http.multipart.max-file-size=524288000
spring.http.multipart.max-request-size=524288000
# Spring Boot 1.3
multipart.maxRequestSize=524288000
# Essential: Let Tomcat fully read the large request so it can return an HTTP response (preventing ERR_CONNECTION_RESET)
server.tomcat.max-swallow-size=-1
server.tomcat.max-parameter-count=100000
server.tomcat.max-http-form-post-size=524288000

# VNPay Configuration (Sandbox Config - Please replace with your actual keys from VNPay)
vnpay.tmnCode=QUDP0S7R
vnpay.hashSecret=5FFDQCGHTZHGPHPJA82CNZ7V4CWKDVBW
vnpay.payUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/vnpay/return
vnpay.version=2.1.0
